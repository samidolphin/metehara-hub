<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Mataaharaa Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; overflow-x: hidden; }
        
        .blue-sidebar {
            background-color: #0c82cf; width: 90px; height: 100vh; position: fixed;
            left: 0; top: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 20px; z-index: 100;
        }

        .side-item {
            font-size: 0.65rem; color: white; text-align: center; font-weight: bold;
            transition: 0.3s; cursor: pointer;
        }
        .side-item:hover { color: #f59e0b; transform: scale(1.1); }

        .content-area { margin-left: 90px; }
        
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 215, 0, 0.1); }
        
        .hero-title { font-size: clamp(1.8rem, 5vw, 3.5rem); line-height: 1.2; }
    </style>
</head>
<body>

    <div class="blue-sidebar shadow-2xl">
        <div class="side-item" data-am="ቅድመ ዜና" data-om="Oduu Duraa" data-en="Pre-News">ቅድመ ዜና</div>
        <div class="side-item" data-am="ሪፖርት" data-om="Gabaasa" data-en="Report">ሪፖርት</div>
        <div class="side-item" data-am="ቱሪዝም" data-om="Tuurizimii" data-en="Tourism">ቱሪዝም</div>
        <div class="side-item" data-am="ባህል" data-om="Aadaa" data-en="Culture">ባህል</div>
        <div class="side-item" data-am="ስነ ጽሁፍ" data-om="Og-barruu" data-en="Literature">ስነ ጽሁፍ</div>
        <div class="side-item" data-am="ቴክ" data-om="Teek" data-en="Tech">ቴክ</div>
        <div class="side-item" data-am="ፍልስፍና" data-om="Falaasama" data-en="Philosophy">ፍልስፍና</div>
    </div>

    <div class="content-area">
        <nav class="fixed top-0 right-0 left-[90px] z-50 glass-nav p-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-amber-500 rounded flex items-center justify-center text-slate-950 font-black">S</div>
                    <h1 class="text-white font-bold text-sm uppercase">SAMI-TUBE MEDIA</h1>
                </div>
                <select id="langSwitch" onchange="changeLanguage()" class="bg-slate-800 text-[10px] text-white p-1 rounded border border-slate-700">
                    <option value="am">🇪🇹 አማርኛ</option>
                    <option value="om">🇪🇹 Afan Oromo</option>
                    <option value="en">🇺🇸 English</option>
                </select>
            </div>
        </nav>

        <header class="pt-32 pb-16 px-6 text-center">
            <h2 id="heroTitle" class="hero-title font-black italic text-white uppercase mb-4">
                እንኳን ወደ <span class="text-amber-500">መታሃራ</span> <br> 
                ዲጂታል ማዕከል በሰላም መጣችሁ
            </h2>
            <p id="heroDesc" class="text-slate-400 text-sm max-w-xl mx-auto italic border-l-2 border-amber-500 pl-4">
                ወቅታዊ መረጃዎች፣ የቴክኖሎጂ ውጤቶች እና የሥነ-ጽሑፍ ማዕከል
            </p>
        </header>

        <section class="max-w-5xl mx-auto px-6 py-10">
            <h3 class="text-amber-500 font-bold mb-4 uppercase italic text-sm">የዩቱዩብ ቪዲዮዎች / YOUTUBE</h3>
            <div class="aspect-video w-full rounded-3xl overflow-hidden border border-slate-800">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>

        <section class="max-w-5xl mx-auto px-6 py-10">
            <h2 id="newsHeader" class="text-2xl font-black italic text-white mb-8 border-b border-slate-800 pb-2 uppercase">ዜና / NEWS</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 group">
                    <div class="h-48 bg-slate-800 flex items-center justify-center">
                        <i class="fa-solid fa-image text-slate-700 text-4xl"></i>
                    </div>
                    <div class="p-6">
                        <span class="text-amber-500 text-[10px] font-bold">April 8, 2026</span>
                        <h3 class="text-lg font-bold mt-2 text-white">የመታሃራ ከተማ የልማት ስራዎች</h3>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        function changeLanguage() {
            const lang = document.getElementById('langSwitch').value;
            const t = {
                am: { news: "ዜና / NEWS", desc: "ወቅታዊ መረጃዎች፣ የቴክኖሎጂ ውጤቶች እና የሥነ-ጽሑፍ ማዕከል", title: "እንኳን ወደ <span class='text-amber-500'>መታሃራ</span> <br> ዲጂታል ማዕከል በሰላም መጣችሁ" },
                om: { news: "ODUU / NEWS", desc: "Oduuwwan ammee fi giddu-gala og-barruu nagaan dhufan.", title: "Baga Nagaan Gara Giddu-gala <br> <span class='text-amber-500'>Mataaharaatti</span> Dhufan" },
                en: { news: "LATEST NEWS", desc: "The latest news, technology results, and literature center.", title: "Welcome to <br> <span class='text-amber-500'>Mataaharaa</span> Digital Hub" }
            };
            
            document.getElementById('newsHeader').innerText = t[lang].news;
            document.getElementById('heroDesc').innerText = t[lang].desc;
            document.getElementById('heroTitle').innerHTML = t[lang].title;

            document.querySelectorAll('.side-item').forEach(el => {
                el.innerText = el.getAttribute(`data-${lang}`);
            });
        }
    </script>
</body>
</html>
