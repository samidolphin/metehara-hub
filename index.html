<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE | Metehara City News</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Ethiopic', sans-serif;
            background-color: #020617;
            scroll-behavior: smooth;
            color: #f1f5f9;
        }

        /* ዜናው ሲከፈት የሚመጣው ሳጥን (Modal) ስታይል */
        .news-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: rgba(2, 6, 23, 0.98);
            backdrop-filter: blur(15px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .modal-active { display: block !important; }

        .animate-slideUp {
            animation: slideUp 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ጽሁፍ በሁለት መስመር ብቻ እንዲቆረጥ */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="selection:bg-amber-500/30">

    <nav class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-slate-800 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-amber-500 p-2 rounded-xl shadow-lg shadow-amber-500/20">
                    <span class="text-slate-900 font-black text-xl">S</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">የመተሃራ ከተማ</h1>
                    <p class="text-[10px] text-amber-500 font-bold uppercase tracking-widest text-center">ወቅታዊ መረጃ</p>
                </div>
            </div>
            <button class="bg-slate-800/50 border border-slate-700 px-4 py-2 rounded-full text-xs flex items-center gap-2">
                <span>🇪🇹 አማርኛ</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 py-12">
        <div class="flex items-center gap-4 mb-10">
            <div class="h-10 w-2 bg-amber-500 rounded-full"></div>
            <h2 class="text-3xl font-black italic tracking-tighter uppercase">Featured News / ዋና ዋና ዜናዎች</h2>
        </div>

        <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <div id="newsModal" class="news-modal">
        <div class="max-w-3xl mx-auto px-6 py-12">
            <div class="flex justify-end mb-8">
                <button onclick="closeNews()" class="bg-red-500/10 text-red-500 border border-red-500/20 px-6 py-2 rounded-full font-bold text-xs tracking-widest uppercase hover:bg-red-500 hover:text-white transition-all">
                    ዝጋ / Close
                </button>
            </div>
            
            <div id="newsContent" class="animate-slideUp">
                </div>
        </div>
    </div>

    <script>
        // የዜና ዳታዎች (እዚህ ጋር የራስህን ዜና ጨምር)
        const newsData = [
            {
                title: "በመተሃራ የትራፊክ ደህንነት ሳምንት ንቅናቄ ተከበረ",
                image: "https://via.placeholder.com/800x500/1e293b/fbbf24?text=Metehara+Traffic+Safety",
                body: "በምስራቅ ሸዋ ዞን በመተሃራ ከተማ አስተዳደር የትራፊክ ደህንነት ሳምንት ንቅናቄ በደመቀ ሁኔታ ተከብሯል።",
                fullBody: "በምስራቅ ሸዋ ዞን በመተሃራ ከተማ አስተዳደር የትራፊክ ደህንነት ሳምንት ንቅናቄ በደመቀ ሁኔታ ተከብሯል። ንቅናቄው 'በእኔ ስህተት የአንድም ሰው ህይወት በትራፊክ አደጋ መጥፋት የለበትም' በሚል መሪ ቃል የተከናወነ ሲሆን፣ የከተማው እና የወረዳው ከፍተኛ አመራሮች ተገኝተዋል።",
                reporter: "ሳሚ ዶልፊን",
                date: "መጋቢት 29/2018 ዓ.ም"
            },
            {
                title: "የመተሃራ ከተማ የንፁህ መጠጥ ውሃ ፕሮጀክት 90% ደረሰ",
                image: "https://via.placeholder.com/800x500/1e293b/fbbf24?text=Water+Project",
                body: "የመተሃራ ከተማ የንፁህ መጠጥ ውሃ ፕሮጀክት ግንባታ 90 በመቶ መጠናቀቁ ተገለጸ።",
                fullBody: "ለከተማው ነዋሪዎች ትልቅ እፎይታ የሚሰጠው የንፁህ መጠጥ ውሃ ፕሮጀክት አሁን ላይ 90 በመቶ ደርሷል። በቀጣይ ጥቂት ወራት ውስጥ ሙሉ በሙሉ ተጠናቆ አገልግሎት መስጠት እንደሚጀምር የአስተዳደሩ መረጃ ያመለክታል።",
                reporter: "ሳሚ ዶልፊን",
                date: "ሚያዝያ 6/2018 ዓ.ም"
            }
        ];

        // ዜናዎችን በዋናው ገጽ ላይ ማሳያ
        function displayNews() {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = newsData.map((news, index) => `
                <div class="bg-slate-900/50 rounded-[2.5rem] border border-slate-800 overflow-hidden group hover:border-amber-500/50 transition-all duration-500 shadow-2xl">
                    <div class="h-60 overflow-hidden">
                        <img src="${news.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    </div>
                    <div class="p-8 space-y-4">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></span>
                            <span class="text-amber-500 text-[10px] font-black uppercase tracking-widest">Latest News</span>
                        </div>
                        <h3 class="text-xl font-bold leading-tight group-hover:text-amber-400 transition-colors">${news.title}</h3>
                        <p class="text-slate-400 text-sm font-light line-clamp-2">${news.body}</p>
                        <button onclick="openNews(${index})" class="pt-4 flex items-center gap-2 text-white font-black text-[10px] uppercase tracking-widest group/btn">
                            ሙሉውን አንብብ <span class="group-hover/btn:translate-x-2 transition-transform text-amber-500 text-lg">→</span>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ዜናውን መክፈቻ
        function openNews(id) {
            const data = newsData[id];
            const content = `
                <div class="space-y-8">
                    <div class="flex gap-4">
                        <div class="w-2 h-16 bg-amber-500 rounded-full"></div>
                        <h2 class="text-3xl md:text-5xl font-black leading-tight italic uppercase tracking-tighter text-white">${data.title}</h2>
                    </div>
                    <div class="flex items-center gap-4 text-slate-500 text-xs font-bold border-y border-slate-800/50 py-4 italic">
                        <span><span class="text-amber-500">|</span> [${data.reporter}]</span>
                        <span>${data.date}</span>
                    </div>
                    <img src="${data.image}" class="w-full rounded-[2rem] shadow-2xl border border-slate-800">
                    <div class="text-slate-300 text-lg md:text-xl leading-[1.8] font-light">
                        ${data.fullBody || data.body}
                    </div>
                </div>
            `;
            document.getElementById('newsContent').innerHTML = content;
            document.getElementById('newsModal').classList.add('modal-active');
            document.body.style.overflow = 'hidden';
        }

        function closeNews() {
            document.getElementById('newsModal').classList.remove('modal-active');
            document.body.style.overflow = 'auto';
        }

        // ገጹ ሲከፈት ዜናው እንዲመጣ
        window.onload = displayNews;
    </script>
</body>
</html>
