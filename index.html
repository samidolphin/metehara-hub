<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI DOLPHIN | Mataaharaa Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: #f1f5f9; overflow-x: hidden; }
        
        /* ተንቀሳቃሽ የጀርባ ምስል ማሳመሪያ (Slider) */
        #hero-slider {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-size: cover; background-position: center;
            transition: background-image 1.5s ease-in-out; /* የምስሉ መቀያየር የለሰለሰ እንዲሆን */
        }
        
        /* ምስሉ ላይ ጥቁር ድባብ ለመጨመር (Overlay) */
        .hero-overlay {
            background: linear-gradient(to right, rgba(2, 6, 23, 0.95) 30%, rgba(2, 6, 23, 0.5));
        }

        /* የግራ ሜኑ አኒሜሽን */
        .sidebar-item {
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }
        .sidebar-item:hover {
            border-left-color: #f59e0b; /* Amber color */
            background-color: rgba(245, 158, 11, 0.05);
            transform: translateX(5px);
        }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 bg-slate-950/80 backdrop-blur-md p-4 border-b border-amber-500/10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-amber-500 rounded-lg flex items-center justify-center text-slate-950 font-black text-xl">S</div>
                <h1 class="text-white font-black italic text-lg uppercase tracking-wider">SAMI-TUBE MEDIA</h1>
            </div>
            <select id="langSwitch" onchange="changeLanguage()" class="bg-slate-800 text-white text-xs p-2 rounded-lg outline-none border border-slate-700 cursor-pointer">
                <option value="am">🇪🇹 አማርኛ</option>
                <option value="om">🇪🇹 Afan Oromo</option>
                <option value="en">🇺🇸 English</option>
            </select>
        </div>
    </nav>

    <section class="relative min-h-screen flex items-center pt-20">
        <div id="hero-slider" class="hero-overlay"></div>

        <div class="max-w-7xl mx-auto px-6 w-full grid grid-cols-1 md:grid-cols-12 gap-12 items-center">
            
            <div class="md:col-span-4 space-y-4 z-10">
                <h4 class="text-amber-500 text-xs font-black uppercase tracking-[0.3em] mb-8" data-am="ሜኑ" data-om="Meeenuu" data-en="MENU">ሜኑ</h4>
                
                <div class="sidebar-item group flex items-center gap-4 p-4 rounded-xl cursor-pointer">
                    <i class="fa-solid fa-newspaper text-amber-500 text-2xl w-8 text-center"></i>
                    <div>
                        <h4 class="text-white font-bold text-sm" data-am="የቅርብ ዜና" data-om="Oduu Ammee" data-en="Latest News">የቅርብ ዜና</h4>
                        <p class="text-slate-400 text-[10px]" data-am="ወቅታዊ ኩነቶች" data-om="Gochaawwan ammee" data-en="Current events">ወቅታዊ ኩነቶች</p>
                    </div>
                </div>

                <div class="sidebar-item group flex items-center gap-4 p-4 rounded-xl cursor-pointer">
                    <i class="fa-solid fa-mountain-sun text-amber-500 text-2xl w-8 text-center"></i>
                    <div>
                        <h4 class="text-white font-bold text-sm" data-am="ቱሪዝም እና ባህል" data-om="Tuurizimii fi Aadaa" data-en="Tourism & Culture">ቱሪዝም እና ባህል</h4>
                        <p class="text-slate-400 text-[10px]" data-am="የተፈጥሮ ውበቶች" data-om="Miidhagina uumamaa" data-en="Natural beauty">የተፈጥሮ ውበቶች</p>
                    </div>
                </div>

                <div class="sidebar-item group flex items-center gap-4 p-4 rounded-xl cursor-pointer">
                    <i class="fa-solid fa-pen-nib text-amber-500 text-2xl w-8 text-center"></i>
                    <div>
                        <h4 class="text-white font-bold text-sm" data-am="ሥነ-ጽሑፍ" data-om="Og-barruu" data-en="Literature">ሥነ-ጽሑፍ</h4>
                        <p class="text-slate-400 text-[10px]" data-am="ግጥም እና ልቦለድ" data-om="Walaloo fi sheekkoo" data-en="Poetry & Fiction">ግጥም እና ልቦለድ</p>
                    </div>
                </div>

                <div class="sidebar-item group flex items-center gap-4 p-4 rounded-xl cursor-pointer">
                    <i class="fa-solid fa-microchip text-amber-500 text-2xl w-8 text-center"></i>
                    <div>
                        <h4 class="text-white font-bold text-sm" data-am="ቴክኖሎጂ" data-om="Teeknooloojii" data-en="Technology">ቴክኖሎጂ</h4>
                        <p class="text-slate-400 text-[10px]" data-am="ዲጂታል ዓለም" data-om="Addunyaa diijitaalaa" data-en="Digital world">ዲጂታል ዓለም</p>
                    </div>
                </div>
            </div>

            <div class="md:col-span-8 text-left md:pl-16 z-10 space-y-8">
                <div class="inline-block bg-amber-500/10 border border-amber-500/30 px-6 py-2 rounded-full text-[10px] text-amber-500 font-black uppercase tracking-widest animate-pulse">
                    Digital Hub
                </div>
                <h2 id="heroTitle" class="text-5xl md:text-7xl font-black italic text-white leading-tight uppercase tracking-tighter">
                    እንኳን ወደ <span class="text-amber-500 italic">መታሃራ</span> <br> 
                    ዲጂታል ማዕከል <br> 
                    በሰላም መጣችሁ
                </h2>
                <p id="heroDesc" class="text-slate-300 text-lg max-w-2xl italic border-l-4 border-amber-500 pl-8 leading-relaxed">
                    የመታሃራ ከተማን ወቅታዊ መረጃዎች፣ የቴክኖሎጂ ውጤቶች እና የሥነ-ጽሑፍ ማዕከል በሰላም ደረሳችሁ።
                </p>
                <div class="flex gap-6 pt-4">
                    <button class="bg-amber-500 text-slate-950 px-10 py-4 rounded-full font-bold text-sm hover:bg-amber-400 transition transform hover:scale-105 shadow-lg shadow-amber-500/20">ጀምር</button>
                    <button class="border border-white/20 px-10 py-4 rounded-full font-bold text-sm hover:bg-white/10 transition">ተጨማሪ አንብብ</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        // 1. የምስሎች ዝርዝር (URL) - እዚህ ጋር የምትፈልጊያቸውን ፎቶዎች መጨመር ትችያለሽ
        const images = [
            'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh_Sami_Dolphin_Hero.jpg', // ፎቶ 1 (የመታሃራ ፎቶ)
            'https://images.unsplash.com/photo-1444723121867-7a241cacace9?q=80&w=1600', // ፎቶ 2
            'https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=1600'  // ፎቶ 3
        ];

        let currentIndex = 0;
        const slider = document.getElementById('hero-slider');

        // የጀርባ ምስሉን የሚቀይር ተግባር (Function)
        function changeBackground() {
            // ምስሉን እና በላዩ ላይ ያለውን ጥቁር ድባብ (Overlay) በአንድ ላይ መጫን
            slider.style.backgroundImage = `linear-gradient(to right, rgba(2, 6, 23, 0.95) 30%, rgba(2, 6, 23, 0.5)), url('${images[currentIndex]}')`;
            // ወደ ቀጣዩ ምስል ለመሸጋገር
            currentIndex = (currentIndex + 1) % images.length;
        }

        // በየ 5 ሰከንዱ (5000 ሚሊሰከንድ) ምስሉ እንዲቀየር
        setInterval(changeBackground, 5000);
        
        // ገጹ መጀመሪያ ሲከፈት የመጀመሪያውን ምስል እንዲያሳይ
        changeBackground();

        // 2. የቋንቋ መቀየሪያ ተግባር (አጠር ያለ)
        function changeLanguage() {
            const lang = document.getElementById('langSwitch').value;
            // 'data-am' ያላቸውን ጽሁፎች በሙሉ ፈልጎ በቋንቋው ይቀይራል
            document.querySelectorAll('[data-am]').forEach(el => {
                const translation = el.getAttribute(`data-${lang}`);
                if (translation) {
                    el.innerText = translation;
                }
            });
        }
    </script>
</body>
</html>
