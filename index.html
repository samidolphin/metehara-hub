        function updateLanguage() {
            const lang = document.getElementById('languageSelector').value;
            const data = translations[lang] || translations.am;
            document.getElementById('welcomeText').innerHTML = data.welcome;
            document.getElementById('latestNewsLabel').innerText = data.label;
            
            for(let i=0; i<3; i++) {
                document.getElementById(`newsTitle${i+1}`).innerText = data.news[i].t;
                document.getElementById(`newsShort${i+1}`).innerText = data.news[i].b.substring(0, 80) + "...";
                document.getElementById(`newsImage${i+1}`).style.backgroundImage = `url('${data.news[i].img}')`;
            }
            data.nav.forEach((text, i) => {
                if(document.getElementById(`nav${i+1}`)) document.getElementById(`nav${i+1}`).innerText = text;
            });
        }

        function openModal(id) {
            const lang = document.getElementById('languageSelector').value;
            const data = (translations[lang] || translations.am).news[id-1];
            document.getElementById('modalTitle').innerText = data.t;
            document.getElementById('modalBody').innerText = data.b;
            document.getElementById('modalReporter').innerText = data.r;
            document.getElementById('modalImage').style.backgroundImage = `url('${data.img}')`;
            document.getElementById('newsModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('newsModal').style.display = 'none'; }
        window.onclick = function(e) { if (e.target == document.getElementById('newsModal')) closeModal(); }
        
        updateLanguage();
