<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | መታሃራ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body { 
            font-family: 'Noto Sans Ethiopic', sans-serif; 
            background: linear-gradient(-45deg, #020617, #0f172a, #1e293b, #020617);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white; margin: 0; overflow-x: hidden; 
        }
        .header-container { display: flex; width: 100%; border-bottom: 2px solid #f59e0b; }
        .sidebar { width: 85px; background: #0ea5e9; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-link { color: white; text-decoration: none; font-size: 0.6rem; font-weight: 800; padding: 15px 5px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .hero-box { flex-grow: 1; padding: 10px 20px; display: flex; flex-direction: column; }
        .top-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .lang-select { background: #1e293b; border: 1px solid rgba(255,255,255,0.2); font-size: 0.7rem; padding: 4px 8px; border-radius: 5px; color: white; cursor: pointer; }
        .hero-title { font-size: 1.6rem; font-weight: 900; line-height: 1.2; margin-top: 10px; }
        .hero-title span { color: #f59e0b; }
        .card { background: rgba(30, 41, 59, 0.7); padding: 15px; border-radius: 10px; border: 1px solid #0ea5e9; margin: 10px 20px; }
        .read-more { color: #f59e0b; font-size: 0.75rem; font-weight: bold; cursor: pointer; text-decoration: underline; margin-top: 8px; display: inline-block; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #0f172a; border: 2px solid #f59e0b; padding: 30px; border-radius: 15px; max-width: 600px; width: 100%; position: relative; max-height: 80vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #f59e0b; }
        .section-label { color: #f59e0b; font-weight: 900; font-size: 1.1rem; border-left: 4px solid #f59e0b; padding-left: 10px; margin: 20px; }
    </style>
</head>
<body>
    <div class="header-container">
        <aside class="sidebar">
            <a href="#" class="nav-link" id="nav1">ቅድመ ዜና</a>
            <a href="#" class="nav-link" id="nav2">ሪፖርት</a>
            <a href="#" class="nav-link" id="nav3">ቱሪዝም</a>
            <a href="#" class="nav-link" id="nav4">ባህል</a>
            <a href="#" class="nav-link" id="nav5">ስነ ጽሁፍ</a>
            <a href="#" class="nav-link" id="nav6">ቴክ</a>
            <a href="#" class="nav-link" id="nav7">ፍልስፍና</a>
        </aside>
        <section class="hero-box">
            <div class="top-row">
                <div class="flex items-center gap-2">
                    <div class="bg-amber-500 w-8 h-8 rounded flex items-center justify-center text-black font-black">S</div>
                    <h1 class="font-black italic text-[11px] uppercase tracking-tighter">SAMI-TUBE MEDIA</h1>
                </div>
                <select id="languageSelector" class="lang-select" onchange="updateLanguage()">
                    <option value="am">🇪🇹 አማርኛ</option>
                    <option value="om">Afaan Oromoo</option>
                    <option value="en">English</option>
                </select>
            </div>
            <h2 class="hero-title" id="welcomeText">እንኳን ወደ <span>መታሃራ</span><br>ዲጂታል ማዕከል በሰላም መጣችሁ</h2>
        </section>
    </div>
    <div class="full-content">
        <h3 class="section-label" id="latestNewsLabel">የቅርብ ጊዜ ዜናዎች</h3>
        <div class="card">
            <h5 class="text-amber-500 font-black mb-1" id="newsTitle1">የልማት እንቅስቃሴዎች</h5>
            <p class="text-[0.7rem] text-slate-300" id="newsShort1">በመታሃራ ከተማ እየተከናወኑ ያሉ የልማት ስራዎች መግለጫ...</p>
            <span class="read-more" id="readMore1" onclick="openModal(1)">ተጨማሪ ያንብቡ...</span>
        </div>
        <div class="card">
            <h5 class="text-amber-500 font-black mb-1" id="newsTitle2">ቱሪዝም በመታሃራ</h5>
            <p class="text-[0.7rem] text-slate-300" id="newsShort2">የመታሃራ ከተማ የቱሪስት መስህቦች እና መዳረሻዎች...</p>
            <span class="read-more" id="readMore2" onclick="openModal(2)">ተጨማሪ ያንብቡ...</span>
        </div>
        <div class="card">
            <h5 class="text-amber-500 font-black mb-1" id="newsTitle3">ስነ-ጽሁፍና ፍልስፍና</h5>
            <p class="text-[0.7rem] text-slate-300" id="newsShort3">ስለ ንቃተ ህሊና የሚያትቱ አጫጭር ጽሁፎች...</p>
            <span class="read-more" id="readMore3" onclick="openModal(3)">ተጨማሪ ያንብቡ...</span>
        </div>
    </div>
    <div id="newsModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" class="text-amber-500 font-black text-xl mb-4"></h2>
            <p id="modalBody" class="text-slate-200 leading-relaxed text-sm"></p>
        </div>
    </div>
    <script>
        const translations = {
            am: {
                welcome: "እንኳን ወደ <span>መታሃራ</span><br>ዲጂታል ማዕከል በሰላም መጣችሁ",
                label: "የቅርብ ጊዜ ዜናዎች",
                readMore: "ተጨማሪ ያንብቡ...",
                nav: ["ቅድመ ዜና", "ሪፖርት", "ቱሪዝም", "ባህል", "ስነ ጽሁፍ", "ቴክ", "ፍልስፍና"],
                news: [
                    { t: "የልማት እንቅስቃሴዎች", s: "በመታሃራ ከተማ እየተከናወኑ ያሉ የልማት ስራዎች...", b: "የመታሃራ ከተማ አስተዳደር የህዝቡን የንጹህ መጠጥ ውሃ ጥያቄ ለመመለስ እና የመሰረተ ልማት ስራዎችን ለማጠናከር በከፍተኛ ትጋት እየሰራ ይገኛል። በቅርቡ የተጀመሩ የሪቨርሳይድ ፓርክ ስራዎችም ለከተማዋ አዲስ ገጽታ እየሰጡ ነው።" },
                    { t: "ቱሪዝም በመታሃራ", s: "የመታሃራ ከተማ የቱሪስት መስህቦች...", b: "መታሃራ በተፈጥሮ ሀብቷ እና በቱሪስት መዳረሻዎቿ የምትታወቅ ከተማ ናት። የከተማው አስተዳደር ቱሪዝምን ለማሳደግ እና አለም አቀፍ ጎብኚዎችን ለመሳብ የተለያዩ የፕሮሞሽን ስራዎችን እየሰራ ነው።" },
                    { t: "ስነ-ጽሁፍና ፍልስፍና", s: "ስለ ንቃተ ህሊና የሚያትቱ ጽሁፎች...", b: "የሰው ልጅ ንቃተ ህሊና እና የአስተሳሰብ ለውጥ ለስኬት ያለው ሚና ከፍተኛ ነው። በዚህ ክፍል ጥልቅ ፍልስፍናዊ ጽሁፎችን፣ ስለ ስቶይሲዝም እና ስለ አእምሮ ፕሮግራም ዝርዝር ትንታኔዎችን እናቀርባለን።" }
                ]
            },
            om: {
                welcome: "Baga gara jiddu-gala dijitaalaa <span>Mataaharaatti</span> nagaan dhuftan",
                label: "Oduuwwan dhihoo",
                readMore: "Dabalata dubbisuuf...",
                nav: ["Oduu Duraa", "Gabaasa", "Turiizimii", "Aadaa", "Og-barruu", "Teek", "Falaasama"],
                news: [
                    { t: "Misooma Magaalaa", s: "Hojiiwwan misoomaa magaalaa Mataaharaa...", b: "Bulchiinsi magaalaa Mataaharaa gaaffii bishaan dhugaatii qulqulluu deebisuufi hojiiwwan bu'uraalee misoomaa cimsuuf hojjechaa jira. Hojiin paarkii qarqara bishaanis magaalattiif bifa haaraa kennaa jira." },
                    { t: "Turiizimii Mataaharaa", s: "Bakkeewwan turiizimii Mataaharaa...", b: "Mataaharaan qabeenya uumamaa fi bakkeewwan turiizimiin beekamti. Bulchiinsi magaalaa turiizimii guddisuuf hojjechaa jira." },
                    { t: "Og-barruu fi Falaasama", s: "Barreeffamoota waa'ee sammuu...", b: "Jiddu-galli kun barreeffamoota falaasama gadi fagoo fi jijjiirama sammuu irratti xiyyeeffatan dhiyeessa." }
                ]
            },
            en: {
                welcome: "Welcome to <span>Metehara</span> Digital Hub",
                label: "Latest News",
                readMore: "Read More...",
                nav: ["Pre-News", "Report", "Tourism", "Culture", "Literature", "Tech", "Philosophy"],
                news: [
                    { t: "Development Projects", s: "Development works in Metehara city...", b: "The Metehara city administration is working diligently to address the demand for clean drinking water and strengthen infrastructure. Recent riverside park developments are giving the city a new look." },
                    { t: "Tourism in Metehara", s: "Tourist attractions in Metehara...", b: "Metehara is known for its natural resources and tourist destinations. The administration is working to promote local tourism and attract international visitors." },
                    { t: "Literature & Philosophy", s: "Articles on consciousness...", b: "This section explores deep philosophical thoughts on human consciousness, mindset, Stoicism, and personal growth." }
                ]
            }
        };
        function updateLanguage() {
            const lang = document.getElementById('languageSelector').value;
            const data = translations[lang];
            document.getElementById('welcomeText').innerHTML = data.welcome;
            document.getElementById('latestNewsLabel').innerText = data.label;
            data.nav.forEach((text, i) => document.getElementById(`nav${i+1}`).innerText = text);
            for(let i=0; i<3; i++) {
                document.getElementById(`newsTitle${i+1}`).innerText = data.news[i].t;
                document.getElementById(`newsShort${i+1}`).innerText = data.news[i].s;
                document.getElementById(`readMore${i+1}`).innerText = data.readMore;
            }
        }
        function openModal(id) {
            const lang = document.getElementById('languageSelector').value;
            const data = translations[lang].news[id-1];
            document.getElementById('modalTitle').innerText = data.t;
            document.getElementById('modalBody').innerText = data.b;
            document.getElementById('newsModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('newsModal').style.display = 'none'; }
        window.onclick = function(event) { if (event.target == document.getElementById('newsModal')) closeModal(); }
    </script>
</body>
</html>
