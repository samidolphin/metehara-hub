<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Final Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; }
        
        /* Motion Animations */
        @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        .animate-text { animation: slideIn 1s ease-out forwards; }
        
        .hero-section { display: flex; height: 70vh; overflow: hidden; position: relative; }
        .side-menu { background-color: #0c82cf; width: 140px; display: flex; flex-direction: column; justify-content: center; gap: 15px; z-index: 10; }
        .menu-item { color: white; font-size: 0.8rem; font-weight: 700; text-align: center; cursor: pointer; transition: 0.3s; }
        .menu-item:hover { color: #f59e0b; }

        .bg-layer { position: absolute; inset: 0 0 0 140px; background-size: cover; background-position: center; transition: opacity 1.5s; opacity: 0; }
        .bg-layer.active { opacity: 1; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(2,6,23,0.9) 0%, rgba(2,6,23,0.3) 100%); z-index: 2; }
    </style>
</head>
<body>

    <header class="p-4 flex justify-between items-center bg-[#020617] border-b border-white/5 relative z-30">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-500 rounded-lg flex items-center justify-center text-slate-950 font-black text-xl">S</div>
            <div>
                <h1 class="text-white font-black italic text-md uppercase">SAMI-TUBE MEDIA</h1>
                <p class="text-amber-500 text-[8px] font-bold uppercase tracking-widest">Digital Excellence</p>
            </div>
        </div>

        <select id="langSelect" onchange="changeLanguage()" class="bg-slate-800 text-white text-xs px-3 py-2 rounded border border-white/10 outline-none cursor-pointer">
            <option value="am">🇪🇹 አማርኛ</option>
            <option value="om">Afan Oromo</option>
            <option value="en">English</option>
        </select>
    </header>

    <div class="hero-section">
        <nav class="side-menu shadow-2xl" id="navMenu">
            <div class="menu-item" data-key="m1">ቅድመ ዜና</div>
            <div class="menu-item" data-key="m2">ሪፖርት</div>
            <div class="menu-item" data-key="m3">ቱሪዝም</div>
            <div class="menu-item" data-key="m4">ባህል</div>
            <div class="menu-item" data-key="m5">ስነ-ጽሑፍ</div>
            <div class="menu-item" data-key="m6">ቴክ</div>
            <div class="menu-item" data-key="m7">ፍልስፍና</div>
        </nav>

        <div id="bg-container">
            <div class="bg-layer active" style="background-image: url('https://images.unsplash.com/photo-1451187530220-a093f13aeeef?q=80&w=1200')"></div>
            <div class="bg-layer" style="background-image: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=1200')"></div>
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-content relative z-10 flex-grow flex flex-col justify-center items-center text-center px-4 animate-text">
            <h2 id="heroTitle" class="text-3xl md:text-5xl font-black leading-tight">እንኳን ወደ <span class="text-amber-500 italic">መታሃራ</span> <br> ዲጂታል ማዕከል በሰላም መጣችሁ</h2>
            <p id="heroSub" class="mt-4 text-slate-300 italic text-xs">ወቅታዊ መረጃዎች፣ የቴክኖሎጂ ውጤቶች እና የሥነ-ጽሑፍ ማዕከል</p>
        </div>
    </div>

    <main class="max-w-5xl mx-auto p-6">
        <section class="mb-12">
            <h3 id="ytLabel" class="text-amber-500 font-black italic text-lg mb-6 border-l-4 border-amber-500 pl-3">የዩቱዩብ ቪዲዮዎች / YOUTUBE</h3>
            <div class="rounded-3xl overflow-hidden shadow-2xl aspect-video bg-slate-900">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>

        <section id="newsSection">
            <h3 id="newsLabel" class="text-amber-500 font-black italic text-lg mb-6 border-l-4 border-amber-500 pl-3">ዜና / NEWS</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="newsGrid">
                </div>
        </section>
    </main>

    <script>
        const translations = {
            am: {
                heroTitle: "እንኳን ወደ <span class='text-amber-500 italic'>መታሃራ</span> <br> ዲጂታል ማዕከል በሰላም መጣችሁ",
                heroSub: "ወቅታዊ መረጃዎች፣ የቴክኖሎጂ ውጤቶች እና የሥነ-ጽሑፍ ማዕከል",
                ytLabel: "የዩቱዩብ ቪዲዮዎች / YOUTUBE",
                newsLabel: "ዜና / NEWS",
                menu: ["ቅድመ ዜና", "ሪፖርት", "ቱሪዝም", "ባህል", "ስነ-ጽሑፍ", "ቴክ", "ፍልስፍና"],
                news: [{title: "የመታሃራ ከተማ አዲሱ የልማት ገጽታ", date: "ሚያዝያ 1, 2018"}]
            },
            om: {
                heroTitle: "Baga gara giddu-gala <br> <span class='text-amber-500 italic'>Mataaharaa</span> nagaan dhuftan",
                heroSub: "Oduuwwan yeroo, bu'aalee teeknooloojii fi giddu-gala og-barruu",
                ytLabel: "Viidiyoowwan Youtube",
                newsLabel: "ODUU",
                menu: ["Dur-oduu", "Gabaasa", "Turizimii", "Aadaa", "Og-barruu", "Teek", "Filoosoofii"],
                news: [{title: "Mataaharaa: Sagantaa misooma haaraa", date: "Eebila 1, 2026"}]
            },
            en: {
                heroTitle: "Welcome to <span class='text-amber-500 italic'>Metehara</span> <br> Digital Hub",
                heroSub: "Latest updates, technology results, and literary center",
                ytLabel: "YOUTUBE VIDEOS",
                newsLabel: "LATEST NEWS",
                menu: ["Pre-News", "Report", "Tourism", "Culture", "Literature", "Tech", "Philosophy"],
                news: [{title: "Metehara's New Development Image", date: "April 9, 2026"}]
            }
        };

        function changeLanguage() {
            const lang = document.getElementById('langSelect').value;
            const data = translations[lang];

            document.getElementById('heroTitle').innerHTML = data.heroTitle;
            document.getElementById('heroSub').innerText = data.heroSub;
            document.getElementById('ytLabel').innerText = data.ytLabel;
            document.getElementById('newsLabel').innerText = data.newsLabel;

            const menuItems = document.querySelectorAll('.menu-item');
            menuItems.forEach((item, index) => { if(data.menu[index]) item.innerText = data.menu[index]; });

            loadNews(lang);
        }

        function loadNews(lang) {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = translations[lang].news.map(n => `
                <div class="bg-slate-900/50 rounded-2xl overflow-hidden border border-white/5 p-4">
                    <div class="h-40 bg-slate-800 rounded-xl mb-4 bg-cover" style="background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?w=400')"></div>
                    <p class="text-amber-500 text-[10px] font-bold mb-1">${n.date}</p>
                    <h4 class="font-bold italic text-lg">${n.title}</h4>
                </div>
            `).join('');
        }

        // Background Motion
        const layers = document.querySelectorAll('.bg-layer');
        let current = 0;
        setInterval(() => {
            layers[current].classList.remove('active');
            current = (current + 1) % layers.length;
            layers[current].classList.add('active');
        }, 5000);

        window.onload = () => loadNews('am');
    </script>
</body>
</html>
