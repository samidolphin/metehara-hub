<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; }
        .hero-section { display: flex; height: 60vh; position: relative; overflow: hidden; }
        .side-menu { background-color: #0c82cf; width: 80px; display: flex; flex-direction: column; justify-content: center; gap: 20px; z-index: 30; }
        .menu-item { color: white; font-size: 0.6rem; font-weight: 900; text-align: center; cursor: pointer; }
        #bg-slider { position: absolute; inset: 0 0 0 80px; z-index: 1; }
        .slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 2s ease-in-out; }
        .slide.active { opacity: 1; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(2,6,23,0.95) 0%, rgba(2,6,23,0.3) 100%); z-index: 5; }
        .news-card { background: #0f172a; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.4s; height: 100%; display: flex; flex-direction: column; }
        .news-card:hover { border-color: #f59e0b; transform: translateY(-8px); }
        .news-img { height: 220px; background-size: cover; background-position: center; width: 100%; background-color: #1e293b; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 20px; border: 2px solid #f59e0b; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .modal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px); padding: 20px; overflow-y: auto; }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; }
        .modal-content { background: #0f172a; border-radius: 30px; padding: 35px; max-width: 850px; width: 100%; margin: 30px auto; position: relative; border: 1px solid #f59e0b; }
        .close-btn { background: #f59e0b; color: black; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; float: right; margin-bottom: 15px; }
    </style>
</head>
<body>

    <header class="p-4 flex justify-between items-center bg-[#020617] border-b border-white/5 sticky top-0 z-50">

    <script>
        const content = {
            am: {
                heroTitle: 'ወደ ማታሃራ ዲጂታል መረጃ መረብ በደህና መጡ',
                heroSub: 'ወቅታዊ የከተማዋን መረጃዎች እና የልማት ስራዎችን በአንድ ቦታ ያግኙ።',
                videoLabel: 'የቱሪስት ኢንተርቪው | ከመተሃራ እንግዶች ጋር',
                newsLabel: 'የቅርብ ጊዜ ዜናዎች',
                news: [
                    { t: "አቶ አዲሱ ዋቆ በማታሃራ ከተማ ያስመዘገቧቸው የልማት ስራዎች", i: "mayor-addisu-wako~2.jpg", d: "ከንቲባ አቶ አዲሱ ዋቆ እያከናወኗቸው ያሉ የልማትና የመልካም አስተዳደር ስራዎች የከተማዋን ገጽታ ከመቀየር ባለፈ ለነዋሪዎች ምቾት ትልቅ አስተዋጽኦ እያበረከቱ መሆኑ ተነገረ።", f: "የማታሃራ ከተማ ከንቲባ አቶ አዲሱ ዋቆ ወደ ስልጣን ከመጡ ጊዜ ጀምሮ በከተማዋ በርካታ የልማት ስራዎች እየተከናወኑ ይገኛሉ። በተለይም የመሰረተ ልማት ዝርጋታ፣ የከተማ ውበት እና የመልካም አስተዳደር ስራዎች ላይ ትኩረት በማድረግ የነዋሪዎችን የኑሮ ደረጃ ለማሻሻል በቁርጠኝነት እየሰሩ መሆኑን የከተማዋ ነዋሪዎች ይመሰክራሉ። ዛሬም ይህ የልማት ጉዞ ተጠናክሮ ቀጥሏል።\n\nዘጋቢ፡ ሳምሶን ተስፋዬ" },
                    { t: "የማታሃራ ከተማ የንፁህ መጠጥ ውሃ ፕሮጀክት የ90% መጠናቀቅ", i: "Lumii_20260412_180356344~2.jpg", d: "የከተማዋን የውሃ ችግር በዘላቂነት የሚፈታው ግዙፍ ፕሮጀክት ከ1.4 ቢሊዮን ብር በላይ ወጪ እየተከናወነ ይገኛል።", f: "ለበርካታ አመታት የማታሃራ ከተማ ነዋሪዎች ዋነኛ ጥያቄ የነበረው የንፁህ መጠጥ ውሃ እጥረት በዘላቂነት ለመፍታት ታስቦ የተጀመረው ግዙፍ የውሃ ፕሮጀክት አሁን ላይ 90 በመቶ መጠናቀቁ ተበሰረ። በከፍተኛ በጀት (ከ1.4 ቢሊዮን ብር በላይ) እየተገነባ ያለው ይህ ፕሮጀክት ሲጠናቀቅ ከተማዋን እና አካባቢውን ለቀጣይ 20 አመታት ያለምንም የውሃ እጥረት ማገልገል የሚችል አቅም አለው ተብሏል።" },
                    { t: "የስነ-ህይወት ጥበብ በበሰቃ ሃይቅ ዳርቻ፤ የብርቱካን እርሻ", i: "Lumii_20260412_180443961~2.jpg", d: "በኑራኤራ እርሻ ልማት ባለሙያዎች የሚከናወነው ሳይንሳዊ የመግረዝ ስራ ምርታማነትን እያረጋገጠ ነው።", f: "በማታሃራ ከተማ አዋሳኝ በሚገኘው የበሰቃ ሃይቅ ዳርቻ ላይ የሚገኙ የብርቱካን እርሻዎች በከፍተኛ የግብርና ጥበብ እየለሙ ይገኛሉ። የኑራኤራ እርሻ ልማት ባለሙያዎች እንደሚገልጹት፣ ሳይንሳዊ የመግረዝ (Pruning) ዘዴዎችን በመጠቀም የዛፎቹን ምርታማነት ማሳደግ ተችሏል። ይህ ልምድ ለሌሎች አርሶ አደሮችም እንደ አርአያነት የሚጠቀስ ሲሆን፣ የአካባቢውን የኢኮኖሚ እንቅስቃሴ እያነቃቃ ይገኛል።" }
                ]
            },
            om: {
                heroTitle: 'Marsariitii Odeeffannoo Magaalaa Mataaharaatti Baga Nagaan Dhuftan',
                heroSub: 'Odeeffannoowwan yeroo fi misooma magaalaa bakka tokkotti argattu.',
                videoLabel: 'Gaaffii fi Deebii Turistootaa | Mataaharaatti',
                newsLabel: 'Oduuwwan dhihoo',
                news: [
                    { t: "Hojiiwwan Misoomaa Obbo Addisuu Waaqoo", i: "mayor-addisu-wako~2.jpg", d: "Kantiibaan magaalaa Mataaharaa Obbo Addisuu Waaqoo hojiiwwan misoomaa fi bulchiinsa gaarii hojjachaa jiran.", f: "Mataaharaa — Kantiibaan magaalaa Mataaharaa Obbo Addisuu Waaqoo erga gara aangoo dhufanii as hojiiwwan misoomaa hedduu hojjachaa jiru. Keessattuu hojiiwwan bu'uraalee misoomaa irratti xiyyeeffachuun jireenya hawaasaa fooyyessaa jiru." },
                    { t: "Pirojektii Bishaan Dhugaatii Magaalaa Mataaharaa", i: "Lumii_20260412_180356344~2.jpg", d: "Pirojektiin bishaan dhugaatii birrii biliyoona 1.4 oliin hojjetamaa jiru kun xumuramaa jira.", f: "Pirojektiin bishaan dhugaatii magaalaa Mataaharaa baasii guddaadhaan hojjetamaa jiru kun dhibbeentaa 90 oliin xumurameera. Pirojektiin kun yeroo xumuramu rakkoo bishaan dhugaatii magaalaa keenyaa bu'uraan fura jedhamee eegama." },
                    { t: "Misooma Oomisha Birtukaanaa Qarqara Garba Basakaatti", i: "Lumii_20260412_180443961~2.jpg", d: "Hojjettoota ogummaa qabaniin hojiin mirmirsuu (Pruning) oomishitummaa guddisee jira.", f: "Mataaharaatti qarqara garba Basakaatti misoomni birtukaanaa haala saayinsaawaa ta'een hojjetamaa jira. Ogummaa mirmirsuu (Pruning) fayyadamuun oomisha fooyya'aa argachuun danda'ameera." }
                ]
            },
            en: {
                heroTitle: 'Welcome to Mataaharaa Digital Information Hub',
                heroSub: 'Get the latest city news and development updates in one place.',
                videoLabel: 'Tourist Interview | Guests in Mataaharaa',
                newsLabel: 'Latest News',
                news: [
                    { t: "Mayor Addisu Wako's Development Projects", i: "mayor-addisu-wako~2.jpg", d: "The leadership and development initiatives of Mayor Addisu Wako are creating a better environment.", f: "Mataaharaa — Mayor Addisu Wako has been leading significant urban development projects since taking office. His focus on infrastructure and good governance has been highly praised by the local community." },
                    { t: "Mataaharaa Water Project Reaches 90% Completion", i: "Lumii_20260412_180356344~2.jpg", d: "The 1.4 billion birr water project is nearing its final stage.", f: "The massive water project in Mataaharaa, costing over 1.4 billion Birr, is now 90% complete. This project is expected to solve the clean water shortage in the city for the next two decades." },
                    { t: "Scientific Citrus Farming at Lake Beseka Shore", i: "Lumii_20260412_180443961~2.jpg", d: "Professional pruning techniques by experts are ensuring high agricultural productivity.", f: "Professional citrus farming at the shores of Lake Beseka is showing great results. Using scientific pruning methods, local experts have managed to significantly increase the yield of orange plantations." }
                ]
            }
        };

        function updateContent() {
            const lang = document.getElementById('langSelect').value;
            const data = content[lang];
            document.getElementById('heroTitle').innerText = data.heroTitle;
            document.getElementById('heroSub').innerText = data.heroSub;
            document.getElementById('videoLabel').innerText = data.videoLabel;
            document.getElementById('newsLabel').innerText = data.newsLabel;

            const grid = document.getElementById('newsGrid');
            grid.innerHTML = data.news.map((n, index) => `
                <div class="news-card group" onclick="openModal('${lang}', ${index})">
                    <div class="news-img" style="background-image: url('${n.i}')"></div>
                    <div class="p-6">
                        <h4 class="font-black italic text-amber-500 mb-3 text-base leading-tight">${n.t}</h4>
                        <p class="text-slate-400 text-[11px] leading-relaxed mb-6">${n.d}</p>
                        <span class="text-white text-[10px] font-black uppercase tracking-widest border-t border-white/5 pt-3 block group-hover:text-amber-500 transition-colors">ሙሉውን አንብብ / READ FULL REPORT</span>
                    </div>
                </div>
            `).join('');
        }

        function openModal(lang, index) {
            const item = content[lang].news[index];
            document.getElementById('modalImg').style.backgroundImage = `url('${item.i}')`;
            document.getElementById('modalTitle').innerText = item.t;
            document.getElementById('modalBody').innerText = item.f;
            document.getElementById('newsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('newsModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        let current = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 5000);

        window.onload = updateContent;
    </script>
</body>
</html>
