<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Motion Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans Ethiopic', sans-serif; 
            background-color: #020617; 
            color: white; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* ጽሑፎች ገጹ ሲከፈት የሚኖራቸው እንቅስቃሴ (Fade In Up) */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-content {
            animation: fadeInUp 1s ease-out forwards;
        }

        /* Hero Section Styling */
        .hero-section {
            display: flex;
            height: 75vh;
            min-height: 550px;
            position: relative;
        }

        /* የጎን ሰማያዊ ዝርዝር */
        .side-menu {
            background-color: #0c82cf;
            width: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
            flex-shrink: 0;
            z-index: 20;
        }

        .menu-item {
            color: white;
            font-size: 0.85rem;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .menu-item:hover {
            color: #f59e0b;
            transform: translateX(5px);
        }

        /* የሚንቀሳቀስ የጀርባ ምስል (Motion Background) */
        #hero-bg {
            flex-grow: 1;
            position: relative;
            background-size: cover;
            background-position: center;
            transition: background-image 1.5s ease-in-out; /* የምስሉ መቀያየር ለስላሳ እንዲሆን */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(2,6,23,0.8), rgba(2,6,23,0.3));
        }

        .hero-title {
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            line-height: 1.1;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <header class="p-5 flex justify-between items-center bg-[#020617] border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-amber-500 rounded-xl flex items-center justify-center text-slate-950 font-black text-2xl shadow-lg">S</div>
            <div>
                <h1 class="text-white font-black italic text-lg tracking-tighter uppercase leading-none">SAMI-TUBE MEDIA</h1>
                <p class="text-amber-500 text-[9px] font-bold uppercase tracking-widest mt-1">Digital Excellence</p>
            </div>
        </div>
    </header>

    <div class="hero-section">
        <nav class="side-menu shadow-2xl">
            <div class="menu-item">ቅድመ ዜና</div>
            <div class="menu-item">ሪፖርት</div>
            <div class="menu-item">ቱሪዝም</div>
            <div class="menu-item">ባህል</div>
            <div class="menu-item">ስነ-ጽሑፍ</div>
            <div class="menu-item">ቴክ</div>
            <div class="menu-item">ኢንተርቪው</div>
            <div class="menu-item">ፍልስፍና</div>
        </nav>

        <div id="hero-bg">
            <div class="hero-overlay"></div>
            <div class="hero-content relative z-10 text-center px-4 animate-content">
                <h2 class="hero-title">
                    እንኳን ወደ <span class="text-amber-500">መታሃራ</span> <br> 
                    ዲጂታል ማዕከል በሰላም መጣችሁ
                </h2>
                <div class="h-1 w-24 bg-amber-500 mx-auto mt-6 rounded-full"></div>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-8">
        <section class="mt-12">
            <div class="flex items-center gap-3 mb-8">
                <div class="h-8 w-1.5 bg-amber-500 rounded-full"></div>
                <h3 class="text-amber-500 font-black italic text-xl uppercase">የዩቱዩብ ቪዲዮዎች / YOUTUBE</h3>
            </div>
            
            <div class="rounded-[32px] overflow-hidden shadow-2xl border border-white/10 aspect-video">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>
    </main>

    <script>
        // 1. የጀርባ ምስሎችን በየ 5 ሰከንዱ የመቀየር ሞሽን
        const images = [
            'https://images.unsplash.com/photo-1451187530220-a093f13aeeef?q=80&w=1200',
            'https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=1200',
            'https://images.unsplash.com/photo-1534067783941-51c9c23ecefd?q=80&w=1200'
        ];
        
        let currentIndex = 0;
        const heroBg = document.getElementById('hero-bg');

        function updateBackground() {
            heroBg.style.backgroundImage = `url('${images[currentIndex]}')`;
            currentIndex = (currentIndex + 1) % images.length;
        }

        // ገጹ ሲከፈት ወዲያው እንዲጀምር
        updateBackground();
        // በየ 5000 ሚሊ ሰከንድ (5 ሰከንድ) እንዲቀየር
        setInterval(updateBackground, 5000);
    </script>
</body>
</html>
