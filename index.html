<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Mataaharaa Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; }
        
        /* የላይኛው ክፍል አደራደር */
        .hero-container { display: flex; height: 75vh; position: relative; overflow: hidden; }

        /* የግራ ሰማያዊ ዝርዝር - እዚህ ክፍል ላይ ብቻ ነው የሚወሰነው */
        .blue-sidebar {
            background-color: #0c82cf;
            width: 110px;
            height: 100%; /* ከ Hero ክፍል ጋር እኩል ይሆናል */
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 20px 0;
            z-index: 10;
        }

        .side-item {
            font-size: 0.7rem;
            color: white;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .side-item:hover { color: #f59e0b; transform: scale(1.1); }

        /* ተንቀሳቃሽ የጀርባ ምስል ክፍል */
        .hero-motion {
            flex-grow: 1;
            position: relative;
            background-size: cover;
            background-position: center;
            transition: background-image 1.5s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero-overlay { position: absolute; inset: 0; background: rgba(2, 6, 23, 0.6); }

        /* የታችኛው ይዘት - ሙሉ ስፋት (Full Width) */
        .bottom-content { width: 100%; padding: 40px 20px; }
        
        .hero-title { font-size: clamp(1.4rem, 5vw, 2.8rem); line-height: 1.2; font-weight: 900; z-index: 5; text-align: center; }
    </style>
</head>
<body>

    <div class="hero-container">
        <div class="blue-sidebar shadow-xl">
            <div class="side-item">ቅድመ ዜና</div>
            <div class="side-item">ሪፖርት</div>
            <div class="side-item">ቱሪዝም</div>
            <div class="side-item">ባህል</div>
            <div class="side-item">ስነ ጽሁፍ</div>
            <div class="side-item">ቴክ</div>
            <div class="side-item">ፍልስፍና</div>
        </div>

        <div id="heroBG" class="hero-motion">
            <div class="hero-overlay"></div>
            <h2 id="heroTitle" class="hero-title italic text-white uppercase relative">
                እንኳን ወደ <span class="text-amber-500">መታሃራ</span> <br> 
                ዲጂታል ማዕከል በሰላም መጣችሁ
            </h2>
        </div>
    </div>

    <div class="bottom-content max-w-6xl mx-auto">
        
        <section class="mb-16">
            <h3 class="text-amber-500 font-black italic mb-6 uppercase text-sm border-l-4 border-amber-500 pl-3">የዩቱዩብ ቪዲዮዎች / YOUTUBE</h3>
            <div class="w-full aspect-video rounded-3xl overflow-hidden border border-slate-800 shadow-2xl">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>

        <section class="mb-20">
            <h2 class="text-2xl font-black italic text-white mb-8 border-b border-slate-800 pb-2 uppercase">ዜና / NEWS</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-slate-900/60 rounded-3xl overflow-hidden border border-slate-800 group hover:border-amber-500 transition-all">
                    <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=800" class="w-full h-56 object-cover group-hover:scale-105 transition-transform duration-500">
                    <div class="p-6">
                        <span class="text-amber-500 text-[10px] font-bold">April 8, 2026</span>
                        <h3 class="text-xl font-bold mt-2 text-white italic">የመታሃራ ከተማ አዲሱ የልማት ገጽታ</h3>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <script>
        // የጀርባ ምስል መቀያየሪያ
        const images = [
            'https://images.unsplash.com/photo-1451187530220-a093f13aeeef?q=80&w=1200',
            'https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=1200',
            'https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1200'
        ];
        let currentIndex = 0;
        const heroBG = document.getElementById('heroBG');

        function changeBG() {
            heroBG.style.backgroundImage = `url('${images[currentIndex]}')`;
            currentIndex = (currentIndex + 1) % images.length;
        }
        setInterval(changeBG, 4000);
        changeBG();
    </script>
</body>
</html>
