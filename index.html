<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE | Metehara Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Ethiopic', sans-serif;
            background-color: #020617;
            color: #f1f5f9;
            margin: 0;
            overflow-x: hidden;
        }

        /* ዜናው ሲከፈት የሚመጣው ገጽ ስታይል */
        .news-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: #020617;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .modal-active { display: block !important; }

        .animate-slideUp {
            animation: slideUp 0.6s cubic-bezier(0.2, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="selection:bg-amber-500/30">

    <nav class="sticky top-0 z-50 bg-slate-900/95 backdrop-blur-md border-b border-slate-800 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-amber-500 p-2 rounded-xl shadow-lg shadow-amber-500/20">
                    <span class="text-slate-900 font-black text-xl">S</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold italic">የመተሃራ ከተማ</h1>
                    <p class="text-[9px] text-amber-500 font-bold uppercase tracking-widest">SAMI-TUBE NEWS</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <button class="text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </button>
                <div class="bg-slate-800 border border-slate-700 px-4 py-2 rounded-full text-xs flex items-center gap-2">
                    <span>🇪🇹 አማርኛ</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 py-12">
        <div class="flex items-center gap-4 mb-10">
            <div class="h-10 w-2 bg-amber-500 rounded-full shadow-[0_0_15px_rgba(245,158,11,0.5)]"></div>
            <h2 class="text-2xl font-black italic uppercase tracking-tighter">FEATURED NEWS / ዋና ዋና ዜናዎች</h2>
        </div>

        <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-slate-500 italic">ዜናዎች በመጫን ላይ...</p>
        </div>
    </main>

    <div id="newsModal" class="news-modal">
        <div class="max-w-3xl mx-auto px-6 py-12">
            <div class="flex justify-end mb-8">
                <button onclick="closeNews()" class="bg-red-500/10 text-red-500 border border-red-500/20 px-8 py-3 rounded-full font-bold text-xs uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all">
                    ዝጋ / CLOSE
                </button>
            </div>
            <div id="newsContent" class="animate-slideUp"></div>
        </div>
    </div>

    <script>
        // አራቱ ዜናዎች በዝርዝር
        const newsData = [
            {
                title: "በመተሃራ የትራፊክ ደህንነት ሳምንት ንቅናቄ በደመቀ ሁኔታ ተከበረ",
                image: "https://images.unsplash.com/photo-1545147418-409e214a7c04?q=80&w=800",
                body: "በእኔ ስህተት የአንድም ሰው ህይወት በትራፊክ አደጋ መጥፋት የለበትም በሚል መሪ ቃል ንቅናቄው ተካሂዷል።",
                fullBody: "በምስራቅ ሸዋ ዞን በመተሃራ ከተማ አስተዳደር የትራፊክ ደህንነት ሳምንት ንቅናቄ በደመቀ ሁኔታ ተከብሯል። ንቅናቄው 'በእኔ ስህተት የአንድም ሰው ህይወት በትራፊክ አደጋ መጥፋት የለበትም' በሚል መሪ ቃል የተከናወነ ሲሆን፣ የከተማው እና የወረዳው ከፍተኛ አመራሮች ተገኝተዋል።",
                reporter: "ሳሚ ዶልፊን",
                date: "መጋቢት 29/2018 ዓ.ም"
            },
            {
                title: "የመተሃራ ከተማ የንፁህ መጠጥ ውሃ ፕሮጀክት የ90% መጠናቀቅ ደረጃ ላይ ደረሰ",
                image: "https://images.unsplash.com/photo-1541944743827-e04bb645d994?q=80&w=800",
                body: "ለከተማው ነዋሪዎች ትልቅ እፎይታ የሚሰጠው የንፁህ መጠጥ ውሃ ፕሮጀክት አሁን ላይ 90 በመቶ ደርሷል።",
                fullBody: "ለከተማው ነዋሪዎች ትልቅ እፎይታ የሚሰጠው የንፁህ መጠጥ ውሃ ፕሮጀክት አሁን ላይ 90 በመቶ መጠናቀቁ ተገልጿል። በቀጣይ ጥቂት ወራት ውስጥ ሙሉ በሙሉ ተጠናቆ አገልግሎት መስጠት እንደሚጀምር ይጠበቃል።",
                reporter: "ሳሚ ዶልፊን",
                date: "ሚያዝያ 6/2018 ዓ.ም"
            },
            {
                title: "የባሳቃ ሐይቅ ዳርቻ የልማት ስራዎች ተጠናክረው ቀጥለዋል",
                image: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=800",
                body: "የባሳቃ ሐይቅን ለቱሪዝም እና ለከተማ ውበት ለማዋል የሚሰሩ የልማት ስራዎች ተስፋ ሰጪ ደረጃ ላይ ናቸው።",
                fullBody: "የባሳቃ ሐይቅን ዳርቻ በማልማት ለከተማዋ ተጨማሪ ውበት እና የቱሪስት መስህብ ለማድረግ የታለሙ ስራዎች በፍጥነት እየተከናወኑ ይገኛሉ። ይህ ፕሮጀክት የከተማዋን ገጽታ ከመቀየር ባለፈ ለወጣቶች የስራ እድል ይፈጥራል።",
                reporter: "ሳሚ ዶልፊን",
                date: "ሚያዝያ 7/2018 ዓ.ም"
            },
            {
                title: "የብርቱካን ምርት በከተማዋ ዳርቻ በሚገኙ እርሻዎች እየተሰበሰበ ይገኛል",
                image: "https://images.unsplash.com/photo-1611080626919-7cf5a969fc8f?q=80&w=800",
                body: "በመተሃራ ከተማ ዙሪያ የሚገኙ የብርቱካን እርሻዎች ምርት መስጠት በመጀመራቸው ለገበያ እየቀረበ ነው።",
                fullBody: "የመተሃራ አካባቢ ለብርቱካን እና ለሎሚ ምርት ተስማሚ በመሆኑ፣ አርሶ አደሮች እና የግል እርሻዎች ምርታቸውን ለሀገር ውስጥ ገበያ ማቅረብ ጀምረዋል። ዘንድሮ የተገኘው ምርት ካለፈው ዓመት የተሻለ መሆኑ ተገልጿል።",
                reporter: "ሳሚ ዶልፊን",
                date: "ሚያዝያ 7/2018 ዓ.ም"
            }
        ];

        // ዜናዎችን በካርድ መልክ መደርደሪያ
        function displayNews() {
            const grid = document.getElementById('newsGrid');
            if (!grid) return;

            grid.innerHTML = newsData.map((news, index) => `
                <div onclick="openNews(${index})" class="bg-slate-900/50 rounded-[2rem] border border-slate-800 overflow-hidden group hover:border-amber-500/50 transition-all duration-500 shadow-xl cursor-pointer">
                    <div class="h-56 overflow-hidden">
                        <img src="${news.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    </div>
                    <div class="p-6 space-y-4">
                        <div class="flex items-center gap-2 text-amber-500 text-[10px] font-black uppercase tracking-widest">
                            <span class="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></span> ወቅታዊ
                        </div>
                        <h3 class="text-xl font-bold leading-tight group-hover:text-amber-400 transition-colors">${news.title}</h3>
                        <p class="text-slate-400 text-sm font-light line-clamp-2">${news.body}</p>
                        <div class="pt-2 flex items-center gap-2 text-white font-black text-[10px] uppercase tracking-widest">
                            ሙሉውን አንብብ <span class="text-amber-500 text-lg">→</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ሙሉ ዜናውን መክፈቻ
        function openNews(id) {
            const data = newsData[id];
            const content = `
                <div class="space-y-8">
                    <div class="flex gap-4">
                        <div class="w-2 h-14 bg-amber-500 rounded-full shadow-[0_0_20px_rgba(245,158,11,0.5)]"></div>
                        <h2 class="text-3xl md:text-5xl font-black italic tracking-tighter text-white uppercase leading-tight">${data.title}</h2>
                    </div>
                    <div class="flex items-center gap-4 text-slate-500 text-xs font-bold border-y border-slate-800/50 py-5 italic uppercase">
                        <span><span class="text-amber-500">|</span> [${data.reporter}]</span>
                        <span>${data.date}</span>
                    </div>
                    <img src="${data.image}" class="w-full rounded-[2rem] shadow-2xl border border-slate-800">
                    <div class="text-slate-200 text-xl md:text-2xl leading-[1.8] font-light">
                        ${data.fullBody}
                    </div>
                    <div class="h-20"></div>
                </div>
            `;
            document.getElementById('newsContent').innerHTML = content;
            document.getElementById('newsModal').classList.add('modal-active');
            document.body.style.overflow = 'hidden';
            document.getElementById('newsModal').scrollTo(0, 0);
        }

        function closeNews() {
            document.getElementById('newsModal').classList.remove('modal-active');
            document.body.style.overflow = 'auto';
        }

        // ገጹ ሲከፈት ዜናዎቹ እንዲመጡ
        document.addEventListener('DOMContentLoaded', displayNews);
    </script>
</body>
</html>
