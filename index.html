<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Mataaharaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; }
        .news-card { background: #0f172a; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.4s; }
        .news-card:hover { border-color: #f59e0b; transform: translateY(-5px); }
        .news-img { height: 200px; background-size: cover; background-position: center; width: 100%; }
        .modal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); padding: 20px; overflow-y: auto; }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; }
        .modal-content { background: #0f172a; border-radius: 25px; padding: 30px; max-width: 800px; width: 100%; margin: 20px auto; border: 1px solid #f59e0b; }
    </style>
</head>
<body>

    <header class="p-4 flex justify-between items-center bg-[#020617] border-b border-white/5 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center text-black font-black">S</div>
            <h1 class="text-white font-black italic text-sm">SAMI-TUBE MEDIA</h1>
        </div>
        <select id="langSelect" onchange="updateContent()" class="bg-slate-800 text-white text-xs px-3 py-2 rounded-lg outline-none">
            <option value="am">አማርኛ</option>
            <option value="om">Afaan Oromoo</option>
            <option value="en">English</option>
        </select>
    </header>

    <main class="max-w-7xl mx-auto p-6 space-y-10">
        <section id="newsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></section>
    </main>

    <div id="newsModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="text-amber-500 font-bold cursor-pointer float-right" onclick="closeModal()">ዝጋ X</span>
            <div id="modalImg" class="w-full h-64 bg-cover bg-center rounded-xl mb-6"></div>
            <h2 id="modalTitle" class="text-2xl font-black text-amber-500 mb-4 italic"></h2>
            <div id="modalBody" class="text-slate-200 leading-relaxed text-base whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        const content = {
            am: {
                news: [
                    { 
                        t: "አቶ አዲሱ ዋቆ በመታሃራ ከተማ ያስመዘገቧቸው የልማት ስራዎች", 
                        i: "mayor-addisu-wako~2.jpg", 
                        d: "ከንቲባ አቶ አዲሱ ዋቆ እያከናወኗቸው ያሉ የልማትና የመልካም አስተዳደር ስራዎች የከተማዋን ገጽታ ከመቀየር ባለፈ ለነዋሪዎች ምቾት ትልቅ አስተዋጽኦ እያበረከቱ መሆኑ ተነገረ።", 
                        f: "የመታሃራ ከተማ ከንቲባ አቶ አዲሱ ዋቆ ወደ ስልጣን ከመጡ ጊዜ ጀምሮ በከተማዋ በርካታ የልማት ስራዎች እየተከናወኑ ይገኛሉ። በተለይም የመሰረተ ልማት ዝርጋታ፣ የከተማ ውበት እና የመልካም አስተዳደር ስራዎች ላይ ትኩረት በማድረግ የነዋሪዎችን የኑሮ ደረጃ ለማሻሻል በቁርጠኝነት እየሰሩ መሆኑን የከተማዋ ነዋሪዎች ይመሰክራሉ።" 
                    },
                    { 
                        t: "የመታሃራ ከተማ የንፁህ መጠጥ ውሃ ፕሮጀክት የ90% መጠናቀቅ", 
                        i: "unnamed (55)~2.jpg", 
                        d: "የከተማዋን የውሃ ችግር በዘላቂነት የሚፈታው ግዙፍ ፕሮጀክት ከ1.4 ቢሊዮን ብር በላይ ወጪ እየተከናወነ ይገኛል።", 
                        f: "ለበርካታ አመታት የመታሃራ ከተማ ነዋሪዎች ዋነኛ ጥያቄ የነበረው የንፁህ መጠጥ ውሃ እጥረት በዘላቂነት ለመፍታት ታስቦ የተጀመረው ግዙፍ የውሃ ፕሮጀክት አሁን ላይ 90 በመቶ መጠናቀቁ ተበሰረ። ፕሮጀክቱ ሲጠናቀቅ የከተማዋን የውሃ አቅርቦት በከፍተኛ ደረጃ ያሻሽላል።" 
                    },
                    { 
                        t: "የስነ-ህይወት ጥበብ በበሰቃ ሃይቅ ዳርቻ፤ የብርቱካን እርሻ", 
                        i: "IMG_20260314_112746_839~4.jpg", 
                        d: "በኑራኤራ እርሻ ልማት ባለሙያዎች የሚከናወነው ሳይንሳዊ የመግረዝ ስራ ምርታማነትን እያረጋገጠ ነው።", 
                        f: "በመታሃራ ከተማ በበሰቃ ሃይቅ ዳርቻ የብርቱካን እርሻ በከፍተኛ የባለሙያ ጥበብ እየለማ ይገኛል። የኑራኤራ እርሻ ልማት ባለሙያዎች ሳይንሳዊ የመግረዝ (Pruning) ዘዴዎችን በመጠቀም የምርት ጥራትና መጠንን ለመጨመር እየሰሩ ነው።" 
                    }
                ]
            }
            // om እና en እዚህ ጋር መቀጠል ይችላሉ...
        };

        function updateContent() {
            const lang = document.getElementById('langSelect').value;
            const data = content[lang] || content['am'];
            const grid = document.getElementById('newsGrid');
            
            grid.innerHTML = data.news.map((n, index) => `
                <div class="news-card" onclick="openModal('${lang}', ${index})">
                    <div class="news-img" style="background-image: url('${n.i}')"></div>
                    <div class="p-5">
                        <h4 class="font-black italic text-amber-500 mb-2">${n.t}</h4>
                        <p class="text-slate-400 text-xs leading-relaxed">${n.d}</p>
                        <span class="text-white text-[10px] font-bold mt-4 block uppercase border-t border-white/10 pt-2">ሙሉውን አንብብ / READ MORE</span>
                    </div>
                </div>
            `).join('');
        }

        function openModal(lang, index) {
            const item = content[lang].news[index];
            document.getElementById('modalImg').style.backgroundImage = `url('${item.i}')`;
            document.getElementById('modalTitle').innerText = item.t;
            document.getElementById('modalBody').innerText = item.f;
            document.getElementById('newsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('newsModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        window.onload = updateContent;
    </script>
</body>
</html>
