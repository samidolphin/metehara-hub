<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Mataaharaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; overflow-x: hidden; }
        
        .hero-title { opacity: 0; transform: translateY(30px); animation: fadeInUp 1.5s ease-out forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .hero-section { height: 70vh; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; background: url('mayor-addisu-wako~2.jpg') center/cover; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(2,6,23,0.3), #020617); }

        .news-card { background: #111827; border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s ease; cursor: pointer; }
        .news-card:hover { border-color: #f59e0b; transform: translateY(-10px); }
        .news-img { height: 250px; background-size: cover; background-position: center; }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 30px; overflow: hidden; border: 2px solid #f59e0b; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); padding: 20px; overflow-y: auto; }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #0f172a; border-radius: 35px; padding: 40px; max-width: 850px; width: 100%; border: 1px solid #f59e0b; position: relative; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full z-50 p-5 flex justify-between items-center bg-black/50 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-amber-500 rounded-2xl flex items-center justify-center text-black font-black text-2xl">S</div>
            <div>
                <h1 class="text-white font-black italic">SAMI-TUBE MEDIA</h1>
                <p class="text-amber-500 text-[10px] font-bold uppercase tracking-widest">Digital Information Center</p>
            </div>
        </div>
        <select id="langSelect" onchange="updateContent()" class="bg-slate-800 text-white text-xs px-4 py-2 rounded-xl border border-white/10 outline-none">
            <option value="am">አማርኛ</option>
            <option value="om">Afaan Oromoo</option>
            <option value="en">English</option>
        </select>
    </header>

    <section class="hero-section">
        <div class="hero-overlay"></div>
        <div class="relative z-10 text-center px-6">
            <h2 id="heroTitle" class="hero-title text-4xl md:text-7xl font-black italic mb-4">የማታሃራ ዲጂታል መረጃ መረብ</h2>
            <p id="heroSub" class="text-amber-500 text-lg md:text-xl font-bold italic">ወቅታዊ የከተማዋን መረጃዎች እና የልማት ስራዎችን በአንድ ቦታ!</p>
        </div>
    </section>

    <main class="max-w-7xl mx-auto p-6 -mt-16 relative z-20 space-y-20">
        
        <section class="space-y-8">
            <h3 id="videoLabel" class="text-white font-black italic text-xl border-l-8 border-amber-500 pl-4 uppercase">የቅርብ ጊዜ የቪዲዮ ሪፖርቶች</h3>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/Yp9H-H6e_k8?rel=0" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>

        <section class="space-y-10">
            <h3 id="newsLabel" class="text-white font-black italic text-xl border-l-8 border-amber-500 pl-4 uppercase">ታዋቂ ዜናዎች</h3>
            <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </section>

        <footer class="bg-slate-900/80 rounded-[40px] p-12 text-center border border-white/5 space-y-8">
            <h4 class="text-3xl font-black italic text-white uppercase tracking-tighter">SAMI-TUBE MEDIA</h4>
            <div class="flex justify-center gap-6">
                <a href="https://www.facebook.com/share/1CgMxSgtLu/" target="_blank" class="bg-blue-700 p-4 rounded-2xl shadow-lg hover:scale-110 transition"><img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" width="28"></a>
                <a href="https://t.me/Meteharainfobot" target="_blank" class="bg-sky-500 p-4 rounded-2xl shadow-lg hover:scale-110 transition"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" width="28"></a>
                <a href="https://youtube.com/@samsontesfaye2670" target="_blank" class="bg-red-600 p-4 rounded-2xl shadow-lg hover:scale-110 transition"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" width="28"></a>
            </div>
            <p class="text-[10px] text-slate-500 tracking-[0.4em] font-black uppercase border-t border-white/5 pt-8 italic">
                &copy; 2026 SAMSON TESFAYE | Produced by Sami Dolphin
            </p>
        </footer>
    </main>

    <div id="newsModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-slate-400 hover:text-white text-3xl font-bold">&times;</button>
            <div id="modalImg" class="w-full h-72 bg-cover bg-center rounded-3xl mb-8 border border-white/10"></div>
            <h2 id="modalTitle" class="text-3xl font-black text-amber-500 mb-6 italic leading-tight"></h2>
            <div id="modalBody" class="text-slate-200 leading-relaxed text-lg whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        const content = {
            am: {
                news: [
                    { 
                        t: "አቶ አዲሱ ዋቆ በማታሃራ ከተማ ያስመዘገቧቸው የልማት ስራዎች", 
                        i: "mayor-addisu-wako~2.jpg", 
                        d: "የከንቲባው የልማትና የመልካም አስተዳደር ስራዎች የከተማዋን ገጽታ ከመቀየር ባለፈ ለነዋሪዎች ምቾት ትልቅ አስተዋጽኦ እያበረከቱ ነው።", 
                        f: "የማታሃራ ከተማ ከንቲባ አቶ አዲሱ ዋቆ ወደ ስልጣን ከመጡ ጊዜ ጀምሮ በከተማዋ በርካታ የልማት ስራዎች እየተከናወኑ ይገኛሉ።" 
                    },
                    { 
                        t: "የማታሃራ ከተማ የንፁህ መጠጥ ውሃ ፕሮጀክት የ90% መጠናቀቅ", 
                        i: "Lumii_20260412_180356344~2.jpg", 
                        d: "የከተማዋን የውሃ ችግር በዘላቂነት የሚፈታው ግዙፍ ፕሮጀክት ከ1.4 ቢሊዮን ብር በላይ ወጪ እየተከናወነ ይገኛል።", 
                        f: "የንፁህ መጠጥ ውሃ ፕሮጀክት ግንባታ ከ90 በመቶ በላይ መጠናቀቁ ተበሰረ።" 
                    },
                    { 
                        t: "የስነ-ህይወት ጥበብ በበሰቃ ሃይቅ ዳርቻ፤ የብርቱካን እርሻ", 
                        i: "Lumii_20260412_180443961~2.jpg", 
                        d: "በኑራኤራ እርሻ ልማት ባለሙያዎች የሚከናወነው ሳይንሳዊ የመግረዝ ስራ ምርታማነትን እያረጋገጠ ነው።", 
                        f: "በማታሃራ ከተማ በበሰቃ ሃይቅ ዳርቻ የብርቱካን እርሻ በከፍተኛ የባለሙያ ጥበብ እየለማ ይገኛል።" 
                    }
                ]
            }
        };

        function updateContent() {
            const data = content.am;
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = data.news.map((n, index) => `
                <div class="news-card" onclick="openModal('am', ${index})">
                    <div class="news-img" style="background-image: url('${n.i}')"></div>
                    <div class="p-8">
                        <h4 class="font-black italic text-amber-500 mb-4 leading-tight text-lg">${n.t}</h4>
                        <p class="text-slate-400 text-sm leading-relaxed line-clamp-2">${n.d}</p>
                        <div class="mt-8 pt-6 border-t border-white/5 flex justify-between items-center text-[10px] font-black text-white uppercase tracking-widest">
                            <span>Read Report</span>
                            <span class="text-amber-500 text-xl">→</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(lang, index) {
            const item = content[lang].news[index];
            document.getElementById('modalImg').style.backgroundImage = `url('${item.i}')`;
            document.getElementById('modalTitle').innerText = item.t;
            document.getElementById('modalBody').innerText = item.f;
            document.getElementById('newsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('newsModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        window.onload = updateContent;
    </script>
</body>
</html>
