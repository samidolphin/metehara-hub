<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Mataaharaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; overflow-x: hidden; }
        
        /* Welcome Motion Animation */
        .hero-title { opacity: 0; transform: translateY(30px); animation: fadeInUp 1.5s ease-out forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .hero-section { height: 70vh; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .hero-bg { position: absolute; inset: 0; background: url('mayor-addisu-wako~2.jpg') center/cover; opacity: 0.3; filter: blur(2px); animation: slowZoom 20s infinite alternate; }
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.1); } }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, #020617); }

        .news-card { background: #0f172a; border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s ease; cursor: pointer; }
        .news-card:hover { border-color: #f59e0b; transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .news-img { height: 220px; background-size: cover; background-position: center; }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 30px; border: 4px solid rgba(255,255,255,0.05); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .social-btn { transition: 0.3s; }
        .social-btn:hover { transform: translateY(-5px) scale(1.1); }

        .modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); padding: 20px; overflow-y: auto; }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #0f172a; border-radius: 35px; padding: 40px; max-width: 850px; width: 100%; border: 1px solid #f59e0b; position: relative; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full z-50 p-5 flex justify-between items-center bg-black/30 backdrop-blur-lg border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-amber-500 rounded-2xl flex items-center justify-center text-black font-black text-2xl shadow-lg">S</div>
            <div>
                <h1 class="text-white font-black italic tracking-tighter">SAMI-TUBE MEDIA</h1>
                <p class="text-amber-500 text-[9px] font-bold uppercase tracking-widest">Mataaharaa Digital Hub</p>
            </div>
        </div>
        <select id="langSelect" onchange="updateContent()" class="bg-slate-800 text-white text-xs px-4 py-2 rounded-xl border border-white/10 outline-none">
            <option value="am">አማርኛ</option>
            <option value="om">Afaan Oromoo</option>
            <option value="en">English</option>
        </select>
    </header>

    <section class="hero-section">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="relative z-10 text-center px-6">
            <h2 id="heroTitle" class="hero-title text-4xl md:text-7xl font-black italic mb-4 text-white"></h2>
            <p id="heroSub" class="text-amber-500 text-lg md:text-xl font-bold italic tracking-wide"></p>
        </div>
    </section>

    <main class="max-w-7xl mx-auto p-6 -mt-16 relative z-20 space-y-20">
        
        <section class="space-y-8">
            <h3 id="videoLabel" class="text-white font-black italic text-xl border-l-8 border-amber-500 pl-4 uppercase"></h3>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/Yp9H-H6e_k8" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>

        <section class="space-y-10">
            <h3 id="newsLabel" class="text-white font-black italic text-xl border-l-8 border-amber-500 pl-4 uppercase"></h3>
            <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </section>

        <footer class="bg-slate-900/80 rounded-[40px] p-12 text-center border border-white/5 space-y-8">
            <div class="space-y-2">
                <h4 class="text-3xl font-black italic text-white uppercase tracking-tighter">SAMI-TUBE MEDIA</h4>
                <p id="addressLabel" class="text-slate-400 text-sm font-medium">Mataaharaa, Oromia, Ethiopia | +251 922 243 013</p>
            </div>

            <div class="flex justify-center gap-6">
                <a href="https://www.facebook.com/share/1CgMxSgtLu/" target="_blank" class="social-btn bg-blue-700 p-4 rounded-2xl shadow-lg">
                    <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" width="28">
                </a>
                <a href="https://t.me/Meteharainfobot" target="_blank" class="social-btn bg-sky-500 p-4 rounded-2xl shadow-lg">
                    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" width="28">
                </a>
                <a href="https://youtube.com/@samsontesfaye2670" target="_blank" class="social-btn bg-red-600 p-4 rounded-2xl shadow-lg">
                    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" width="28">
                </a>
            </div>

            <div class="pt-8 border-t border-white/5">
                <p class="text-[9px] text-slate-500 tracking-[0.4em] font-black uppercase italic">
                    &copy; 2026 SAMSON TESFAYE | Produced by Sami Dolphin
                </p>
            </div>
        </footer>
    </main>

    <div id="newsModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-slate-400 hover:text-white text-3xl font-bold">&times;</button>
            <div id="modalImg" class="w-full h-72 bg-cover bg-center rounded-3xl mb-8 border border-white/10 shadow-2xl"></div>
            <h2 id="modalTitle" class="text-3xl font-black text-amber-500 mb-6 italic leading-tight"></h2>
            <div id="modalBody" class="text-slate-200 leading-relaxed text-lg whitespace-pre-wrap text-justify"></div>
        </div>
    </div>

    <script>
        const content = {
            am: {
                heroTitle: 'እንኳን ደህና መጡ!',
                heroSub: 'የማታሃራ ከተማ ዲጂታል መረጃ መረብ',
                videoLabel: 'ወቅታዊ የቪዲዮ ሪፖርቶች',
                newsLabel: 'ታዋቂ ዜናዎች',
                news: [
                    { 
                        t: "አቶ አዲሱ ዋቆ በማታሃራ ከተማ ያስመዘገቧቸው የልማት ስራዎች", 
                        i: "mayor-addisu-wako~2.jpg", 
                        d: "የከንቲባው የልማትና የመልካም አስተዳደር ስራዎች የከተማዋን ገጽታ ከመቀየር ባለፈ ለነዋሪዎች ምቾት ትልቅ አስተዋጽኦ እያበረከቱ ነው።", 
                        f: "የማታሃራ ከተማ ከንቲባ አቶ አዲሱ ዋቆ ወደ ስልጣን ከመጡ ጊዜ ጀምሮ በከተማዋ በርካታ የልማት ስራዎች እየተከናወኑ ይገኛሉ። በተለይም የመሰረተ ልማት ዝርጋታ፣ የከተማ ውበት እና የመልካም አስተዳደር ስራዎች ላይ ትኩረት ተሰጥቷል።" 
                    },
                    { 
                        t: "የንፁህ መጠጥ ውሃ ፕሮጀክት የ90% መጠናቀቅ", 
                        i: "Lumii_20260412_180356344~2.jpg", 
                        d: "የከተማዋን የውሃ ችግር በዘላቂነት የሚፈታው ግዙፍ ፕሮጀክት ከ1.4 ቢሊዮን ብር በላይ ወጪ እየተከናወነ ይገኛል።", 
                        f: "ለበርካታ አመታት የማታሃራ ከተማ ነዋሪዎች ዋነኛ ጥያቄ የነበረው የንፁህ መጠጥ ውሃ እጥረት በዘላቂነት ለመፍታት ታስቦ የተጀመረው ግዙፍ የውሃ ፕሮጀክት አሁን ላይ 90 በመቶ መጠናቀቁ ተበሰረ።" 
                    },
                    { 
                        t: "የስነ-ህይወት ጥበብ በበሰቃ ሃይቅ ዳርቻ፤ የብርቱካን እርሻ", 
                        i: "Lumii_20260412_180443961~2.jpg", 
                        d: "በኑራኤራ እርሻ ልማት ባለሙያዎች የሚከናወነው ሳይንሳዊ የመግረዝ ስራ ምርታማነትን እያረጋገጠ ነው።", 
                        f: "በማታሃራ ከተማ በበሰቃ ሃይቅ ዳርቻ የብርቱካን እርሻ በከፍተኛ የባለሙያ ጥበብ እየለማ ይገኛል። ባለሙያዎች ሳይንሳዊ ዘዴዎችን በመጠቀም የምርት ጥራትና መጠንን ለመጨመር እየሰሩ ነው።" 
                    }
                ]
            },
            om: {
                heroTitle: 'Baga Nagaan Dhufte!',
                heroSub: 'Marsariitii Odeeffannoo Magaalaa Mataaharaa',
                videoLabel: 'Gabaasa Viidiyoo Yeroo Ammaa',
                newsLabel: 'Oduuwwan Beekamoo',
                news: [
                    { t: "Hojiiwwan Misoomaa Obbo Addisuu Waaqoo", i: "mayor-addisu-wako~2.jpg", d: "Hojiiwwan misoomaa kantiibaa magaalaa keenyaa jijjiirama guddaa fidaa jiru.", f: "Kantiibaan magaalaa Mataaharaa Obbo Addisuu Waaqoo erga gara aangoo dhufanii as hojiiwwan misoomaa hedduu hojjachaa jiru." },
                    { t: "Pirojektii Bishaan Dhugaatii Mataaharaa", i: "Lumii_20260412_180356344~2.jpg", d: "Pirojektiin bishaan dhugaatii birrii biliyoona 1.4 oliin hojjetamaa jiru xumuramaa jira.", f: "Pirojektiin bishaan dhugaatii magaalaa Mataaharaa dhibbeentaa 90 oliin xumurameera." },
                    { t: "Misooma Birtukaanaa Garba Basakaatti", i: "Lumii_20260412_180443961~2.jpg", d: "Hojiiwwan mirmirsuu saayinsaawaa ta'een oomishitummaan guddachaa jira.", f: "Mataaharaatti qarqara garba Basakaatti misoomni birtukaanaa haala saayinsaawaa ta'een hojjetamaa jira." }
                ]
            }
        };

        function updateContent() {
            const lang = document.getElementById('langSelect').value;
            const data = content[lang] || content['am'];
            
            document.getElementById('heroTitle').innerText = data.heroTitle;
            document.getElementById('heroSub').innerText = data.heroSub;
            document.getElementById('videoLabel').innerText = data.videoLabel;
            document.getElementById('newsLabel').innerText = data.newsLabel;

            const grid = document.getElementById('newsGrid');
            grid.innerHTML = data.news.map((n, index) => `
                <div class="news-card" onclick="openModal('${lang}', ${index})">
                    <div class="news-img" style="background-image: url('${n.i}')"></div>
                    <div class="p-8">
                        <h4 class="font
