<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI DOLPHIN | Mataaharaa Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; overflow: hidden; }
        
        /* ተንቀሳቃሽ የጀርባ ምስል (Motion Background) */
        #hero-slider {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-size: cover; background-position: center;
            transition: background-image 2s ease-in-out;
        }
        .hero-overlay {
            background: linear-gradient(rgba(2, 6, 23, 0.85), rgba(2, 6, 23, 0.85));
            height: 100%; width: 100%;
        }

        /* በስተግራ ያሉ ትናንሽ ፎንቶች */
        .sidebar-text {
            font-size: 0.75rem; /* በጣም ትንሽ ፎንት */
            opacity: 0.6;
            transition: 0.3s;
            letter-spacing: 1px;
        }
        .sidebar-text:hover { opacity: 1; color: #f59e0b; }
    </style>
</head>
<body>

    <div id="hero-slider"><div class="hero-overlay"></div></div>

    <div class="relative min-h-screen flex items-center px-10">
        <div class="w-full grid grid-cols-12 items-center">
            
            <div class="col-span-2 flex flex-col space-y-6 border-l border-white/10 pl-4">
                <a href="#" class="sidebar-text">ቅድመ ዜና</a>
                <a href="#" class="sidebar-text">ሪፖርት</a>
                <a href="#" class="sidebar-text">ቱሪዝም</a>
                <a href="#" class="sidebar-text">ባህል</a>
                <a href="#" class="sidebar-text">ስነ ጽሁፍ</a>
                <a href="#" class="sidebar-text">ቴክ</a>
                <a href="#" class="sidebar-text">ፍልስፍና</a>
            </div>

            <div class="col-span-8 text-center flex flex-col items-center">
                <div class="bg-amber-500/20 text-amber-500 px-4 py-1 rounded-full text-[9px] font-bold tracking-[0.3em] mb-6">
                    DIGITAL HUB
                </div>
                <h2 class="text-4xl md:text-6xl font-black italic leading-tight uppercase">
                    እንኳን ወደ <span class="text-amber-500">መታሃራ</span> <br> 
                    ዲጂታል ማዕከል <br> 
                    በሰላም መጣችሁ
                </h2>
                <p class="mt-6 text-slate-400 text-xs max-w-md italic">
                    ወቅታዊ የከተማዋ መረጃዎች፣ የቴክኖሎጂ ውጤቶች እና የሥነ-ጽሑፍ ማዕከል
                </p>
            </div>

            <div class="col-span-2"></div>
        </div>
    </div>

    <script>
        // የሚቀያየሩ ምስሎች
        const images = [
            'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh_Sami_Dolphin_Hero.jpg',
            'https://images.unsplash.com/photo-1444723121867-7a241cacace9?q=80&w=1600'
        ];
        let i = 0;
        function move() {
            document.getElementById('hero-slider').style.backgroundImage = `url('${images[i]}')`;
            i = (i + 1) % images.length;
        }
        setInterval(move, 5000);
        move();
    </script>
</body>
</html>
