<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; display: flex; }
        
        /* ቋሚ የግራ ሜኑ */
        .sidebar { 
            width: 80px; 
            background: #0ea5e9; 
            height: 100vh; 
            position: fixed; 
            left: 0; 
            top: 0; 
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }
        .nav-link { color: white; text-decoration: none; font-size: 0.7rem; font-weight: 800; padding: 20px 5px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }

        .main-content { margin-left: 80px; width: calc(100% - 80px); }

        /* የላይኛው ክፍል (ርዕስ) - ልክ እንደ ፎቶው ገባ ብሎ */
        header { padding: 15px 25px; background: #0f172a; }
        .hero-text { padding: 30px 25px; }
        .hero-text h2 { font-size: 2rem; font-weight: 900; line-height: 1.3; }
        .hero-text h2 span { color: #f59e0b; }
        .hero-text p { color: #94a3b8; font-size: 0.9rem; border-left: 3px solid #f59e0b; padding-left: 15px; margin-top: 15px; }

        /* ሙሉ ስክሪን የሚሸፍኑ ይዘቶች (ከግራ ጥግ እስከ ቀኝ ጥግ) */
        .full-width-content { width: 100%; padding: 0; margin-top: 20px; }
        
        .section-title { padding-left: 25px; margin-bottom: 15px; font-weight: 900; font-style: italic; font-size: 1rem; }

        .video-wrapper { 
            width: 100%; 
            border-top: 4px solid #f59e0b; 
            border-bottom: 4px solid #f59e0b;
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            background: #000;
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .news-full { 
            background: #1e293b; 
            width: 100%; 
            padding: 25px; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .news-full h4 { color: #f59e0b; font-weight: 900; font-size: 1.2rem; margin-bottom: 8px; }

        footer { padding: 40px 20px; text-align: center; background: #0f172a; width: 100%; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <a href="#" class="nav-link">ቅድመ ዜና</a>
        <a href="#" class="nav-link">ሪፖርት</a>
        <a href="#" class="nav-link">ቱሪዝም</a>
        <a href="#" class="nav-link">ባህል</a>
        <a href="#" class="nav-link">ስነ ጽሁፍ</a>
        <a href="#" class="nav-link">ቴክ</a>
        <a href="#" class="nav-link">ፍልስፍና</a>
    </aside>

    <div class="main-content">
        <header class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-amber-500 w-10 h-10 rounded-lg flex items-center justify-center text-black font-black text-xl">S</div>
                <h1 class="font-black italic text-sm uppercase tracking-tighter">SAMI-TUBE MEDIA</h1>
            </div>
            <div class="bg-slate-800 text-[10px] px-3 py-1 rounded border border-white/10">አማርኛ</div>
        </header>

        <section class="hero-text">
            <h2>እንኳን ወደ <span>ማታሃራ</span><br>ዲጂታል ማዕከል በሰላም መጣችሁ</h2>
            <p>ወቅታዊ መረጃዎች፣ የቴክኖሎጂ ውጤቶች እና የሥነ-ጽሁፍ ማዕከል</p>
        </section>

        <div class="full-width-content">
            <h3 class="section-title">የቅርብ ጊዜ የቪዲዮ ሪፖርቶች</h3>
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/Yp9H-H6e_k8" frameborder="0" allowfullscreen></iframe>
            </div>

            <div class="news-full">
                <h4>የልማት ስራዎች</h4>
                <p class="text-sm text-slate-300">የማታሃራ ከተማ የልማት ስራዎች ከዳር እስከ ዳር እየተከናወኑ ይገኛሉ።</p>
            </div>
        </div>

        <footer>
            <div class="text-[10px] text-slate-400 font-bold mb-3">
                ስልክ፦ +251 922 243 013 | ኢሜይል፦ sami2all@gmail.com
            </div>
            <p class="text-[8px] text-slate-600 font-bold uppercase tracking-widest">© 2026 ሳምሶን ተስፋዬ</p>
        </footer>
    </div>

</body>
</html>
