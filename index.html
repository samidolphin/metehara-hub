<!DOCTYPE html>
<html lang="am">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; overflow-x: hidden; }
        
        /* በግራ በኩል ያለው ዝርዝር (Sidebar) */
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 220px; background: #0ea5e9; z-index: 100; padding-top: 20px; }
        .nav-link { display: block; padding: 18px 25px; color: white; font-weight: 800; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 1.1rem; transition: 0.3s; }
        .nav-link:hover { background: rgba(0,0,0,0.1); }

        /* ዋናው ክፍል */
        .main-content { margin-left: 220px; min-height: 100vh; }
        
        header { background: #0f172a; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .hero-text { padding: 60px 40px; text-align: center; }
        .hero-title { font-size: 3.5rem; font-weight: 900; line-height: 1.2; margin-bottom: 20px; }
        .hero-title span { color: #f59e0b; }
        .hero-sub { color: #94a3b8; font-size: 1.2rem; font-weight: 600; }

        .video-section { max-width: 900px; margin: 0 auto 60px auto; padding: 0 20px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 20px; overflow: hidden; border: 3px solid #f59e0b; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .news-grid { padding: 40px; display: grid; grid-cols: 1; gap: 40px; max-width: 1000px; margin: 0 auto; }
        .news-card { background: #0f172a; border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; padding-bottom: 20px; }
        .news-content { padding: 30px; }
        .news-title { color: #f59e0b; font-size: 1.8rem; font-weight: 900; margin-bottom: 15px; font-style: italic; }
        .news-desc { color: #94a3b8; line-height: 1.8; margin-bottom: 25px; }
        .read-more { color: white; font-weight: 800; text-transform: uppercase; border-top: 1px solid rgba(255,255,255,0.05); pt-4; display: block; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; display: flex; flex-wrap: wrap; }
            .nav-link { padding: 10px; font-size: 0.9rem; border-bottom: none; }
            .main-content { margin-left: 0; }
            .hero-title { font-size: 2rem; }
        }
    </style>
</head>
