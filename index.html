<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Metehara Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; overflow-x: hidden; }
        
        .hero-section { display: flex; height: 60vh; position: relative; overflow: hidden; }
        .side-menu { background-color: #0c82cf; width: 100px; display: flex; flex-direction: column; justify-content: center; gap: 15px; z-index: 30; }
        .menu-item { color: white; font-size: 0.7rem; font-weight: 800; text-align: center; cursor: pointer; }

        #bg-slider { position: absolute; inset: 0 0 0 100px; z-index: 1; }
        .slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.5s ease-in-out; }
        .slide.active { opacity: 1; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(2,6,23,0.9) 0%, rgba(2,6,23,0.3) 100%); z-index: 5; }
        
        .hero-content { position: relative; z-index: 10; padding-left: 30px; display: flex; flex-direction: column; justify-content: center; }

        /* Modal Popup */
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #0f172a; border: 2px solid #f59e0b; border-radius: 20px; padding: 25px; max-width: 500px; width: 90%; position: relative; }

        /* Video Wrapper */
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <header class="p-4 flex justify-between items-center bg-[#020617] border-b border-white/10 sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-amber-500 rounded flex items-center justify-center text-black font-black">S</div>
            <h1 class="font-black italic text-sm">SAMI-TUBE MEDIA</h1>
        </div>
        <select id="langSelect" onchange="updateContent()" class="bg-slate-800 text-white text-xs px-2 py-1 rounded border border-white/20">
            <option value="am">አማርኛ</option>
            <option value="om">Oromoo</option>
            <option value="en">English</option>
        </select>
    </header>

    <div class="hero-section">
        <nav class="side-menu">
            <div class="menu-item">ዜና</div>
            <div class="menu-item">ሪፖርት</div>
            <div class="menu-item">ቱሪዝም</div>
            <div class="menu-item">ባህል</div>
        </nav>
        
        <div id="bg-slider">
            <div class="slide active" style="background-image: url('1775754142286.jpg')"></div>
            <div class="slide" style="background-image: url('1775754148066.jpg')"></div>
            <div class="slide" style="background-image: url('1775754153480.jpg')"></div>
            <div class="slide" style="background-image: url('images (58).jpeg')"></div>
        </div>
        
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h2 id="heroTitle" class="text-2xl md:text-4xl font-black text-white"></h2>
            <p id="heroSub" class="text-slate-300 text-xs mt-2 max-w-xs"></p>
        </div>
    </div>

    <main class="p-6 space-y-12">
        <section>
            <h3 id="newsLabel" class="text-amber-500 font-black italic mb-6 border-l-4 border-amber-500 pl-3"></h3>
            <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <section>
            <h3 class="text-amber-500 font-black italic mb-4 border-l-4 border-amber-500 pl-3 uppercase">SAMI-TUBE | YouTube</h3>
            <div class="video-wrapper shadow-2xl">
                <iframe src="https://www.youtube.com/embed/Epe9ROSZ_pc" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>
    </main>

    <footer class="bg-slate-900 p-8 text-center border-t border-white/5">
        <div class="flex justify-center gap-4 mb-6">
            <a href="https://youtube.com/@samsontesfaye2670" target="_blank" class="bg-red-600 px-4 py-2 rounded-full text-[10px] font-bold">YOUTUBE</a>
            <a href="https://www.facebook.com/share/1CgMxSgtLu/" target="_blank" class="bg-blue-700 px-4 py-2 rounded-full text-[10px] font-bold">FACEBOOK</a>
            <a href="https://t.me/Ayyotube_bot" target="_blank" class="bg-blue-500 px-4 py-2 rounded-full text-[10px] font-bold">TELEGRAM</a>
        </div>
        <p class="text-slate-500 text-[10px] tracking-widest">&copy; 2026 SAMI-TUBE MEDIA</p>
    </footer>

    <div id="newsModal" class="modal" onclick="this.classList.remove('active')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalTitle" class="text-xl font-black text-amber-500 mb-4 italic"></h2>
            <p id="modalBody" class="text-slate-300 text-sm leading-relaxed"></p>
            <button onclick="document.getElementById('newsModal').classList.remove('active')" class="mt-6 bg-amber-500 text-black px-4 py-2 rounded-lg font-bold text-xs uppercase">ዝጋ</button>
        </div>
    </div>

    <script>
        const content = {
            am: {
                heroTitle: 'ወደ መተሃራ መረጃ መረብ በደህና መጡ',
                heroSub: 'ወቅታዊ የከተማዋን መረጃዎች እና የልማት ስራዎችን በአንድ ቦታ ያግኙ።',
                newsLabel: 'ዋና ዋና ዜናዎች',
                news: [
                    { t: "የልማት ስራዎች", d: "በአቶ አዲሱ ዋቆ የሚመራው የከተማ አስተዳደር ስራዎች።", f: "በከንቲባው አቶ አዲሱ ዋቆ የሚመራው አስተዳደር በመተሃራ ከተማ በርካታ የመንገድና የውበት ስራዎችን እያከናወነ ይገኛል።" },
                    { t: "የውሃ ፕሮጀክት", d: "የከተማዋን የውሃ ችግር ለመፍታት የተጀመረው ስራ።", f: "የመተሃራን የንጹህ መጠጥ ውሃ ችግር ለዘላቂነት ለመፍታት የተጀመረው ትልቅ ፕሮጀክት አሁን በመጠናቀቅ ላይ ነው።" }
                ]
            },
            om: {
                heroTitle: 'Giddu-gala Odeeffannoo Mataaharaa',
                heroSub: 'Odeeffannoo magaalaa yeroo fi hojiiwwan misoomaa hunda bakka tokkotti.',
                newsLabel: 'ODUUWWAN IJOO',
                news: [
                    { t: "Hojii Misoomaa", d: "Hojiiwwan bulchiinsa magaalaa Obbo Addisuu Waaqootiin dursamu.", f: "Bulchiinsi magaalaa Mataaharaa Obbo Addisuu Waaqootiin dursamu hojiiwwan misoomaa hedduu hojjechaa jira." },
                    { t: "Pirojektii Bishaanii", d: "Hojii rakkoo bishaanii magaalattii furuuf hojjetamaa jiru.", f: "Rakkoo bishaan dhugaatii magaalaa Mataaharaa furuuf pirojektiin jalqabame xumuraarra gahee jira." }
                ]
            },
            en: {
                heroTitle: 'Welcome to Metehara Hub',
                heroSub: 'Get the latest city updates and development news in one place.',
                newsLabel: 'TOP STORIES',
                news: [
                    { t: "City Development", d: "Projects led by Mayor Addisu Wako.", f: "Under Mayor Addisu Wako's leadership, the city is undergoing major infrastructure and beautification works." },
                    { t: "Water Project", d: "Efforts to solve the city's water shortage.", f: "The mega water project aimed at ending water scarcity in Metehara is nearing its completion." }
                ]
            }
        };

        function updateContent() {
            const lang = document.getElementById('langSelect').value;
            const data = content[lang];
            document.getElementById('heroTitle').innerText = data.heroTitle;
            document.getElementById('heroSub').innerText = data.heroSub;
            document.getElementById('newsLabel').innerText = data.newsLabel;

            const grid = document.getElementById('newsGrid');
            grid.innerHTML = data.news.map((n, index) => `
                <div onclick="openModal('${lang}', ${index})" class="bg-slate-900 border border-white/10 p-5 rounded-2xl cursor-pointer hover:border-amber-500 transition-all shadow-xl">
                    <h4 class="font-black italic text-amber-500 mb-2">${n.t}</h4>
                    <p class="text-slate-400 text-xs">${n.d}</p>
                    <p class="mt-4 text-[10px] font-bold text-white uppercase underline">Read More</p>
                </div>
            `).join('');
        }

        function openModal(lang, index) {
            const item = content[lang].news[index];
            document.getElementById('modalTitle').innerText = item.t;
            document.getElementById('modalBody').innerText = item.f;
            document.getElementById('newsModal').classList.add('active');
        }

        // Slideshow
        let current = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 4000);

        window.onload = updateContent;
    </script>
</body>
</html>
