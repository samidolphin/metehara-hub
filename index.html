        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; scroll-behavior: smooth; }

        .hero-section { display: flex; height: 60vh; overflow: hidden; position: relative; }

        /* Hero Sliding Background */
        #bg-container { position: absolute; inset: 0 0 0 120px; z-index: 1; }

        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(2,6,23,1) 0%, rgba(2,6,23,0.3) 100%); z-index: 2; }
        
        .hero-content { position: relative; z-index: 5; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; padding-left: 40px; }
        
        /* Fixed Gallery */
        .gallery-container { position: relative; height: 400px; border-radius: 2.5rem; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
