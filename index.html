<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Metehara Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; overflow-x: hidden; }
        .hero-section { display: flex; height: 65vh; position: relative; overflow: hidden; }
        .side-menu { background-color: #0c82cf; width: 100px; display: flex; flex-direction: column; justify-content: center; gap: 20px; z-index: 30; }
        .menu-item { color: white; font-size: 0.7rem; font-weight: 800; text-align: center; cursor: pointer; transition: 0.3s; }
        #bg-slider { position: absolute; inset: 0 0 0 100px; z-index: 1; }
        .slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 2s ease-in-out, transform 6s linear; }
        .slide.active { opacity: 1; transform: scale(1.1); }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(2,6,23,0.9) 0%, rgba(2,6,23,0.3) 100%); z-index: 5; }
        .hero-content { position: relative; z-index: 10; padding-left: 40px; display: flex; flex-direction: column; justify-content: center; animation: fadeInUp 1.5s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .news-card { background: #0f172a; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.4s; }
        .news-img { height: 180px; background-size: cover; background-position: center; }
        .ad-banner { background: linear-gradient(45deg, #1e293b, #0f172a); border: 2px dashed #f59e0b; border-radius: 20px; min-height: 120px; display: flex; align-items: center; justify-content: center; text-align: center; margin: 20px 0; padding: 15px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 20px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .modal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); padding: 15px; }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; }
        .modal-content { background: #0f172a; border: 1px solid #f59e0b; border-radius: 25px; padding: 30px; max-width: 700px; width: 100%; margin: 40px auto; }
        .close-btn { background: #f59e0b; color: black; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; float: right; }
    </style>
</head>
<body>

    <header class="p-4 flex justify-between items-center bg-[#020617] border-b border-white/5 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center text-black font-black text-xl">S</div>
            <div>
                <h1 class="text-white font-black italic text-sm leading-none uppercase">SAMI-TUBE MEDIA</h1>
                <p class="text-amber-500 text-[8px] font-bold mt-1 uppercase">Metehara Digital Hub</p>
            </div>
        </div>
        <select id="langSelect" onchange="updateContent()" class="bg-slate-800 text-white text-xs px-3 py-2 rounded-lg outline-none font-bold cursor-pointer">
            <option value="am">🇪🇹 አማርኛ</option>
            <option value="om">🇪🇹 Oromoo</option>
            <option value="en">🇺🇸 English</option>
        </select>
    </header>

    <div class="hero-section">
        <nav class="side-menu">
            <div class="menu-item" id="navNews">ዜና</div>
            <div class="menu-item" id="navReport">ሪፖርት</div>
            <div class="menu-item" id="navTour">ቱሪዝም</div>
            <div class="menu-item" id="navCulture">ባህል</div>
        </nav>
        <div id="bg-slider">
            <div class="slide active" style="background-image: url('IMG_20260314_112746_839~4.jpg')"></div>
            <div class="slide" style="background-image: url('unnamed (55)~2.jpg')"></div>
            <div class="slide" style="background-image: url('mayor-addisu-wako~2.jpg')"></div>
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h2 id="heroTitle" class="text-3xl md:text-5xl font-black text-white leading-tight"></h2>
            <p id="heroSub" class="text-amber-500 text-sm mt-4 max-w-sm italic font-bold"></p>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-5 space-y-12">
        <div class="ad-banner">
            <p id="adLabel" class="text-amber-500 font-black italic text-base uppercase">የማስታወቂያ ቦታ / Advertise Here</p>
        </div>

        <section>
            <h3 id="newsLabel" class="text-white font-black italic text-xl mb-8 border-l-8 border-amber-500 pl-4 uppercase"></h3>
            <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </section>

        <section class="py-12 border-t border-white/5">
            <h3 class="text-white font-black italic text-xl mb-8 uppercase tracking-widest text-center">SAMI-TUBE | LIVE STREAM</h3>
            <div class="video-container shadow-2xl">
                <iframe src="https://www.youtube.com/embed/Epe9ROSZ_pc" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>
    </main>

    <footer class="bg-slate-950 p-12 text-center border-t border-white/10">
        <h4 class="text-white font-black italic text-2xl mb-4 uppercase">SAMI-TUBE MEDIA</h4>
        <div class="flex flex-col md:flex-row justify-center items-center gap-6 mb-10 text-slate-300 text-xs font-bold uppercase">
            <div class="bg-white/5 px-6 py-3 rounded-full">📞 +251 91 192 6976</div>
            <div class="bg-white/5 px-6 py-3 rounded-full">📧 sami2all@gmail.com</div>
        </div>
        <div class="flex justify-center gap-5 mb-10">
            <a href="https://youtube.com/@samsontesfaye2670" target="_blank" class="bg-red-600 px-8 py-3 rounded-xl text-[11px] font-black">YOUTUBE</a>
            <a href="https://www.facebook.com/share/1CgMxSgtLu/" target="_blank" class="bg-blue-800 px-8 py-3 rounded-xl text-[11px] font-black">FACEBOOK</a>
        </div>
        <p class="text-slate-600 text-[10px] tracking-[0.3em] font-bold uppercase">&copy; 2026 SAMSON TESFAYE</p>
    </footer>

    <div id="newsModal" class="modal" onclick="closeModal()">
        <div class="modal-content shadow-2xl" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="closeModal()">&times;</div>
            <h2 id="modalTitle" class="text-2xl font-black text-amber-500 mb-6 italic border-b-2 border-white/5 pb-4"></h2>
            <div id="modalBody" class="text-slate-200 leading-relaxed text-sm whitespace-pre-wrap text-justify font-medium"></div>
        </div>
    </div>

    <script>
        const content = {
            am: {
                heroTitle: 'ወደ መተሃራ ዲጂታል መረጃ መረብ በደህና መጡ',
                heroSub: 'ወቅታዊ የከተማዋን መረጃዎች እና የልማት ስራዎችን በአንድ ቦታ ያግኙ።',
                newsLabel: 'የቅርብ ጊዜ ዜናዎች',
                nav: ["ዜና", "ሪፖርት", "ቱሪዝም", "ባህል"],
                news: [
                    { t: "የመተሃራ ከተማ ልማት", i: "IMG_20260314_112746_839~4.jpg", d: "የከተማዋ ገጽታ በከፍተኛ ፍጥነት እየተቀየረ ይገኛል።", f: "በመተሃራ ከተማ እየተከናወኑ ያሉ የልማት ስራዎች ለነዋሪዎች ምቾት ትልቅ አስተዋጽኦ እያበረከቱ ነው።" },
                    { t: "የውሃ ፕሮጀክት", i: "unnamed (55)~2.jpg", d: "የንጹህ መጠጥ ውሃ ፕሮጀክት ማጠቃለያ ላይ ደርሷል።", f: "ከ1.4 ቢሊዮን ብር በላይ ወጪ የተደረገበት የውሃ ፕሮጀክት ለከተማዋ ትልቅ ተስፋ ሆኗል።" },
                    { t: "አመራርና ስኬት", i: "mayor-addisu-wako~2.jpg", d: "የከንቲባው የልማት ስራዎች ተጠናክረው ቀጥለዋል።", f: "የመተሃራ ከተማ ከንቲባ አቶ አዲሱ ዋቆ ከተማዋን ወደ ተሻለ ደረጃ ለማድረስ እየሰሩ ይገኛሉ።" }
                ]
            }
            // Other languages omitted for brevity but can be added back
        };

        function updateContent() {
            const data = content.am;
            document.getElementById('heroTitle').innerText = data.heroTitle;
            document.getElementById('heroSub').innerText = data.heroSub;
            document.getElementById('newsLabel').innerText = data.newsLabel;
            document.getElementById('navNews').innerText = data.nav[0];
            document.getElementById('navReport').innerText = data.nav[1];
            document.getElementById('navTour').innerText = data.nav[2];
            document.getElementById('navCulture').innerText = data.nav[3];

            const grid = document.getElementById('newsGrid');
            grid.innerHTML = data.news.map((n, index) => `
                <div class="news-card group" onclick="openModal('am', ${index})">
                    <div class="news-img" style="background-image: url('${n.i}')"></div>
                    <div class="p-6">
                        <h4 class="font-black italic text-amber-500 mb-3 text-base">${n.t}</h4>
                        <p class="text-slate-400 text-[11px] mb-6">${n.d}</p>
                        <span class="text-white text-[10px] font-black uppercase tracking-widest">Read More</span>
                    </div>
                </div>
            `).join('');
        }

        function openModal(lang, index) {
            const item = content[lang].news[index];
            document.getElementById('modalTitle').innerText = item.t;
            document.getElementById('modalBody').innerText = item.f;
            document.getElementById('newsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('newsModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        let current = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 5000);

        window.onload = updateContent;
    </script>
</body>
</html>
