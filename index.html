<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI DOLPHIN | Mataaharaa Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: #f1f5f9; overflow-x: hidden; }
        
        /* ተንቀሳቃሽ የጀርባ ምስል ማሳመሪያ */
        #hero-slider {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-size: cover; background-position: center;
            transition: background-image 1.5s ease-in-out;
        }
        .hero-overlay {
            background: linear-gradient(to right, rgba(2, 6, 23, 0.95) 30%, rgba(2, 6, 23, 0.4));
        }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 bg-slate-950/80 backdrop-blur-md p-4 border-b border-amber-500/10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-amber-500 rounded-lg flex items-center justify-center text-slate-950 font-black text-xl">S</div>
                <h1 class="text-white font-black italic text-lg uppercase">SAMI-TUBE MEDIA</h1>
            </div>
            <select id="langSwitch" onchange="changeLanguage()" class="bg-slate-800 text-white text-xs p-2 rounded-lg outline-none border border-slate-700">
                <option value="am">🇪🇹 አማርኛ</option>
                <option value="om">🇪🇹 Afan Oromo</option>
                <option value="en">🇺🇸 English</option>
            </select>
        </div>
    </nav>

    <section class="relative min-h-screen flex items-center pt-20">
        <div id="hero-slider" class="hero-overlay"></div>

        <div class="max-w-7xl mx-auto px-6 w-full grid grid-cols-1 md:grid-cols-12 gap-12 items-center">
            
            <div class="md:col-span-4 space-y-6 z-10">
                <div class="group flex items-center gap-4 p-4 rounded-2xl hover:bg-amber-500/10 transition-all cursor-pointer border-l-4 border-transparent hover:border-amber-500">
                    <i class="fa-solid fa-newspaper text-amber-500 text-2xl"></i>
                    <div>
                        <h4 class="text-white font-bold text-sm" data-am="የቅርብ ዜና" data-om="Oduu Ammee" data-en="Latest News">የቅርብ ዜና</h4>
                        <p class="text-slate-400 text-[10px]" data-am="ወቅታዊ ኩነቶች" data-om="Gochaawwan ammee" data-en="Current events">ወቅታዊ ኩነቶች</p>
                    </div>
                </div>
                <div class="group flex items-center gap-4 p-4 rounded-2xl hover:bg-amber-500/10 transition-all cursor-pointer border-l-4 border-transparent hover:border-amber-500">
                    <i class="fa-solid fa-mountain-sun text-amber-500 text-2xl"></i>
                    <div>
                        <h4 class="text-white font-bold text-sm" data-am="ቱሪዝም እና ባህል" data-om="Tuurizimii fi Aadaa" data-en="Tourism & Culture">ቱሪዝም እና ባህል</h4>
                        <p class="text-slate-400 text-[10px]" data-am="የተፈጥሮ ውበቶች" data-om="Miidhagina uumamaa" data-en="Natural beauty">የተፈጥሮ ውበቶች</p>
                    </div>
                </div>
                <div class="group flex items-center gap-4 p-4 rounded-2xl hover:bg-amber-500/10 transition-all cursor-pointer border-l-4 border-transparent hover:border-amber-500">
                    <i class="fa-solid fa-pen-nib text-amber-500 text-2xl"></i>
                    <div>
                        <h4 class="text-white font-bold text-sm" data-am="ሥነ-ጽሑፍ" data-om="Og-barruu" data-en="Literature">ሥነ-ጽሑፍ</h4>
                        <p class="text-slate-400 text-[10px]" data-am="ግጥም እና ልቦለድ" data-om="Walaloo fi sheekkoo" data-en="Poetry & Fiction">ግጥም እና ልቦለድ</p>
                    </div>
                </div>
                <div class="group flex items-center gap-4 p-4 rounded-2xl hover:bg-amber-500/10 transition-all cursor-pointer border-l-4 border-transparent hover:border-amber-500">
                    <i class="fa-solid fa-microchip text-amber-500 text-2xl"></i>
                    <div>
                        <h4 class="text-white font-bold text-sm" data-am="ቴክኖሎጂ" data-om="Teeknooloojii" data-en="Technology">ቴክኖሎጂ</h4>
                        <p class="text-slate-400 text-[10px]" data-am="ዲጂታል ዓለም" data-om="Addunyaa diijitaalaa" data-en="Digital world">ዲጂታል ዓለም</p>
                    </div>
                </div>
            </div>

            <div class="md:col-span-8 text-left md:pl-12 z-10">
                <span class="inline-block bg-amber-500 text-slate-950 px-4 py-1 rounded-full text-[10px] font-black uppercase mb-6 tracking-widest">Digital Hub</span>
                <h2 id="heroTitle" class="text-5xl md:text-7xl font-black italic text-white leading-tight uppercase">
                    እንኳን ወደ <span class="text-amber-500 italic">መታሃራ</span> <br> በሰላም መጣችሁ
                </h2>
                <p id="heroDesc" class="mt-6 text-slate-300 text-lg max-w-xl italic border-l-4 border-amber-500 pl-6">
                    የመታሃራ ከተማን ወቅታዊ መረጃዎች፣ የቴክኖሎጂ ውጤቶች እና የሥነ-ጽሑፍ ስራዎችን በአንድ ማዕከል ያግኙ።
                </p>
            </div>
        </div>
    </section>

    <script>
        // 1. ምስሎቹን እዚህ መቀየር ትችላለህ
        const images = [
            'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh_Sami_Dolphin_Hero.jpg', // ፎቶ 1
            'https://images.unsplash.com/photo-1444723121867-7a241cacace9?q=80&w=1600', // ፎቶ 2
            'https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=1600'  // ፎቶ 3
        ];

        let currentIndex = 0;
        const slider = document.getElementById('hero-slider');

        function changeBackground() {
            slider.style.backgroundImage = `linear-gradient(to right, rgba(2, 6, 23, 0.95) 30%, rgba(2, 6, 23, 0.4)), url('${images[currentIndex]}')`;
            currentIndex = (currentIndex + 1) % images.length;
        }

        // በየ 5 ሰከንዱ ምስሉ እንዲቀየር
        setInterval(changeBackground, 5000);
        changeBackground();

        // 2. የቋንቋ መቀየሪያ ተግባር (አጠር ያለ)
        function changeLanguage() {
            const lang = document.getElementById('langSwitch').value;
            // እዚህ ጋር የቋንቋ ዝርዝሮችን ቀደም ብሎ በነበረው ኮድ መሰረት መሙላት ትችላለህ
            // ለምሳሌ የግራ በኩል ጽሁፎችን ለመቀየር፦
            document.querySelectorAll('[data-am]').forEach(el => {
                el.innerText = el.getAttribute(`data-${lang}`);
            });
        }
    </script>
</body>
</html>
