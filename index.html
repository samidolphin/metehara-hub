<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Mataaharaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        /* የሞሽን ባክግራውንድ */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body { 
            font-family: 'Noto Sans Ethiopic', sans-serif; 
            background: linear-gradient(-45deg, #020617, #0f172a, #1e293b, #020617);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white; 
            margin: 0; 
            overflow-x: hidden; 
        }
        
        .header-container { display: flex; width: 100%; border-bottom: 2px solid #f59e0b; }

        /* የግራ ሜኑ */
        .sidebar { 
            width: 85px; 
            background: #0ea5e9; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0;
        }
        .nav-link { 
            color: white; 
            text-decoration: none; 
            font-size: 0.65rem; 
            font-weight: 800; 
            padding: 15px 5px; 
            text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }

        /* ጽሁፉ ወደ ላይ ከፍ እንዲል የተስተካከለ */
        .hero-box { flex-grow: 1; padding: 10px 20px 20px 20px; display: flex; flex-direction: column; }
        
        .top-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }

        /* የቋንቋ ምርጫ */
        .lang-select {
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 5px;
            color: white;
        }

        .hero-title { font-size: 1.6rem; font-weight: 900; line-height: 1.2; margin-top: 10px; }
        .hero-title span { color: #f59e0b; }

        .full-content { width: 100%; }
        .video-wrapper { width: 100%; position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-y: 3px solid #f59e0b; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .section-label { color: #f59e0b; font-weight: 900; font-size: 1.1rem; border-left: 4px solid #f59e0b; padding-left: 10px; margin: 20px; }
        .card { background: rgba(30, 41, 59, 0.7); padding: 15px; border-radius: 10px; border: 1px solid #0ea5e9; margin: 0 20px 20px 20px; }
        
        footer { background: #0f172a; padding: 30px 10px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="header-container">
        <aside class="sidebar">
            <a href="#" class="nav-link">ቅድመ ዜና</a>
            <a href="#" class="nav-link">ሪፖርት</a>
            <a href="#" class="nav-link">ቱሪዝም</a>
            <a href="#" class="nav-link">ባህል</a>
            <a href="#" class="nav-link">ስነ ጽሁፍ</a>
            <a href="#" class="nav-link">ቴክ</a>
            <a href="#" class="nav-link">ፍልስፍና</a>
        </aside>

        <section class="hero-box">
            <div class="top-row">
                <div class="flex items-center gap-2">
                    <div class="bg-amber-500 w-8 h-8 rounded flex items-center justify-center text-black font-black">S</div>
                    <h1 class="font-black italic text-[11px] uppercase tracking-tighter">SAMI-TUBE MEDIA</h1>
                </div>
                <select class="lang-select">
                    <option>🇪🇹 አማርኛ</option>
                    <option>Afaan Oromoo</option>
                    <option>English</option>
                </select>
            </div>
            <h2 class="hero-title">እንኳን ወደ <span>መታሃራ</span><br>ዲጂታል ማዕከል በሰላም መጣችሁ</h2>
        </section>
    </div>

    <div class="full-content">
        <h3 class="section-label">የቅርብ ጊዜ ሪፖርቶች</h3>
        <div class="video-wrapper">
            <iframe src="https://www.youtube.com/embed/Yp9H-H6e_k8" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="card">
            <h5 class="text-amber-500 font-black mb-2">የልማት እንቅስቃሴዎች</h5>
            <p class="text-xs text-slate-300">በመታሃራ ከተማ እየተከናወኑ ያሉ የልማት ስራዎች እና የከተማዋ ገጽታ ለውጥ ላይ ያተኮረ ዘገባ።</p>
        </div>
    </div>

    <footer>
        <div class="text-[10px] text-slate-400 font-bold mb-2">
            ስልክ፦ +251 922 243 013 | ኢሜይል፦ sami2all@gmail.com
        </div>
        <p class="text-[8px] text-slate-600 font-bold uppercase tracking-widest">© 2026 ሳምሶን ተስፋዬ | Mataaharaa News</p>
    </footer>

</body>
</html>
