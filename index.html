<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | መታሃራ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body { 
            font-family: 'Noto Sans Ethiopic', sans-serif; 
            background: linear-gradient(-45deg, #020617, #0f172a, #1e293b, #020617);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white; margin: 0; overflow-x: hidden; 
        }
        .header-container { display: flex; width: 100%; border-bottom: 2px solid #f59e0b; }
        .sidebar { width: 85px; background: #0ea5e9; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-link { color: white; text-decoration: none; font-size: 0.6rem; font-weight: 800; padding: 15px 5px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .hero-box { flex-grow: 1; padding: 10px 20px; display: flex; flex-direction: column; }
        .top-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .lang-select { background: #1e293b; border: 1px solid rgba(255,255,255,0.2); font-size: 0.7rem; padding: 4px 8px; border-radius: 5px; color: white; cursor: pointer; }
        .hero-title { font-size: 1.6rem; font-weight: 900; line-height: 1.2; margin-top: 10px; }
        .hero-title span { color: #f59e0b; }
        .card { background: rgba(30, 41, 59, 0.7); padding: 15px; border-radius: 10px; border: 1px solid #0ea5e9; margin: 10px 20px; }
        .read-more { color: #f59e0b; font-size: 0.75rem; font-weight: bold; cursor: pointer; text-decoration: underline; margin-top: 8px; display: inline-block; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #0f172a; border: 2px solid #f59e0b; padding: 30px; border-radius: 15px; max-width: 600px; width: 100%; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #f59e0b; }
        .section-label { color: #f59e0b; font-weight: 900; font-size: 1.1rem; border-left: 4px solid #f59e0b; padding-left: 10px; margin: 20px; }
    </style>
</head>
<body>
    <div class="header-container">
        <aside class="sidebar">
            <a href="#" class="nav-link" id="nav1">ቅድመ ዜና</a>
            <a href="#" class="nav-link" id="nav2">ሪፖርት</a>
            <a href="#" class="nav-link" id="nav3">ቱሪዝም</a>
            <a href="#" class="nav-link" id="nav4">ባህል</a>
            <a href="#" class="nav-link" id="nav5">ስነ ጽሁፍ</a>
            <a href="#" class="nav-link" id="nav6">ቴክ</a>
            <a href="#" class="nav-link" id="nav7">ፍልስፍና</a>
        </aside>
        <section class="hero-box">
            <div class="top-row">
                <div class="flex items-center gap-2">
                    <div class="bg-amber-500 w-8 h-8 rounded flex items-center justify-center text-black font-black">S</div>
                    <h1 class="font-black italic text-[11px] uppercase tracking-tighter">SAMI-TUBE MEDIA</h1>
                </div>
                <select id="languageSelector" class="lang-select" onchange="updateLanguage()">
                    <option value="am">🇪🇹 አማርኛ</option>
                    <option value="om">Afaan Oromoo</option>
                    <option value="en">English</option>
                </select>
            </div>
            <h2 class="hero-title" id="welcomeText">እንኳን ወደ <span>መታሃራ</span><br>ዲጂታል ማዕከል በሰላም መጣችሁ</h2>
        </section>
    </div>
    <div class="full-content">
        <h3 class="section-label" id="latestNewsLabel">የቅርብ ጊዜ ዜናዎች</h3>
        <div class="card">
            <h5 class="text-amber-500 font-black mb-1" id="newsTitle1">የልማት እንቅስቃሴዎች</h5>
            <p class="text-[0.7rem] text-slate-300" id="newsShort1">በመታሃራ ከተማ እየተከናወኑ ያሉ የልማት ስራዎች መግለጫ...</p>
            <span class="read-more" id="readMore1" onclick="openModal(1)">ተጨማሪ ያንብቡ...</span>
        </div>
        <div class="card">
            <h5 class="text-amber-500 font-black mb-1" id="newsTitle2">ቱሪዝም በመታሃራ</h5>
            <p class="text-[0.7rem] text-slate-300" id="newsShort2">የመታሃራ ከተማ የቱሪስት መስህቦች እና መዳረሻዎች...</p>
            <span class="read-more" id="readMore2" onclick="openModal(2)">ተጨማሪ ያንብቡ...</span>
        </div>
        <div class="card">
            <h5 class="text-amber-500 font-black mb-1" id="newsTitle3">ስነ-ጽሁፍና ፍልስፍና</h5>
            <p class="text-[0.7rem] text-slate-300" id="newsShort3">ስለ ንቃተ ህሊና የሚያትቱ አጫጭር ጽሁፎች...</p>
            <span class="read-more" id="readMore3" onclick="openModal(3)">ተጨማሪ ያንብቡ...</span>
        </div>
    </div>
    <div id="newsModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" class="text-amber-500 font-black text-xl mb-4"></h2>
            <div id="modalBody" class="text-slate-200 leading-relaxed text-sm space-y-4"></div>
        </div>
    </div>
    <script>
        const translations = {
            am: {
                welcome: "እንኳን ወደ <span>መታሃራ</span><br>ዲጂታል ማዕከል በሰላም መጣችሁ",
                label: "የቅርብ ጊዜ ዜናዎች",
                readMore: "ተጨማሪ ያንብቡ...",
                nav: ["ቅድመ ዜና", "ሪፖርት", "ቱሪዝም", "ባህል", "ስነ ጽሁፍ", "ቴክ", "ፍልስፍና"],
                news: [
                    { t: "የመታሃራ ከተማ የልማት እንቅስቃሴዎች", s: "በመታሃራ ከተማ እየተከናወኑ ያሉ የልማት ስራዎች ዝርዝር መግለጫ...", b: "የመታሃራ ከተማ አስተዳደር የህዝቡን የልማት ጥያቄዎች ለመመለስ ሰፋፊ ስራዎችን እያከናወነ ይገኛል። ከእነዚህም መካከል ዋነኛው የንጹህ መጠጥ ውሃ አቅርቦትን ለማሳደግ የሚደረገው ጥረት ነው። በአሁኑ ወቅት አዳዲስ የውሃ ጉድጓዶች ተቆፍረው ለአገልግሎት ዝግጁ ሆነዋል። በተጨማሪም የከተማዋን ውበት ለመጠበቅና ለነዋሪዎች ምቹ የመዝናኛ ስፍራዎችን ለመፍጠር የሪቨርሳይድ ፓርክ ግንባታ በከፍተኛ ፍጥነት እየተከናወነ ይገኛል። የከተማው የውስጥ ለውስጥ መንገዶችም ደረጃቸውን የጠበቁ እንዲሆኑ ጥረት እየተደረገ ሲሆን፣ ይህም የከተማዋን የንግድና ማህበራዊ እንቅስቃሴ ያሳልጣል ተብሎ ይጠበቃል።" },
                    { t: "ቱሪዝም በመታሃራ እና አካባቢዋ", s: "የመታሃራ ከተማ የቱሪስት መስህቦች እና መዳረሻዎች ዝርዝር...", b: "መታሃራ በተፈጥሮ ሀብቷ እና በቱሪስት መዳረሻዎቿ የምትታወቅ የኢትዮጵያ አንዷ ከተማ ናት። በተለይም በአዋሽ ብሔራዊ ፓርክ አቅራቢያ መገኘቷ ለቱሪዝም ዘርፉ ትልቅ ዕድል ፈጥሮላታል። የከተማው አስተዳደር ይህንን የተፈጥሮ ስጦታ በመጠቀም ቱሪዝምን ለማሳደግና አለም አቀፍ ጎብኚዎችን ለመሳብ የተለያዩ የፕሮሞሽን ስራዎችን እያከናወነ ይገኛል። የአካባቢው ማህበረሰብም ለቱሪስቶች በሚያሳየው ደግነት እና የእንግዳ ተቀባይነት ባህል ይታወቃል። ጎብኚዎች በመታሃራ በሚቆዩበት ወቅት የተለያዩ ባህላዊ ምግቦችንና መጠጦችን እየተመገቡ የተፈጥሮ ውበትን እንዲያደንቁ ምቹ ሁኔታዎች ተፈጥረዋል።" },
                    { t: "ስነ-ጽሁፍ፣ ፍልስፍና እና ንቃተ ህሊና", s: "ስለ ንቃተ ህሊና እና ስነ-ልቦና የሚያትቱ ጥልቅ ትንታኔዎች...", b: "የሰው ልጅ ንቃተ ህሊና እና የአስተሳሰብ ለውጥ ለስኬት ያለው ሚና በዝርዝር የሚዳሰስበት ክፍል ነው። እዚህ ጋር ስለ ስቶይሲዝም (Stoicism) አስተምህሮ፣ ስለ አእምሮ ፕሮግራም (Subconscious programming) እና ስለ ሰው ልጅ የውስጥ ጥንካሬ ጥልቅ ትንታኔዎችን እናቀርባለን። የሰው ልጅ በህይወት ውስጥ የሚያጋጥሙትን ፈተናዎች እንዴት በአሸናፊነት መወጣት እንደሚችል፣ አእምሮውን እንዴት ለስኬት ማዘጋጀት እንደሚገባው እና የነገሮችን ትርጉም እንዴት መረዳት እንዳለበት በተለያዩ የስነ-ጽሁፍ ስራዎች እንቃኛለን። ይህ ክፍል ለውስጥ ሰላም እና ለግል እድገት ትልቅ አስተዋጽኦ ያበረክታል።" }
                ]
            },
            om: {
                welcome: "Baga gara jiddu-gala dijitaalaa <span>Mataaharaatti</span> nagaan dhuftan",
                label: "Oduuwwan dhihoo",
                readMore: "Dabalata dubbisuuf...",
                nav: ["Oduu Duraa", "Gabaasa", "Turiizimii", "Aadaa", "Og-barruu", "Teek", "Falaasama"],
                news: [
                    { t: "Hojiiwwan Misooma Magaalaa Mataaharaa", s: "Ibsa gabaabaa hojiiwwan misoomaa magaalaa Mataaharaa...", b: "Bulchiinsi magaalaa Mataaharaa gaaffii misoomaa uummataa deebisuuf hojiiwwan bal'aa hojjechaa jira. Isaan keessaa inni ijoon tattaaffii dhiyeessii bishaan dhugaatii qulqulluu guddisuuf taasifamudha. Yeroo ammaa kanatti boolli bishaan haaraan qotamee tajaajilaaf qophii ta'ee jira. Dabalataan miidhagina magaalaa eeguufi jiraattotaaf bakkeewwan boqonnaa mijataa uumuuf ijaarsi paarkii qarqara bishaanis saffisaan hojjetamaa jira." },
                    { t: "Turiizimii Mataaharaa fi Naannoo Ishee", s: "Bakkeewwan turiizimii Mataaharaa fi ibsa isaa...", b: "Mataaharaan qabeenya uumamaa fi bakkeewwan turiizimiin beekamti. Keessattuu Paarkii Biyyoolessaa Awaashitti dhihoo ta'uun ishee damee turiizimiitiif carraa guddaa uumeera. Bulchiinsi magaalaa turiizimii guddisuufi daawwattoota addunyaa hawwachuuf hojiiwwan beeksisuu adda addaa hojjechaa jira. Hawaasni naannichas turiistotaaf gaarummaa fi aadaa keessummaa simachuu qabuun beekama." },
                    { t: "Og-barruu, Falaasama fi Dammaqinsa", s: "Xiinxala gadi fagoo waa'ee dammaqinsa sammuu...", b: "Kutaan kun dammaqinsa sammuu fi jijjiirama ilaalchaa irratti xiyyeeffata. Barnoota Stooyisizimii, pirograamii sammuu fi jabinna keessoo namaa irratti xiinxala dhiyeessina. Namni tokko qorumsa jireenya keessatti isa mudatan akkamitti mo'achuu akka danda'u, sammuu isaa akkamitti milkaa'inaaf qopheessuu akka qabu kutaa kanatti dhiyeessina." }
                ]
            },
            en: {
                welcome: "Welcome to <span>Metehara</span> Digital Hub",
                label: "Latest News",
                readMore: "Read More...",
                nav: ["Pre-News", "Report", "Tourism", "Culture", "Literature", "Tech", "Philosophy"],
                news: [
                    { t: "Development Projects in Metehara City", s: "Detailed overview of development activities in Metehara...", b: "The Metehara city administration is executing extensive projects to address public demands. A key focus is enhancing clean water supply, with new boreholes recently completed for service. To improve urban beauty and provide residents with quality recreational spaces, the riverside park project is progressing rapidly. Upgrading internal roads is also a priority, expected to boost both commercial and social activities within the city." },
                    { t: "Tourism in Metehara and Surroundings", s: "List of tourist destinations and attractions in Metehara...", b: "Metehara is a prominent Ethiopian city known for its natural resources and tourist sites. Its proximity to Awash National Park provides a significant boost to the local tourism sector. The administration is actively engaged in promotional work to attract international visitors. The local community is celebrated for its hospitality and warm reception of guests, offering a unique blend of natural beauty and traditional experiences for every visitor." },
                    { t: "Literature, Philosophy, and Consciousness", s: "Deep analysis on human consciousness and psychology...", b: "This section explores the vital role of consciousness and mindset in achieving success. We offer in-depth reflections on Stoic teachings, subconscious programming, and inner strength. Through various literary works, we examine how individuals can overcome life's challenges, prime their minds for success, and find deeper meaning in their experiences. This content aims to support inner peace and personal development." }
                ]
            }
        };
        function updateLanguage() {
            const lang = document.getElementById('languageSelector').value;
            const data = translations[lang];
            document.getElementById('welcomeText').innerHTML = data.welcome;
            document.getElementById('latestNewsLabel').innerText = data.label;
            data.nav.forEach((text, i) => {
                const navEl = document.getElementById(`nav${i+1}`);
                if(navEl) navEl.innerText = text;
            });
            for(let i=0; i<3; i++) {
                document.getElementById(`newsTitle${i+1}`).innerText = data.news[i].t;
                document.getElementById(`newsShort${i+1}`).innerText = data.news[i].s;
                document.getElementById(`readMore${i+1}`).innerText = data.readMore;
            }
        }
        function openModal(id) {
            const lang = document.getElementById('languageSelector').value;
            const data = translations[lang].news[id-1];
            document.getElementById('modalTitle').innerText = data.t;
            // ረጅሙን ዝርዝር ጽሁፍ እዚህ ጋር እናስገባዋለን
            document.getElementById('modalBody').innerText = data.b;
            document.getElementById('newsModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('newsModal').style.display = 'none'; }
        window.onclick = function(event) { if (event.target == document.getElementById('newsModal')) closeModal(); }
    </script>
</body>
</html>
