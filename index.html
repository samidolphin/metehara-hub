<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE | Metehara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: #f1f5f9; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        .hidden-sidebar { transform: translateX(-100%); }
        .news-modal { display: none; position: fixed; inset: 0; z-index: 10000; background: #020617; overflow-y: auto; }
        .modal-active { display: block !important; }
    </style>
</head>
<body class="selection:bg-amber-500/30">

    <nav class="sticky top-0 z-50 glass p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-800 rounded-xl transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                    </svg>
                </button>
                
                <div class="flex items-center bg-slate-900/80 border border-slate-700 rounded-lg px-2 py-1">
                    <select id="mainLangSwitch" onchange="changeLanguage(this.value)" class="bg-transparent text-[10px] text-white outline-none font-bold cursor-pointer">
                        <option value="am" class="bg-slate-900">🇪🇹 አማርኛ</option>
                        <option value="or" class="bg-slate-900">🇪🇹 Afaan</option>
                        <option value="en" class="bg-slate-900">🇺🇸 EN</option>
                    </select>
                </div>
            </div>

            <div class="flex flex-col items-end">
                <h1 id="top-title" class="text-base font-bold italic text-white leading-none">የመተሃራ ከተማ</h1>
                <span class="text-[7px] text-amber-500 font-black tracking-widest uppercase mt-1">SAMI-TUBE MEDIA</span>
            </div>
        </div>
    </nav>

    <div id="sidebar" class="sidebar hidden-sidebar fixed inset-y-0 left-0 w-72 bg-slate-950 shadow-2xl border-r border-slate-800 flex flex-col">
        <div class="p-8 border-b border-slate-800 flex justify-between items-center bg-slate-900/20">
            <div>
                <h2 class="text-xl font-black italic text-amber-500 uppercase tracking-tighter">SAMI DOLPHIN</h2>
                <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Media Hub</p>
            </div>
            <button onclick="toggleSidebar()" class="text-slate-500 hover:text-white text-2xl">&times;</button>
        </div>

        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
            <a href="#" class="block p-4 text-white font-bold italic hover:bg-slate-900 rounded-xl transition-all">መነሻ</a>
            <a href="#" class="block p-4 text-slate-400 font-bold italic hover:bg-slate-900 rounded-xl transition-all">የአካባቢ ዜና</a>
            <a href="#" class="block p-4 text-slate-400 font-bold italic hover:bg-slate-900 rounded-xl transition-all">ግብርና</a>
            <a href="#" class="block p-4 text-slate-400 font-bold italic hover:bg-slate-900 rounded-xl transition-all">የከተማ ልማት</a>
            <a href="#" class="block p-4 text-slate-400 font-bold italic hover:bg-slate-900 rounded-xl transition-all">ስለ እኛ</a>
        </nav>

        <div class="p-6 border-t border-slate-900 bg-slate-900/30">
            <div class="grid grid-cols-1 gap-2">
                <button onclick="changeLanguage('am')" class="bg-amber-500 text-slate-950 py-2.5 rounded-lg font-black text-[10px]">🇪🇹 አማርኛ</button>
                <button onclick="changeLanguage('or')" class="bg-slate-800 text-slate-300 py-2.5 rounded-lg font-black text-[10px]">🇪🇹 Afaan Oromoo</button>
            </div>
        </div>
    </div>
    
    <div id="overlay" onclick="toggleSidebar()" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-[999]"></div>

    <main class="max-w-7xl mx-auto p-5 py-8">
        <div class="flex items-center gap-3 mb-8">
            <div class="h-6 w-1.5 bg-amber-500 rounded-full shadow-[0_0_10px_rgba(245,158,11,0.4)]"></div>
            <h2 id="section-title" class="text-xl font-black italic uppercase tracking-tighter">ዋና ዋና ዜናዎች</h2>
        </div>

        <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <div id="newsModal" class="news-modal">
        <div class="max-w-3xl mx-auto px-5 py-10">
            <div class="flex justify-end mb-6">
                <button onclick="closeNews()" class="bg-red-500/10 text-red-400 border border-red-500/20 px-5 py-2 rounded-full font-bold text-[10px] uppercase">ዝጋ / CLOSE</button>
            </div>
            <div id="newsContent" class="animate-slideUp"></div>
        </div>
    </div>

    <script>
        const contentData = {
            am: {
                top: "የመተሃራ ከተማ",
                sec: "ዋና ዋና ዜናዎች",
                read: "ሙሉውን አንብብ →",
                news: [
                    {
                        title: "አቶ አዲሱ ዋቆ በመተሃራ ከተማ ያስመዘገቧቸው የልማት ስራዎች አዲስ ገጽታ እየሰጡ ነው",
                        body: "ከንቲባ አቶ አዲሱ ዋቆ በኃላፊነት ከተሾሙበት ጊዜ ጀምሮ እያከናወኗቸው ያሉ የልማትና የመልካም አስተዳደር ስራዎች የከተማዋን ገጽታ ከመቀየር ባለፈ ለነዋሪዎች ምቾት አስተዋጽኦ እያበረከቱ ነው።",
                        img: "https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=800",
                        rep: "ሳምሶን ተስፋዬ",
                        date: "2018"
                    },
                    {
                        title: "የመተሃራ ከተማ የንፁህ መጠጥ ውሃ ፕሮጀክት የ90% መጠናቀቅ ደረጃ ላይ ደረሰ",
                        body: "ከ1.4 ቢሊዮን ብር በላይ ወጪ እየተከናወነ የሚገኘው ግዙፍ የውሃ ፕሮጀክት ግንባታ ከ90 በመቶ በላይ መጠናቀቁ ተበሰረ።",
                        img: "https://images.unsplash.com/photo-1541944743827-e04bb645d994?q=80&w=800",
                        rep: "ሳሚ ዶልፊን",
                        date: "2018"
                    }
                ]
            },
            or: {
                top: "Magaalaa Matahaaraa",
                sec: "ODUUWWAN GURGUDDOO",
                read: "Dubbisi →",
                news: [
                    {
                        title: "Hojiwwan Misoomaa Obbo Addisuu Waaqoon Raawwataman Magaalattiif Bifa Haaraa Kennaa Jiru",
                        body: "Kantiibaan Magaalaa Matahaaraa Obbo Addisuu Waaqoo erga muudamaniirree hojiwwan misoomaa fi bulchiinsa gaarii raawwachaa jiran bifa magaalattii jijjiiraa jiru.",
                        img: "https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=800",
                        rep: "Samson Tesfaye",
                        date: "2018"
                    }
                ]
            }
        };

        let activeLang = 'am';

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden-sidebar');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function changeLanguage(lang) {
            activeLang = lang;
            document.getElementById('mainLangSwitch').value = lang;
            render();
            if(!document.getElementById('sidebar').classList.contains('hidden-sidebar')) toggleSidebar();
        }

        function render() {
            const d = contentData[activeLang] || contentData.am;
            document.getElementById('top-title').innerText = d.top;
            document.getElementById('section-title').innerText = d.sec;
            
            document.getElementById('newsGrid').innerHTML = d.news.map((n, i) => `
                <div onclick="openNews(${i})" class="bg-slate-900/40 border border-slate-800 rounded-3xl overflow-hidden group hover:border-amber-500/30 transition-all cursor-pointer">
                    <div class="h-52 overflow-hidden"><img src="${n.img}" class="w-full h-full object-cover"></div>
                    <div class="p-6 space-y-3">
                        <h3 class="text-lg font-bold leading-tight group-hover:text-amber-400">${n.title}</h3>
                        <p class="text-slate-400 text-[11px] line-clamp-2">${n.body}</p>
                        <div class="text-white font-black text-[9px] uppercase tracking-widest pt-2">${d.read}</div>
                    </div>
                </div>
            `).join('');
        }

        function openNews(id) {
            const n = contentData[activeLang].news[id];
            document.getElementById('newsContent').innerHTML = `
                <div class="space-y-6">
                    <h2 class="text-2xl font-black italic text-white uppercase">${n.title}</h2>
                    <div class="text-[9px] text-slate-500 font-bold border-y border-slate-800 py-4 uppercase tracking-widest">
                        ዘጋቢ: ${n.rep} | ቀን: ${n.date}
                    </div>
                    <img src="${n.img}" class="w-full rounded-2xl border border-slate-800">
                    <p class="text-slate-300 text-base leading-relaxed font-light">${n.body}</p>
                </div>
            `;
            document.getElementById('newsModal').classList.add('modal-active');
            document.body.style.overflow = 'hidden';
        }

        function closeNews() {
            document.getElementById('newsModal').classList.remove('modal-active');
            document.body.style.overflow = 'auto';
        }

        window.onload = render;
    </script>
</body>
</html>
