<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Mataaharaa Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; }
        
        /* የግራ ሰማያዊ ሜኑ */
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: #0ea5e9; z-index: 100; overflow-y: auto; }
        .nav-link { display: block; padding: 20px 25px; color: white; font-weight: 800; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 1.1rem; }
        .nav-link:hover { background: rgba(0,0,0,0.1); }

        .main-content { margin-left: 240px; min-height: 100vh; }
        
        /* Header */
        header { background: #0f172a; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* Hero Section */
        .hero-section { padding: 60px 40px; }
        .hero-title { font-size: 3.5rem; font-weight: 900; line-height: 1.2; margin-bottom: 20px; }
        .hero-title span { color: #f59e0b; }
        .hero-sub { color: #94a3b8; font-size: 1.2rem; font-weight: 600; border-left: 4px solid #f59e0b; padding-left: 20px; }

        /* Video Section */
        .video-box { max-width: 850px; margin: 40px auto; border-radius: 25px; overflow: hidden; border: 4px solid #f59e0b; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* News Section */
        .news-grid { padding: 40px; display: grid; gap: 40px; max-width: 1000px; margin: 0 auto; }
        .news-card { background: #0f172a; border-radius: 30px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .news-img { height: 350px; background-size: cover; background-position: center; border-bottom: 2px solid #f59e0b; }
        .news-body { padding: 30px; }
        .news-title { color: #f59e0b; font-size: 1.8rem; font-weight: 900; margin-bottom: 15px; font-style: italic; }
        .news-text { color: #cbd5e1; line-height: 1.7; }

        /* Footer & Contact */
        footer { background: #0f172a; padding: 50px 20px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .contact-text { color: #94a3b8; font-weight: 800; margin-bottom: 10px; }
        .social-btns { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; margin-top: 20px; }
        .social-btn { width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; display: flex; flex-wrap: wrap; }
            .nav-link { padding: 10px 15px; font-size: 0.8rem; border-bottom: none; }
            .main-content { margin-left: 0; }
            .hero-title { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <a href="#" class="nav-link">ቅድመ ዜና</a>
        <a href="#" class="nav-link">ሪፖርት</a>
        <a href="#" class="nav-link">ቱሪዝም</a>
        <a href="#" class="nav-link">ባህል</a>
        <a href="#" class="nav-link">ስነ ጽሁፍ</a>
        <a href="#" class="nav-link">ቴክ</a>
        <a href="#" class="nav-link">ፍልስፍና</a>
    </aside>

    <div class="main-content">
        <header>
            <div class="flex items-center gap-3">
                <div class="bg-amber-500 w-11 h-11 rounded-xl flex items-center justify-center text-black font-black text-xl shadow-lg">S</div>
                <h1 class="font-black italic text-lg uppercase tracking-tighter">SAMI-TUBE MEDIA</h1>
            </div>
            <select id="langSelect" onchange="updateContent()" class="bg-slate-800 text-white text-xs px-4 py-2 rounded-lg border border-white/10">
                <option value="am">አማርኛ</option>
                <option value="om">Afaan Oromoo</option>
                <option value="en">English</option>
            </select>
        </header>

        <section class="hero-section">
            <h2 id="heroTitle" class="hero-title">እንኳን ወደ <span>ማታሃራ</span><br>ዲጂታል ማዕከል<br>በሰላም መጣችሁ</h2>
            <p id="heroSub" class="hero-sub">ወቅታዊ መረጃዎች፣ የቴክኖሎጂ ውጤቶች እና<br>የሥነ-ጽሁፍ ማዕከል</p>
        </section>

        <div class="px-6">
            <h3 id="videoLabel" class="text-white font-black italic border-l-4 border-amber-500 pl-3 mb-6">የቅርብ ጊዜ የቪዲዮ ሪፖርቶች</h3>
            <div class="video-box">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/Yp9H-H6e_k8" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
        </div>

        <main id="newsGrid" class="news-grid"></main>

        <footer>
            <p class="contact-text">ማታሃራ፣ ኢትዮጵያ</p>
            <p class="contact-text">ስልክ፦ +251911926976 | ኢሜይል፦ sami2all@gmail.com</p>
            <div class="social-btns">
                <a href="https://t.me/Meteharainfobot" class="social-btn bg-sky-500"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" width="25"></a>
                <a href="https://youtube.com/@samsontesfaye2670" class="social-btn bg-red-600"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" width="25"></a>
            </div>
            <p id="copy" class="text-slate-600 font-bold uppercase tracking-[0.3em] text-[10px]">© 2026 ሳምሶን ተስፋዬ | በሳሚ ዶልፊን የቀረበ</p>
        </footer>
    </div>

    <script>
        const content = {
            am: {
                hT: "እንኳን ወደ <span>ማታሃራ</span><br>ዲጂታል ማዕከል<br>በሰላም መጣችሁ",
                hS: "ወቅታዊ መረጃዎች፣ የቴክኖሎጂ ውጤቶች እና<br>የሥነ-ጽሁፍ ማዕከል",
                vL: "የቅርብ ጊዜ የቪዲዮ ሪፖርቶች",
                news: [
                    { t: "የማታሃራ ከተማ የንፁህ መጠጥ ውሃ ፕሮጀክት የ90% መጠናቀቅ", d: "የከተማዋን የውሃ ችግር በዘላቂነት የሚፈታው ግዙፍ ፕሮጀክት ከ1.4 ቢሊዮን ብር በላይ በሆነ ወጪ እየተከናወነ ይገኛል።", i: "https://images.unsplash.com/photo-1541913057-07490214371b?q=80&w=800" },
                    { t: "የስነ-ህይወት ጥበብ በበሰቃ ሃይቅ ዳርቻ፤ የብርቱካን እርሻ", d: "በበሰቃ ሃይቅ ዳርቻ የሚገኘው የብርቱካን እርሻ በሳይንሳዊ ዘዴ ምርታማነቱ እየጨመረ ይገኛል።", i: "https://images.unsplash.com/photo-1557800636-894a64c1696f?q=80&w=800" }
                ]
            }
        };

        function updateContent() {
            const lang = document.getElementById('langSelect').value;
            const l = content[lang] || content.am;
            document.getElementById('heroTitle').innerHTML = l.hT;
            document.getElementById('heroSub').innerHTML = l.hS;
            document.getElementById('videoLabel').innerText = l.vL;

            document.getElementById('newsGrid').innerHTML = l.news.map(n => `
                <div class="news-card">
                    <div class="news-img" style="background-image: url('${n.i}')"></div>
                    <div class="news-body">
                        <h4 class="news-title">${n.t}</h4>
                        <p class="news-text">${n.d}</p>
                    </div>
                </div>
            `).join('');
        }
        window.onload = updateContent;
    </script>
</body>
</html>
