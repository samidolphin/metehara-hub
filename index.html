<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Metehara Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; overflow-x: hidden; }
        .hero-section { display: flex; height: 55vh; position: relative; overflow: hidden; }
        .side-menu { background-color: #0c82cf; width: 100px; display: flex; flex-direction: column; justify-content: center; gap: 20px; z-index: 30; }
        .menu-item { color: white; font-size: 0.7rem; font-weight: 800; text-align: center; cursor: pointer; }
        #bg-slider { position: absolute; inset: 0 0 0 100px; z-index: 1; }
        .slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.5s ease-in-out; }
        .slide.active { opacity: 1; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(2,6,23,0.95) 0%, rgba(2,6,23,0.4) 100%); z-index: 5; }
        .hero-content { position: relative; z-index: 10; padding-left: 30px; display: flex; flex-direction: column; justify-content: center; }
        
        /* News & Ads */
        .news-card { background: #0f172a; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; }
        .ad-banner { background: linear-gradient(45deg, #1e293b, #0f172a); border: 2px dashed #f59e0b; border-radius: 20px; height: 120px; display: flex; align-items: center; justify-content: center; text-align: center; margin: 20px 0; }
        
        /* Video Wrapper */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); padding: 15px; overflow-y: auto; }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; }
        .modal-content { background: #0f172a; border: 1px solid #f59e0b; border-radius: 20px; padding: 25px; max-width: 650px; width: 100%; margin: 20px auto; position: relative; }
        .close-btn { background: #f59e0b; color: black; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; cursor: pointer; float: right; }
    </style>
</head>
<body>

    <header class="p-4 flex justify-between items-center bg-[#020617] border-b border-white/5 sticky top-0 z-50">

    <div class="hero-section">

    <main class="max-w-6xl mx-auto p-5 space-y-10">

            <div class="video-container shadow-2xl">

    </main>

    <footer class="bg-slate-950 p-10 text-center border-t border-white/5">
        <h4 class="text-amber-500 font-black italic text-lg mb-6 uppercase">SAMI-TUBE MEDIA</h4>
        <div class="flex justify-center flex-wrap gap-4 mb-8">

            <a href="https://www.facebook.com/share/1CgMxSgtLu/" target="_blank" class="bg-blue-700 px-6 py-2 rounded-full text-[10px] font-bold transition hover:scale-105">FACEBOOK</a>
            <a href="https://t.me/Ayyotube_bot" target="_blank" class="bg-blue-500 px-6 py-2 rounded-full text-[10px] font-bold transition hover:scale-105">TELEGRAM</a>
        </div>
        <p class="text-slate-600 text-[9px] tracking-widest uppercase">&copy; 2026 Digital Excellence | SAMSON TESFAYE</p>
    </footer>

    <div id="newsModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="closeModal()">&times;</div>
            <h2 id="modalTitle" class="text-xl font-black text-amber-500 mb-5 italic border-b border-white/5 pb-2"></h2>
            <div id="modalBody" class="text-slate-200 leading-relaxed text-sm whitespace-pre-wrap text-justify"></div>
        </div>
    </div>

    <script>
        const content = {
            am: {
                heroTitle: 'ወደ መተሃራ ዲጂታል መረጃ መረብ በደህና መጡ',
                heroSub: 'ወቅታዊ የከተማዋን መረጃዎች፣ የልማት ስራዎችን እና ውብ ገጽታዎችን በአንድ ቦታ ያግኙ።',
                newsLabel: 'ዋና ዋና ዜናዎች',

                news: [
                    { 
                        t: "አቶ አዲሱ ዋቆ ያስመዘገቧቸው የልማት ስራዎች", 
                        i: "1775744540465.jpg",

                        f: "መተሃራ — የመተሃራ ከተማ ከንቲባ አቶ አዲሱ ዋቆ በኃላፊነት ከተሾሙበት ጊዜ ጀምሮ እያከናወኗቸው ያሉ የልማትና የመልካም አስተዳደር ስራዎች የከተማዋን ገጽታ ከመቀየር ባለፈ ለነዋሪዎች ምቾት ትልቅ አስተዋጽኦ እያበረከቱ መሆኑ ተነገረ።\n\nከንቲባው በከተማዋ በተለይም በአካባቢ ጥበቃ እና በከተማ ውበት ላይ ያተኮሩ የፈጠራ ስራዎችን በመተግበር ላይ ይገኛሉ። ከእነዚህም መካከል ቀደም ሲል የቆሻሻ ክምር የነበረውን የመተሃራ ሃይቅ ዳርቻ ወደ ውብ የመዝናኛ ስፍራነት መቀየራቸው በዋናነት ይጠቀሳል።\n\nዘጋቢ፡ ሳምሶን ተስፋዬ" 
                    },
                    { 
                        t: "የውሃ ፕሮጀክት 90% ደረሰ", 
                        i: "1775744537702.jpg", 
                        d: "የከተማዋን የውሃ ችግር በዘላቂነት የሚፈታው ግዙፍ ፕሮጀክት ከ1.4 ቢሊዮን ብር በላይ ወጪ እየተከናወነ ይገኛል።", 
                        f: "በመተሃራ ከተማ አስተዳደር ለረጅም ጊዜ ሲጠበቅ የነበረውና የከተማዋን የንፁህ መጠጥ ውሃ ችግር በዘላቂነት ይፈታል ተብሎ የታመነበት ግዙፍ የውሃ ፕሮጀክት ግንባታ ከ90 በመቶ በላይ መጠናቀቁ ተበሰረ።\n\nከ1.4 ቢሊዮን ብር በላይ ወጪ እየተከናወነ የሚገኘው ይህ ፕሮጀክት ለቀጣዮቹ 50 ዓመታት አገልግሎት ይሰጣል።" 
                    },
                    { 
                        t: "የስነ-ህይወት ጥበብ በበሰቃ ሃይቅ", 
                        i: "1775744531970.jpg", 
                        d: "በኑራኤራ እርሻ ልማት ባለሙያዎች የሚከናወነው ሳይንሳዊ የመግረዝ ስራ ምርታማነትን እያረጋገጠ ነው።", 
                        f: "በመታሃራ ከተማ በበሰቃ ሃይቅ ዳርቻ እየተገነባ ካለው ውብ የመዝናኛ ማዕከል ባሻገር፣ ሌላኛው ተፈጥሯዊ ድምቀት የሆነው የብርቱካን እርሻ በከፍተኛ የባለሙያ ጥበብ እየለማ ይገኛል።\n\nየመግረዝ (Pruning) ስራው የዛፉን ጤና እና ምርታማነት የሚያረጋግጥ ሳይንሳዊ ሂደት ነው።" 
                    }
                ]
            },
            om: {
                heroTitle: 'Giddu-gala Odeeffannoo Mataaharaatti Baga Nagaan Dhuftan',
                heroSub: 'Odeeffannoo magaalaa yeroo fi hojiiwwan misoomaa hunda bakka tokkotti argattu.',
                newsLabel: 'ODUUWWAN IJOO',
                nav: ["Oduu", "Ripportii", "Turiizimii", "Aadaa"],
                news: [
                    { t: "Hojii Misoomaa Obbo Addisuu Waaqoo", i: "1775744540465.jpg", d: "Hojiiwwan kantiibaa magaalaa Mataaharaatiin hojjetamaa jiran bifa haaraa kennaa jiru.", f: "Mataaharaa — Kantiibaan magaalaa Mataaharaa Obbo Addisuu Waaqoo hojiiwwan misoomaa fi miidhagina magaalaarratti hojiiwwan kalaqaa hojjechaa jiru." },
                    { t: "Pirojektii Bishaan Dhugaatii 90%", i: "1775744537702.jpg", d: "Pirojektiin guddaan rakkoo bishaan magaalaa hiiku kun xumuramaarra jira.", f: "Pirojektiin bishaan dhugaatii magaalaa Mataaharaa amma 90% ol xumuramuun isaa beeksifameera. Baasii biliyoona 1.4 oliin hojjetama." },
                    { t: "Ogummaa Qonnaa Haroo Basakaatti", i: "1775744531970.jpg", d: "Ogeeyyii qonnaa Nuraa Eraatiin hojiin mirmiruu (pruning) birtukaanaa hojjetamaa jira.", f: "Qarqara haroo Basakaatti hojiin qonna birtukaanaa ogummaa ol’aanaadhaan hojjetamaa jira." }
                ]
            },
            en: {
                heroTitle: 'Welcome to Metehara Digital Hub',
                heroSub: 'Get the latest city updates, development projects, and tourism attractions.',
                newsLabel: 'TOP STORIES',
                nav: ["News", "Report", "Tourism", "Culture"],
                news: [
                    { t: "Development by Mayor Addisu Wako", i: "1775744540465.jpg", d: "Infrastructure projects led by Mayor Addisu Wako are giving the city a new look.", f: "The development and good governance works carried out by the Mayor of Metehara city, Addisu Wako, are significantly improving the city's image." },
                    { t: "Water Project Reaches 90%", i: "1775744537702.jpg", d: "The 1.4 billion ETB water project is nearing completion to solve water issues.", f: "The construction of the massive water project in Metehara city is now over 90% complete, providing sustainable water for 50 years." },
                    { t: "Biological Art at Lake Beseka", i: "1775744531970.jpg", d: "Scientific pruning of orange trees is ensuring high productivity and tree health.", f: "Scientific orange farming is a highlight near Lake Beseka, with expert pruning ensuring high tree productivity." }
                ]
            }
        };

        function updateContent() {
            const lang = document.getElementById('langSelect').value;
            const data = content[lang] || content.am;
            document.getElementById('heroTitle').innerText = data.heroTitle;
            document.getElementById('heroSub').innerText = data.heroSub;
            document.getElementById('newsLabel').innerText = data.newsLabel;
            document.getElementById('navNews').innerText = data.nav[0];
            document.getElementById('navReport').innerText = data.nav[1];
            document.getElementById('navTour').innerText = data.nav[2];
            document.getElementById('navCulture').innerText = data.nav[3];

            const grid = document.getElementById('newsGrid');
            grid.innerHTML = data.news.map((n, index) => `
                <div class="news-card" onclick="openModal('${lang}', ${index})">
                    <div class="news-img" style="background-image: url('${n.i}')"></div>
                    <div class="p-5">
                        <h4 class="font-black italic text-amber-500 mb-3 text-sm leading-snug">${n.t}</h4>
                        <p class="text-slate-400 text-[11px] leading-relaxed mb-4">${n.d}</p>
                        <span class="text-white text-[10px] font-black uppercase border border-amber-500/30 px-3 py-1.5 rounded-full italic">Read More +</span>
                    </div>
                </div>
            `).join('');
        }

        function openModal(lang, index) {
            const item = content[lang].news[index];
            document.getElementById('modalTitle').innerText = item.t;
            document.getElementById('modalBody').innerText = item.f;
            document.getElementById('newsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('newsModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        let current = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 5000);

        window.onload = updateContent;
    </script>
</body>
</html>
