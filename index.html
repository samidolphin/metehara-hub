<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE | Metehara News Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: #f1f5f9; margin: 0; overflow-x: hidden; }
        .news-modal { display: none; position: fixed; inset: 0; z-index: 10000; background: #020617; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .modal-active { display: block !important; }
        .animate-slideUp { animation: slideUp 0.5s cubic-bezier(0.2, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="selection:bg-amber-500/30">

    <nav class="sticky top-0 z-50 glass border-b border-slate-800 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-amber-500 p-2 rounded-xl shadow-lg shadow-amber-500/20">
                    <span class="text-slate-900 font-black text-xl">S</span>
                </div>
                <div>
                    <h1 id="nav-title" class="text-xl font-bold italic uppercase tracking-tight">የመተሃራ ከተማ</h1>
                    <p class="text-[9px] text-amber-500 font-bold uppercase tracking-widest leading-none">SAMI-TUBE MEDIA</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <select id="langSwitch" onchange="updateUI()" class="bg-slate-800 border border-slate-700 px-4 py-2 rounded-full text-xs text-white outline-none cursor-pointer hover:bg-slate-700 transition-all">
                    <option value="am">🇪🇹 አማርኛ</option>
                    <option value="or">🇪🇹 Afaan Oromoo</option>
                    <option value="en">🇺🇸 English</option>
                </select>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 py-12">
        <div class="flex items-center gap-4 mb-12">
            <div class="h-10 w-2 bg-amber-500 rounded-full shadow-[0_0_20px_rgba(245,158,11,0.6)]"></div>
            <h2 id="section-title" class="text-2xl md:text-3xl font-black italic uppercase tracking-tighter">ዋና ዋና ዜናዎች / LATEST NEWS</h2>
        </div>

        <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </main>

    <div id="newsModal" class="news-modal">
        <div class="max-w-4xl mx-auto px-6 py-12">
            <div class="flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
                <div class="text-amber-500 font-bold text-xs tracking-widest uppercase" id="modal-category">NEWS REPORT</div>
                <button onclick="closeNews()" class="bg-red-500/10 text-red-500 border border-red-500/20 px-6 py-2 rounded-full font-bold text-xs uppercase hover:bg-red-500 hover:text-white transition-all">ዝጋ / Close</button>
            </div>
            <div id="newsContent" class="animate-slideUp"></div>
        </div>
    </div>

    <script>
        const content = {
            am: {
                nav: "የመተሃራ ከተማ",
                featured: "ዋና ዋና ዜናዎች",
                readMore: "ሙሉውን አንብብ",
                reporter: "ዘጋቢ",
                news: [
                    {
                        title: "አቶ አዲሱ ዋቆ በመተሃራ ከተማ ያስመዘገቧቸው የልማት ስራዎች አዲስ ገጽታ እየሰጡ ነው",
                        image: "https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=800",
                        body: "ከንቲባ አቶ አዲሱ ዋቆ በኃላፊነት ከተሾሙበት ጊዜ ጀምሮ እያከናወኗቸው ያሉ የልማትና የመልካም አስተዳደር ስራዎች የከተማዋን ገጽታ እየቀየሩ ይገኛሉ።",
                        full: "መተሃራ — የመተሃራ ከተማ ከንቲባ አቶ አዲሱ ዋቆ በኃላፊነት ከተሾሙበት ጊዜ ጀምሮ እያከናወኗቸው ያሉ የልማትና የመልካም አስተዳደር ስራዎች የከተማዋን ገጽታ ከመቀየር ባለፈ ለነዋሪዎች ምቾት ትልቅ አስተዋጽኦ እያበረከቱ መሆኑ ተነገረ።\n\nከንቲባው በከተማዋ በተለይም በአካባቢ ጥበቃ እና በከተማ ውበት ላይ ያተኮሩ የፈጠራ ስራዎችን በመተግበር ላይ ይገኛሉ። ከእነዚህም መካከል ቀደም ሲል የቆሻሻ ክምር የነበረውን የመተሃራ ሃይቅ ዳርቻ ወደ ውብ የመዝናኛ ስፍራነት መቀየራቸው በዋናነት ይጠቀሳል። በአሁኑ ወቅት ስፍራው ለከተማዋ ነዋሪዎችና ለጎብኚዎች ምቹ መዳረሻ መሆን መቻሉ ተመልክቷል።\n\nበሌላ በኩል፣ ከንቲባው በሃይቁ ዳርቻ ላይ የብርቱካን እርሻ ልማትን በማስተዋወቅ አዲስ የከተማ ግብርና ተሞክሮን ወደ ተግባር ቀይረዋል። ይህ የአረንጓዴ ልማት ተነሳሽነት ከተማዋ ያላትን የተፈጥሮ ፀጋ በአግባቡ ጥቅም ላይ ለማዋል ያለመና መተሃራን የአረንጓዴ ልማት ተምሳሌት የሚያደርግ እንደሆነ ተገልጿል።",
                        date: "ሚያዝያ 7/2018",
                        rep: "ሳምሶን ተስፋዬ"
                    },
                    {
                        title: "የመተሃራ ከተማ የንፁህ መጠጥ ውሃ ፕሮጀክት የ90% መጠናቀቅ ደረጃ ላይ ደረሰ",
                        image: "https://images.unsplash.com/photo-1541944743827-e04bb645d994?q=80&w=800",
                        body: "ከ1.4 ቢሊዮን ብር በላይ ወጪ እየተከናወነ የሚገኘው ግዙፍ የውሃ ፕሮጀክት ግንባታ ከ90 በመቶ በላይ መጠናቀቁ ተበሰረ።",
                        full: "መተሃራ፣ መጋቢት 6/2018 — በመተሃራ ከተማ አስተዳደር ለረጅም ጊዜ ሲጠበቅ የነበረውና የከተማዋን የንፁህ መጠጥ ውሃ ችግር በዘላቂነት ይፈታል ተብሎ የታመነበት ግዙፍ የውሃ ፕሮጀክት ግንባታ ከ90 በመቶ በላይ መጠናቀቁ ተበሰረ።\n\nከ1.4 ቢሊዮን ብር በላይ ወጪ እየተከናወነ የሚገኘው ይህ ፕሮጀክት፣ በአሁኑ ወቅት የማጠቃለያ ምዕራፍ ላይ ይገኛል። የከተማዋ ከንቲባ አቶ አዲሱ ዋቆ እና የውሃና ፍሳሽ አገልግሎት ድርጅት ስራ አስኪያጅ አቶ ሙሉቀን ስንታየሁ በስራው ሂደት ላይ ባደረጉት የመስክ ምልከታ፣ ግንባታው በጥራት እና በተቀመጠለት የጊዜ ገደብ እየተከናወነ መሆኑን አረጋግጠዋል።\n\nፕሮጀክቱ ሲጠናቀቅ የከተማዋን የውሃ ሽፋን 100 በመቶ የሚያደርስ ሲሆን ለቀጣዮቹ 50 ዓመታት ያህል አገልግሎት መስጠት የሚያስችል አቅም አለው።",
                        date: "መጋቢት 6/2018",
                        rep: "ሳሚ ዶልፊን"
                    },
                    {
                        title: "የስነ-ህይወት ጥበብ በበሰቃ ሃይቅ ዳርቻ፤ የብርቱካን እርሻ ሳይንሳዊ ክብካቤ",
                        image: "https://images.unsplash.com/photo-1611080626919-7cf5a969fc8f?q=80&w=800",
                        body: "በበሰቃ ሃይቅ ዳርቻ እየለማ ያለው የብርቱካን እርሻ በሳይንሳዊ የመግረዝ (Pruning) ስራ ምርታማነቱ እንዲጨምር እየተደረገ ይገኛል።",
                        full: "በመታሃራ ከተማ በበሰቃ ሃይቅ ዳርቻ እየተገነባ ካለው ውብ የመዝናኛ ማዕከል ባሻገር፣ ሌላኛው ተፈጥሯዊ ድምቀት የሆነው የብርቱካን እርሻ በከፍተኛ የባለሙያ ጥበብ እየለማ ይገኛል።\n\nበኑራኤራ እርሻ ልማት የረጅም ጊዜ ልምድ ባላቸው ባለሙያዎች የሚከናወነው የብርቱካን ዛፎች የመግረዝ (Pruning) ስራ፣ ተራ የቅርንጫፍ ቅነሳ ሳይሆን የዛፉን ጤና እና ምርታማነት የሚያረጋግጥ ሳይንሳዊ ሂደት ነው። ቅርንጫፎች በሚገረዙበት ወቅት ዛፉ ለአየር ንክኪ እና ለበሽታ አምጪ ተህዋስያን ተጋላጭ እንዳይሆን፣ በተቆረጡት ክፍሎች ላይ ልዩ የኬሚካል ቅባት የመቀባት ስራ ይከናወናል።",
                        date: "ሚያዝያ 7/2018",
                        rep: "ሳሚ ዶልፊን"
                    }
                ]
            },
            or: {
                nav: "Magaalaa Matahaaraa",
                featured: "ODUUWWAN GURGUDDOO",
                readMore: "Guutuu Dubbisi",
                reporter: "Gabaasaa",
                news: [
                    {
                        title: "Hojiwwan Misoomaa Obbo Addisuu Waaqoon Raawwataman Magaalattiif Bifa Haaraa Kennaa Jiru",
                        image: "https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=800",
                        body: "Kantiibaan Magaalaa Matahaaraa Obbo Addisuu Waaqoo hojiwwan misoomaa fi bulchiinsa gaarii raawwachaa jiraniin bifa magaalattii jijjiiraa jiru.",
                        full: "Matahaaraa — Kantiibaan Magaalaa Matahaaraa Obbo Addisuu Waaqoo erga muudamaniirree hojiwwan misoomaa fi bulchiinsa gaarii raawwachaa jiran bifa magaalattii jijjiiruu bira darbee qananii jiraattotaatiif gumaacha guddaa gochaa jiraachun ibsame.",
                        date: "Ebla 7/2018",
                        rep: "Samson Tesfaye"
                    },
                    {
                        title: "Pirojektiin Bishaan Dhugaatii Qulqulluu Magaalaa Matahaaraa 90% irra Gahe",
                        image: "https://images.unsplash.com/photo-1541944743827-e04bb645d994?q=80&w=800",
                        body: "Pirojektiin bishaanii birrii biliyoona 1.4 olitti hojjetamaa jiru kun dhibbeentaa 90 ol xumuramuun isaa ibsameera.",
                        full: "Pirojektiin bishaan dhugaatii qulqulluu magaalichaa waggoota 50 dhufaniif tajaajila amansiisaa kennuu danda'u kun xumura irra gahee jira.",
                        date: "Bitootessa 6/2018",
                        rep: "Sami Dolphin"
                    }
                ]
            }
        };

        function updateUI() {
            const lang = document.getElementById('langSwitch').value;
            const t = content[lang] || content['am'];
            document.getElementById('nav-title').innerText = t.nav;
            document.getElementById('section-title').innerText = t.featured;
            
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = t.news.map((n, i) => `
                <div onclick="openNews(${i})" class="bg-slate-900/50 rounded-[2.5rem] border border-slate-800 overflow-hidden group hover:border-amber-500/50 transition-all duration-500 shadow-2xl cursor-pointer">
                    <div class="h-64 overflow-hidden relative">
                        <img src="${n.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent opacity-60"></div>
                    </div>
                    <div class="p-8 space-y-4">
                        <div class="flex items-center gap-2 text-amber-500 text-[10px] font-black uppercase tracking-[0.2em]">
                            <span class="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></span> Breaking News
                        </div>
                        <h3 class="text-xl font-bold leading-snug group-hover:text-amber-400 transition-colors">${n.title}</h3>
                        <p class="text-slate-400 text-sm font-light leading-relaxed line-clamp-3">${n.body}</p>
                        <div class="pt-4 flex items-center gap-2 text-white font-black text-[10px] uppercase tracking-widest">
                            ${t.readMore} <span class="text-amber-500 text-xl transition-transform group-hover:translate-x-2">→</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openNews(id) {
            const lang = document.getElementById('langSwitch').value;
            const t = content[lang] || content['am'];
            const data = t.news[id];
            
            const detailHtml = `
                <div class="space-y-10 pb-20">
                    <div class="flex gap-6 items-start">
                        <div class="w-2 h-20 bg-amber-500 rounded-full shadow-[0_0_20px_rgba(245,158,11,0.5)]"></div>
                        <h2 class="text-3xl md:text-5xl font-black italic text-white leading-[1.1] tracking-tighter uppercase">${data.title}</h2>
                    </div>
                    
                    <div class="flex flex-wrap items-center gap-6 text-slate-500 text-xs font-bold border-y border-slate-800/60 py-6 italic uppercase tracking-wider">
                        <div class="flex items-center gap-2">
                            <span class="text-amber-500 text-xl">|</span> ${t.reporter}: <span class="text-white">${data.rep}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-amber-500 text-xl">|</span> DATE: <span class="text-white">${data.date}</span>
                        </div>
                    </div>

                    <div class="rounded-[3rem] overflow-hidden border border-slate-800 shadow-2xl">
                        <img src="${data.image}" class="w-full h-auto">
                    </div>

                    <div class="text-slate-200 text-xl md:text-2xl leading-[2] font-light space-y-8 px-2">
                        ${data.full.split('\n\n').map(p => `<p>${p}</p>`).join('')}
                    </div>
                </div>
            `;
            
            document.getElementById('newsContent').innerHTML = detailHtml;
            document.getElementById('newsModal').classList.add('modal-active');
            document.body.style.overflow = 'hidden';
            document.getElementById('newsModal').scrollTo(0, 0);
        }

        function closeNews() {
            document.getElementById('newsModal').classList.remove('modal-active');
            document.body.style.overflow = 'auto';
        }

        window.onload = updateUI;
    </script>
</body>
</html>
