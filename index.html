<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Mataaharaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; overflow-x: hidden; }
        
        /* Animation for Hero Title */
        .fade-in-up { animation: fadeInUp 1.2s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-section { height: 75vh; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .hero-bg { position: absolute; inset: 0; background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80') center/cover; opacity: 0.2; transform: scale(1.1); animation: zoom 20s infinite alternate; }
        @keyframes zoom { from { transform: scale(1); } to { transform: scale(1.2); } }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, #020617); }

        .news-card { background: #0f172a; border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s ease; }
        .news-card:hover { border-color: #f59e0b; transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .news-img { height: 230px; background-size: cover; background-position: center; }

        .social-btn { transition: 0.3s; }
        .social-btn:hover { transform: scale(1.1); filter: brightness(1.2); }

        /* Modal Styles */
        .modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 20px; overflow-y: auto; }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #0f172a; border-radius: 32px; padding: 40px; max-width: 800px; width: 100%; border: 1px solid #f59e0b; position: relative; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full z-50 p-6 flex justify-between items-center bg-black/20 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-amber-500 rounded-2xl flex items-center justify-center text-black font-black text-2xl shadow-[0_0_20px_rgba(245,158,11,0.4)]">S</div>
            <div>
                <h1 class="text-white font-black italic tracking-tighter leading-none">SAMI-TUBE MEDIA</h1>
                <p class="text-amber-500 text-[10px] font-bold uppercase tracking-widest mt-1">Digital Information Center</p>
            </div>
        </div>
        <select id="langSelect" onchange="updateContent()" class="bg-slate-800 text-white text-xs px-4 py-2 rounded-xl border border-white/10 outline-none cursor-pointer">
            <option value="am">አማርኛ</option>
            <option value="om">Afaan Oromoo</option>
            <option value="en">English</option>
        </select>
    </header>

    <section class="hero-section">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="relative z-10 text-center px-6 fade-in-up">
            <h2 id="heroTitle" class="text-4xl md:text-7xl font-black italic mb-6 leading-tight"></h2>
            <p id="heroSub" class="text-amber-500 text-lg md:text-xl font-bold italic max-w-2xl mx-auto"></p>
        </div>
    </section>

    <main class="max-w-7xl mx-auto p-6 -mt-20 relative z-20 space-y-24">
        
        <section class="space-y-8">
            <h3 id="videoLabel" class="text-white font-black italic text-xl border-l-8 border-amber-500 pl-4 uppercase tracking-wider"></h3>
            <div class="aspect-video rounded-[40px] overflow-hidden shadow-2xl border-4 border-white/5">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/Yp9H-H6e_k8" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>

        <section class="space-y-12">
            <h3 id="newsLabel" class="text-white font-black italic text-xl border-l-8 border-amber-500 pl-4 uppercase tracking-wider"></h3>
            <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-10"></div>
        </section>

        <footer class="bg-slate-900/50 rounded-[50px] p-12 text-center border border-white/5 space-y-10">
            <div>
                <h4 class="text-3xl font-black italic text-white mb-2">SAMI-TUBE MEDIA</h4>
                <p id="addressLabel" class="text-slate-400 text-sm">Mataaharaa, Oromia, Ethiopia</p>
            </div>

            <div class="flex justify-center gap-6 flex-wrap">
                <a href="https://www.facebook.com/share/1CgMxSgtLu/" target="_blank" class="social-btn bg-blue-700 p-4 rounded-2xl">
                    <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" width="30">
                </a>
                <a href="https://t.me/Meteharainfobot" target="_blank" class="social-btn bg-sky-500 p-4 rounded-2xl">
                    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" width="30">
                </a>
                <a href="https://youtube.com/@samsontesfaye2670" target="_blank" class="social-btn bg-red-600 p-4 rounded-2xl">
                    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" width="30">
                </a>
            </div>

            <p class="text-[10px] text-slate-500 tracking-[0.4em] font-black uppercase border-t border-white/5 pt-10">
                &copy; 2026 SAMSON TESFAYE | ALL RIGHTS RESERVED
            </p>
        </footer>
    </main>

    <div id="newsModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-white font-bold text-2xl">×</button>
            <div id="modalImg" class="w-full h-72 bg-cover bg-center rounded-3xl mb-8 border border-white/10 shadow-xl"></div>
            <h2 id="modalTitle" class="text-3xl font-black text-amber-500 mb-6 italic leading-tight"></h2>
            <div id="modalBody" class="text-slate-200 leading-relaxed text-lg whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        const content = {
            am: {
                heroTitle: 'የማታሃራ ዲጂታል መረጃ መረብ',
                heroSub: 'ወቅታዊ የከተማዋን መረጃዎች እና የልማት ስራዎችን በአንድ ቦታ!',
                videoLabel: 'የቅርብ ጊዜ የቪዲዮ ሪፖርቶች',
                newsLabel: 'ታዋቂ ዜናዎች',
                news: [
                    { 
                        t: "አቶ አዲሱ ዋቆ በማታሃራ ከተማ ያስመዘገቧቸው የልማት ስራዎች", 
                        i: "mayor-addisu-wako~2.jpg", 
                        d: "የከንቲባው የልማትና የመልካም አስተዳደር ስራዎች የከተማዋን ገጽታ ከመቀየር ባለፈ ለነዋሪዎች ምቾት ትልቅ አስተዋጽኦ እያበረከቱ ነው።", 
                        f: "የማታሃራ ከተማ ከንቲባ አቶ አዲሱ ዋቆ ወደ ስልጣን ከመጡ ጊዜ ጀምሮ በከተማዋ በርካታ የልማት ስራዎች እየተከናወኑ ይገኛሉ። በተለይም የመሰረተ ልማት ዝርጋታ፣ የከተማ ውበት እና የመልካም አስተዳደር ስራዎች ላይ ትኩረት ተሰጥቷል።" 
                    },
                    { 
                        t: "የንፁህ መጠጥ ውሃ ፕሮጀክት የ90% መጠናቀቅ", 
                        i: "Lumii_20260412_180356344~2.jpg", 
                        d: "የከተማዋን የውሃ ችግር በዘላቂነት የሚፈታው ግዙፍ ፕሮጀክት ከ1.4 ቢሊዮን ብር በላይ ወጪ እየተከናወነ ይገኛል።", 
                        f: "ለበርካታ አመታት የማታሃራ ከተማ ነዋሪዎች ዋነኛ ጥያቄ የነበረው የንፁህ መጠጥ ውሃ እጥረት በዘላቂነት ለመፍታት ታስቦ የተጀመረው ግዙፍ የውሃ ፕሮጀክት አሁን ላይ 90 በመቶ መጠናቀቁ ተበሰረ።" 
                    },
                    { 
                        t: "የስነ-ህይወት ጥበብ በበሰቃ ሃይቅ ዳርቻ፤ የብርቱካን እርሻ", 
                        i: "Lumii_20260412_180443961~2.jpg", 
                        d: "በኑራኤራ እርሻ ልማት ባለሙያዎች የሚከናወነው ሳይንሳዊ የመግረዝ ስራ ምርታማነትን እያረጋገጠ ነው።", 
                        f: "በማታሃራ ከተማ በበሰቃ ሃይቅ ዳርቻ የብርቱካን እርሻ በከፍተኛ የባለሙያ ጥበብ እየለማ ይገኛል። የኑራኤራ እርሻ ልማት ባለሙያዎች ሳይንሳዊ ዘዴዎችን በመጠቀም የምርት ጥራትና መጠንን ለመጨመር እየሰሩ ነው።" 
                    }
                ]
            },
            om: {
                heroTitle: 'Marsariitii Odeeffannoo Magaalaa Mataaharaa',
                heroSub: 'Odeeffannoo magaalaa yeroo ammaa fi hojiiwwan misoomaa bakka tokkotti!',
                videoLabel: 'Gabaasa Viidiyoo dhihoo',
                newsLabel: 'Oduuwwan Beekamoo',
                news: [
                    { t: "Hojiiwwan Misoomaa Obbo Addisuu Waaqoo", i: "mayor-addisu-wako~2.jpg", d: "Kantiibaan magaalaa Mataaharaa Obbo Addisuu Waaqoo hojiiwwan misoomaa magaalaa keenya jijjiiraa jiru.", f: "Kantiibaan magaalaa Mataaharaa Obbo Addisuu Waaqoo erga gara aangoo dhufanii as hojiiwwan misoomaa hedduu hojjachaa jiru." },
                    { t: "Pirojektii Bishaan Dhugaatii Magaalaa Mataaharaa", i: "Lumii_20260412_180356344~2.jpg", d: "Pirojektiin bishaan dhugaatii birrii biliyoona 1.4 oliin hojjetamaa jiru kun xumuramaa jira.", f: "Pirojektiin bishaan dhugaatii magaalaa Mataaharaa dhibbeentaa 90 oliin xumurameera." },
                    { t: "Misooma Oomisha Birtukaanaa Garba Basakaatti", i: "Lumii_20260412_180443961~2.jpg", d: "Hojiiwwan mirmirsuu saayinsaawaa ta'een oomishitummaan guddachaa jira.", f: "Mataaharaatti qarqara garba Basakaatti misoomni birtukaanaa haala saayinsaawaa ta'een hojjetamaa jira." }
                ]
            }
        };

        function updateContent() {
            const lang = document.getElementById('langSelect').value;
            const data = content[lang] || content['am'];
            
            document.getElementById('heroTitle').innerText = data.heroTitle;
            document.getElementById('heroSub').innerText = data.heroSub;
            document.getElementById('videoLabel').innerText = data.videoLabel;
            document.getElementById('newsLabel').innerText = data.newsLabel;

            const grid = document.getElementById('newsGrid');
            grid.innerHTML = data.news.map((n, index) => `
                <div class="news-card" onclick="openModal('${lang}', ${index})">
                    <div class="news-img" style="background-image: url('${n.i}')"></div>
                    <div class="p-8">
                        <h4 class="font-black italic text-amber-500 mb-4 leading-tight text-lg">${n.t}</h4>
                        <p class="text-slate-400 text-sm leading-relaxed line-clamp-2">${n.d}</p>
                        <div class="mt-8 pt-6 border-t border-white/5 flex justify-between items-center">
                            <span class="text-[10px] font-black text-white uppercase tracking-[0.2em]">Read More</span>
                            <span class="text-amber-500 text-xl">→</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(lang, index) {
            const item = content[lang].news[index];
            document.getElementById('modalImg').style.backgroundImage = `url('${item.i}')`;
            document.getElementById('modalTitle').innerText = item.t;
            document.getElementById('modalBody').innerText = item.f;
            document.getElementById('newsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('newsModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        window.onload = updateContent;
    </script>
</body>
</html>
