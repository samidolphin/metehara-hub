<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI DOLPHIN | Mataaharaa Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: #f1f5f9; scroll-behavior: smooth; }
        .hero-bg { 
            background: linear-gradient(to bottom, rgba(2, 6, 23, 0.9), #020617), url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh_Sami_Dolphin_Hero.jpg');
            background-size: cover; background-position: center;
        }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 215, 0, 0.1); }
        .modal-show { display: flex !important; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 glass-nav p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-amber-500 rounded-lg flex items-center justify-center text-slate-950 font-black text-xl shadow-lg">S</div>
                <div class="flex flex-col">
                    <h1 id="navTitle" class="text-white font-black italic text-lg leading-none uppercase">SAMI-TUBE MEDIA</h1>
                    <span id="navSubTitle" class="text-[8px] text-amber-500 font-bold tracking-[0.2em] uppercase">Digital Excellence</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="liveClock" class="hidden md:block text-amber-500 font-mono text-xs font-bold bg-slate-800/50 px-3 py-1.5 rounded-full border border-slate-700"></div>
                <div class="bg-slate-800/80 px-3 py-1.5 rounded-lg border border-slate-700">
                    <select id="langSwitch" onchange="changeLanguage()" class="bg-transparent text-[10px] text-white font-black outline-none cursor-pointer">
                        <option value="am">🇪🇹 አማርኛ</option>
                        <option value="om">🇪🇹 Afan Oromo</option>
                        <option value="en">🇺🇸 English</option>
                    </select>
                </div>
            </div>
        </div>
    </nav>

    <header class="hero-bg min-h-[70vh] flex flex-col items-center justify-center text-center px-6 pt-20">
        <div class="max-w-4xl space-y-6">
            <div id="heroBadge" class="inline-block bg-amber-500/10 border border-amber-500/30 px-4 py-1 rounded-full text-[10px] text-amber-500 font-black uppercase tracking-widest">የዲጂታል ዌብ ሳይት ማዕከል</div>
            <h2 id="heroTitle" class="text-4xl md:text-6xl font-black italic text-white leading-tight uppercase">
                እንኳን ወደ <span class="text-amber-500">መታሃራ</span> ከተማ ዲጂታል ማዕከል በሰላም መጣችሁ
            </h2>
            <p id="heroDesc" class="text-slate-400 text-sm md:text-lg italic max-w-2xl mx-auto">
                ወቅታዊ የከተማዋ መረጃዎች፣ የቴክኖሎጂ ውጤቶች እና የሥነ-ጽሑፍ ማዕከል
            </p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-20 space-y-20">
        <section id="news">
            <h2 id="newsHeader" class="text-2xl font-black italic text-amber-500 mb-10 border-l-4 border-amber-500 pl-4 uppercase">ዜና / News</h2>
            <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </section>
    </main>

    <div id="analysisModal" class="hidden fixed inset-0 z-[100] bg-slate-950/95 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="max-w-2xl w-full bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-8 space-y-6">
                <button onclick="closeModal()" class="float-right text-slate-500 hover:text-white text-3xl">&times;</button>
                <div id="modalBody" class="mt-8"></div>
            </div>
        </div>
    </div>

    <script>
        const newsItems = [
            {
                title: "የመታሃራ ከተማ አዲሱ የልማት ገጽታ",
                content: "በከንቲባ አቶ አዲሱ ዋቆ የሚመሩ የልማት ስራዎች ከተማዋን እየለወጡ ይገኛሉ።",
                date: "April 8, 2026",
                img: "https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=800"
            }
        ];

        const translations = {
            am: {
                nav: "SAMI-TUBE MEDIA",
                sub: "Digital Excellence",
                badge: "የዲጂታል ዌብ ሳይት ማዕከል",
                hero: "እንኳን ወደ <span class='text-amber-500'>መታሃራ</span> ከተማ ዲጂታል ማዕከል በሰላም መጣችሁ",
                desc: "ወቅታዊ የከተማዋ መረጃዎች፣ የቴክኖሎጂ ውጤቶች እና የሥነ-ጽሑፍ ማዕከል",
                news: "ዜና / NEWS"
            },
            om: {
                nav: "SAMI-TUBE MEDIA",
                sub: "Digital Excellence",
                badge: "GIDDU-GALA WEB SAAYITII DIIJITAALAA",
                hero: "Baga Gara Giddu-gala Diijitaalaa Magaalaa <span class='text-amber-500'>Mataaharaatti</span> Nagaan Dhufan",
                desc: "Oduuwwan ammee magaalaa, bu'aalee teeknooloojii fi giddu-gala og-barruu",
                news: "ODUUWWAN / NEWS"
            },
            en: {
                nav: "SAMI-TUBE MEDIA",
                sub: "Digital Excellence",
                badge: "DIGITAL WEBSITE HUB",
                hero: "Welcome to <span class='text-amber-500'>Mataaharaa</span> City Digital Hub",
                desc: "Latest city news, technology results, and literature center",
                news: "LATEST NEWS"
            }
        };

        function renderNews() {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = newsItems.map((item, i) => `
                <div onclick="openModal(${i})" class="bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 hover:border-amber-500/50 transition-all cursor-pointer group">
                    <img src="${item.img}" class="w-full h-48 object-cover opacity-80 group-hover:opacity-100 transition-all">
                    <div class="p-6">
                        <span class="text-[10px] text-amber-500 font-bold">${item.date}</span>
                        <h3 class="text-xl font-bold mt-2 text-white">${item.title}</h3>
                    </div>
                </div>
            `).join('');
        }

        function changeLanguage() {
            const lang = document.getElementById('langSwitch').value;
            const t = translations[lang];
            
            document.getElementById('navTitle').innerText = t.nav;
            document.getElementById('navSubTitle').innerText = t.sub;
            document.getElementById('heroBadge').innerText = t.badge;
            document.getElementById('heroTitle').innerHTML = t.hero;
            document.getElementById('heroDesc').innerText = t.desc;
            document.getElementById('newsHeader').innerText = t.news;
        }

        function openModal(i) {
            const item = newsItems[i];
            document.getElementById('modalBody').innerHTML = `
                <h2 class="text-3xl font-black italic text-white mb-4">${item.title}</h2>
                <p class="text-slate-300 leading-relaxed italic border-l-4 border-amber-500 pl-4">${item.content}</p>
            `;
            document.getElementById('analysisModal').classList.add('modal-show');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('analysisModal').classList.remove('modal-show');
            document.body.style.overflow = 'auto';
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleTimeString();
        }, 1000);

        window.onload = () => {
            renderNews();
            changeLanguage(); // የመጀመሪያ ቋንቋ እንዲጀምር
        };
    </script>
</body>
</html>
