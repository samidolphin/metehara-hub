<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Mataaharaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; }
        .hero-section { height: 60vh; position: relative; display: flex; align-items: center; justify-content: center; background: url('mayor-addisu-wako~2.jpg') center/cover; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, #020617); }
        .news-card { background: #0f172a; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; }
        .news-card:hover { border-color: #f59e0b; transform: translateY(-5px); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 20px; overflow: hidden; border: 2px solid #f59e0b; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full z-50 p-4 flex justify-between items-center bg-black/50 backdrop-blur-md">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-amber-500 rounded-lg flex items-center justify-center text-black font-black text-xl">S</div>
            <h1 class="text-white font-black italic text-sm">SAMI-TUBE MEDIA</h1>
        </div>
        <select id="langSelect" onchange="updateContent()" class="bg-slate-800 text-white text-xs px-3 py-2 rounded-lg outline-none">
            <option value="am">አማርኛ</option>
            <option value="om">Afaan Oromoo</option>
            <option value="en">English</option>
        </select>
    </header>

    <section class="hero-section">
        <div class="hero-overlay"></div>
        <div class="relative z-10 text-center px-4">
            <h2 id="heroTitle" class="text-3xl md:text-6xl font-black italic mb-2"></h2>
            <p id="heroSub" class="text-amber-500 text-sm md:text-lg font-bold italic"></p>
        </div>
    </section>

    <main class="max-w-6xl mx-auto p-4 -mt-10 relative z-20 space-y-16">
        <section class="space-y-6">
            <h3 id="videoLabel" class="text-white font-black italic border-l-4 border-amber-500 pl-3"></h3>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/Yp9H-H6e_k8" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>

        <section class="space-y-6">
            <h3 id="newsLabel" class="text-white font-black italic border-l-4 border-amber-500 pl-3"></h3>
            <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

        <footer class="bg-slate-900 p-10 rounded-3xl text-center space-y-6">
            <p id="address" class="text-slate-400 text-sm font-bold"></p>
            <div class="flex justify-center gap-4">
                <a href="https://t.me/Meteharainfobot" class="bg-sky-500 p-3 rounded-xl"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" width="24"></a>
                <a href="https://youtube.com/@samsontesfaye2670" class="bg-red-600 p-3 rounded-xl"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" width="24"></a>
            </div>
            <p id="copy" class="text-[10px] text-slate-600 uppercase font-black italic"></p>
        </footer>
    </main>

    <div id="newsModal" class="modal" onclick="this.classList.remove('active')">
        <div class="bg-slate-900 p-6 rounded-3xl max-w-2xl w-full mx-4 relative" onclick="event.stopPropagation()">
            <h2 id="mTitle" class="text-2xl font-black text-amber-500 mb-4 italic"></h2>
            <p id="mBody" class="text-slate-200 leading-relaxed"></p>
        </div>
    </div>

    <script>
        const data = {
            am: {
                hT: "የማታሃራ ዲጂታል መረጃ መረብ",
                hS: "ወቅታዊ መረጃዎችን እና የልማት ስራዎችን በአንድ ቦታ!",
                vL: "የቅርብ ጊዜ የቪዲዮ ሪፖርቶች",
                nL: "ታዋቂ ዜናዎች",
                ad: "ማታሃራ፣ ኢትዮጵያ | +251 922 243 013",
                cp: "© 2026 ሳምሶን ተስፋዬ | በሳሚ ዶልፊን የቀረበ",
                news: [
                    { t: "የልማት ስራዎች", d: "የከንቲባው የልማት ስራዎች ከተማዋን እየቀየሩ ነው።", f: "በከንቲባ አቶ አዲሱ ዋቆ የሚመሩት የልማት ስራዎች ውጤት እያመጡ ነው።" },
                    { t: "የውሃ ፕሮጀክት", d: "የንፁህ መጠጥ ውሃ ፕሮጀክት 90% ተጠናቋል።", f: "የከተማዋን የውሃ ችግር የሚፈታው ፕሮጀክት ሊጠናቀቅ ነው።" }
                ]
            },
            om: {
                hT: "Marsariitii Odeeffannoo Mataaharaa",
                hS: "Odeeffannoo magaalaa fi misoomaa bakka tokkotti!",
                vL: "Gabaasa Viidiyoo dhihoo",
                nL: "Oduuwwan Beekamoo",
                ad: "Mataaharaa, Itoophiyaa | +251 922 243 013",
                cp: "© 2026 Samson Tesfaye | Sami Dolphin dhaan qophaaye",
                news: [
                    { t: "Hojiiwwan Misoomaa", d: "Hojiiwwan misoomaa kantiibaa keenyaa magaalaa keenya jijjiiraa jiru.", f: "Hojiiwwan misoomaa kantiibaa Obbo Addisuu Waaqoo dhaan hojjetamaa jiru." },
                    { t: "Pirojektii Bishaania", d: "Pirojektiin bishaan dhugaatii 90% xumurameera.", f: "Pirojektiin bishaan dhugaatii magaalaa keenyaa xumuramaa jira." }
                ]
            }
        };

        function updateContent() {
            const lang = document.getElementById('langSelect').value;
            const l = data[lang] || data.am;
            document.getElementById('heroTitle').innerText = l.hT;
            document.getElementById('heroSub').innerText = l.hS;
            document.getElementById('videoLabel').innerText = l.vL;
            document.getElementById('newsLabel').innerText = l.nL;
            document.getElementById('address').innerText = l.ad;
            document.getElementById('copy').innerText = l.cp;

            document.getElementById('newsGrid').innerHTML = l.news.map((n, i) => `
                <div class="news-card p-6" onclick="openM('${lang}', ${i})">
                    <h4 class="font-black italic text-amber-500 mb-2">${n.t}</h4>
                    <p class="text-slate-400 text-xs">${n.d}</p>
                </div>
            `).join('');
        }

        function openM(lang, i) {
            const n = data[lang].news[i];
            document.getElementById('mTitle').innerText = n.t;
            document.getElementById('mBody').innerText = n.f;
            document.getElementById('newsModal').classList.add('active');
        }

        window.onload = updateContent;
    </script>
</body>
</html>
