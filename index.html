<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI DOLPHIN | Mataaharaa Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: #f1f5f9; scroll-behavior: smooth; }
        
        /* ተንቀሳቃሽ የጀርባ ምስል (Motion Background) */
        #hero-slider {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-size: cover; background-position: center;
            transition: background-image 2s ease-in-out;
        }
        .hero-overlay {
            background: linear-gradient(to right, rgba(2, 6, 23, 0.9) 30%, rgba(2, 6, 23, 0.4));
            width: 100%; height: 100%;
        }

        /* በስዕሉ መሰረት የተሰራው የግራ ሰማያዊ አሞሌ */
        .blue-sidebar {
            background-color: #0c82cf;
            width: 110px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px 0;
        }
        .side-item {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            transition: 0.3s;
            white-space: nowrap;
        }
        .side-item:hover { color: #f59e0b; transform: scale(1.1); }

        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(245, 158, 11, 0.1); }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 glass-nav p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-amber-500 rounded-lg flex items-center justify-center text-slate-950 font-black text-xl">S</div>
                <div class="flex flex-col">
                    <h1 class="text-white font-black italic text-lg leading-none uppercase">SAMI-TUBE MEDIA</h1>
                    <span class="text-[8px] text-amber-500 font-bold tracking-[0.2em] uppercase">Digital Excellence</span>
                </div>
            </div>
            <div class="bg-slate-800/80 px-3 py-1.5 rounded-lg border border-slate-700">
                <select id="langSwitch" onchange="changeLanguage()" class="bg-transparent text-[10px] text-white font-black outline-none cursor-pointer">
                    <option value="am">🇪🇹 አማርኛ</option>
                    <option value="om">🇪🇹 Afan Oromo</option>
                    <option value="en">🇺🇸 English</option>
                </select>
            </div>
        </div>
    </nav>

    <section class="relative h-[85vh] flex overflow-hidden pt-20">
        <div id="hero-slider"><div class="hero-overlay"></div></div>

        <div class="blue-sidebar shadow-2xl z-10">
            <a href="#news" class="side-item" data-am="ቅድመ ዜና" data-om="Oduu Duraa" data-en="Pre-News">ቅድመ ዜና</a>
            <a href="#" class="side-item" data-am="ሪፖርት" data-om="Gabaasa" data-en="Report">ሪፖርት</a>
            <a href="#tourism" class="side-item" data-am="ቱሪዝም" data-om="Tuurizimii" data-en="Tourism">ቱሪዝም</a>
            <a href="#" class="side-item" data-am="ባህል" data-om="Aadaa" data-en="Culture">ባህል</a>
            <a href="#" class="side-item" data-am="ስነ ጽሁፍ" data-om="Og-barruu" data-en="Literature">ስነ ጽሁፍ</a>
            <a href="#" class="side-item" data-am="ቴክ" data-om="Teek" data-en="Tech">ቴክ</a>
            <a href="#" class="side-item" data-am="ኢንተርቪው" data-om="Gaaffii fi Deebii" data-en="Interview">ኢንተርቪው</a>
            <a href="#" class="side-item" data-am="ፍልስፍና" data-om="Falaasama" data-en="Philosophy">ፍልስፍና</a>
        </div>

        <div class="flex-1 flex flex-col justify-center px-12 md:px-24 z-10">
            <div id="heroBadge" class="bg-amber-500/20 text-amber-500 px-4 py-1 rounded-full text-[9px] font-black uppercase tracking-[0.3em] w-fit mb-6">Digital Hub</div>
            <h2 id="heroTitle" class="text-5xl md:text-7xl font-black italic text-white leading-tight uppercase tracking-tighter">
                እንኳን ወደ <span class="text-amber-500">መታሃራ</span> <br> 
                ዲጂታል ማዕከል <br> 
                በሰላም መጣችሁ
            </h2>
            <p id="heroDesc" class="mt-8 text-slate-300 text-lg max-w-xl italic border-l-4 border-amber-500 pl-8 leading-relaxed">
                ወቅታዊ የከተማዋ መረጃዎች፣ የቴክኖሎጂ ውጤቶች እና የሥነ-ጽሑፍ ማዕከል በሰላም ደረሳችሁ።
            </p>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 py-20">
        <div class="flex items-center gap-4 mb-12">
            <div class="w-2 h-10 bg-amber-500"></div>
            <h2 id="newsHeader" class="text-3xl font-black italic text-white uppercase">ዜና / NEWS</h2>
        </div>
        <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            </div>
    </main>

    <script>
        // የሚቀያየሩ ምስሎች (Motion)
        const images = [
            'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh_Sami_Dolphin_Hero.jpg',
            'https://images.unsplash.com/photo-1444723121867-7a241cacace9?q=80&w=1600'
        ];
        let currentImg = 0;
        function updateBg() {
            document.getElementById('hero-slider').style.backgroundImage = `url('${images[currentImg]}')`;
            currentImg = (currentImg + 1) % images.length;
        }
        setInterval(updateBg, 5000);
        updateBg();

        // የቋንቋ ትርጉሞች
        const translations = {
            am: {
                badge: "የዲጂታል ዌብ ሳይት ማዕከል",
                hero: "እንኳን ወደ <span class='text-amber-500'>መታሃራ</span> <br> ዲጂታል ማዕከል <br> በሰላም መጣችሁ",
                desc: "ወቅታዊ የከተማዋ መረጃዎች፣ የቴክኖሎጂ ውጤቶች እና የሥነ-ጽሑፍ ማዕከል በሰላም ደረሳችሁ።",
                news: "ዜና / NEWS"
            },
            om: {
                badge: "GIDDU-GALA WEB SAAYITII",
                hero: "Baga Gara Giddu-gala <br> Diijitaalaa <span class='text-amber-500'>Mataaharaatti</span> <br> Nagaan Dhufan",
                desc: "Oduuwwan ammee magaalaa, bu'aalee teeknooloojii fi giddu-gala og-barruu nagaan dhufan.",
                news: "ODUU / NEWS"
            },
            en: {
                badge: "DIGITAL WEBSITE HUB",
                hero: "Welcome to <br> <span class='text-amber-500'>Mataaharaa</span> <br> Digital Hub",
                desc: "Welcome to the latest city news, technology results, and literature center.",
                news: "LATEST NEWS"
            }
        };

        function changeLanguage() {
            const lang = document.getElementById('langSwitch').value;
            const t = translations[lang];
            
            document.getElementById('heroBadge').innerText = t.badge;
            document.getElementById('heroTitle').innerHTML = t.hero;
            document.getElementById('heroDesc').innerText = t.desc;
            document.getElementById('newsHeader').innerText = t.news;

            // የግራ ዝርዝሮችን መቀየር
            document.querySelectorAll('.side-item').forEach(el => {
                el.innerText = el.getAttribute(`data-${lang}`);
            });
        }
    </script>
</body>
</html>
