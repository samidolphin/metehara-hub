<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; display: flex; }
        
        /* ቅልብጭ ያለ የግራ ሜኑ */
        .sidebar { 
            width: 80px; 
            background: #0ea5e9; 
            height: 100vh; 
            position: fixed; 
            left: 0; 
            top: 0; 
            display: flex; 
            flex-direction: column; 
            z-index: 100;
        }
        .nav-link { 
            color: white; 
            text-decoration: none; 
            font-size: 0.7rem; 
            font-weight: 800; 
            padding: 15px 5px; 
            text-align: center; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }

        .main-content { margin-left: 80px; width: 100%; }
        
        header { background: #0f172a; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .hero { padding: 40px 20px; }
        .hero h2 { font-size: 2rem; font-weight: 900; line-height: 1.2; margin-bottom: 10px; }
        .hero h2 span { color: #f59e0b; }
        .hero p { color: #94a3b8; font-size: 0.9rem; border-left: 3px solid #f59e0b; padding-left: 10px; }

        .video-container { margin: 20px; border-radius: 15px; overflow: hidden; border: 2px solid #f59e0b; position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .news-card { background: #1e293b; border-radius: 12px; padding: 15px; margin: 20px; border-left: 4px solid #f59e0b; }
        .news-card h4 { color: #f59e0b; font-weight: 900; margin-bottom: 5px; }

        footer { background: #0f172a; padding: 30px 10px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <a href="#" class="nav-link">ቅድመ ዜና</a>
        <a href="#" class="nav-link">ሪፖርት</a>
        <a href="#" class="nav-link">ቱሪዝም</a>
        <a href="#" class="nav-link">ባህል</a>
        <a href="#" class="nav-link">ስነ ጽሁፍ</a>
        <a href="#" class="nav-link">ቴክ</a>
        <a href="#" class="nav-link">ፍልስፍና</a>
    </aside>

    <div class="main-content">
        <header>
            <div class="flex items-center gap-2">
                <div class="bg-amber-500 w-8 h-8 rounded flex items-center justify-center text-black font-black">S</div>
                <h1 class="font-black italic text-xs uppercase">SAMI-TUBE MEDIA</h1>
            </div>
        </header>

        <section class="hero">
            <h2>እንኳን ወደ <span>ማታሃራ</span><br>ዲጂታል ማዕከል በሰላም መጣችሁ</h2>
            <p>ወቅታዊ መረጃዎች፣ የቴክኖሎጂ ውጤቶች እና የሥነ-ጽሁፍ ማዕከል</p>
        </section>

        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/Yp9H-H6e_k8" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="news-card">
            <h4>የቅርብ ጊዜ ዜናዎች</h4>
            <p class="text-xs text-slate-300">የማታሃራ ከተማ የልማት ስራዎች በተሳካ ሁኔታ እየተከናወኑ ይገኛሉ።</p>
        </div>

        <footer>
            <div class="text-[10px] text-slate-400 font-bold mb-2">
                ስልክ፦ +251911926976 | ኢሜይል፦ sami2all@gmail.com
            </div>
            <p class="text-[8px] text-slate-600 font-bold">© 2026 ሳምሶን ተስፋዬ | SAMI-TUBE MEDIA</p>
        </footer>
    </div>

</body>
</html>
