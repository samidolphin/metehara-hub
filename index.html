<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI DOLPHIN | Mataaharaa Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; overflow: hidden; }
        
        /* ተንቀሳቃሽ የጀርባ ምስል (Motion) */
        #hero-slider {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-size: cover; background-position: center;
            transition: background-image 2s ease-in-out;
        }

        /* የግራ ሜኑ ጥቁር ድባብ */
        .sidebar-bg {
            background: rgba(2, 6, 23, 0.9);
            height: 100vh;
            border-right: 1px solid rgba(245, 158, 11, 0.1);
        }

        .sidebar-link {
            font-size: 0.7rem;
            opacity: 0.7;
            transition: 0.3s;
        }
        .sidebar-link:hover { opacity: 1; color: #f59e0b; }
    </style>
</head>
<body>

    <div id="hero-slider"></div>

    <div class="relative min-h-screen flex">
        
        <div class="w-1/4 sidebar-bg p-8 flex flex-col justify-center space-y-10">
            <div class="flex items-center gap-3 mb-10">
                <i class="fa-solid fa-newspaper text-amber-500 text-xl"></i>
                <div>
                    <h4 class="text-white font-bold text-xs">የቅርብ ዜና</h4>
                    <p class="text-slate-500 text-[9px]">ወቅታዊ ኩነቶች</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-mountain-sun text-amber-500 text-xl"></i>
                <div>
                    <h4 class="text-white font-bold text-xs">ቱሪዝም እና ባህል</h4>
                    <p class="text-slate-500 text-[9px]">የተፈጥሮ ውበቶች</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-pen-nib text-amber-500 text-xl"></i>
                <div>
                    <h4 class="text-white font-bold text-xs">ሥነ-ጽሑፍ</h4>
                    <p class="text-slate-500 text-[9px]">ግጥም እና ልቦለድ</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-microchip text-amber-500 text-xl"></i>
                <div>
                    <h4 class="text-white font-bold text-xs">ቴክኖሎጂ</h4>
                    <p class="text-slate-500 text-[9px]">ዲጂታል ዓለም</p>
                </div>
            </div>
        </div>

        <div class="w-3/4 flex flex-col justify-center px-20 bg-gradient-to-r from-slate-950/50 to-transparent">
            <div class="bg-amber-500 text-slate-950 px-4 py-1 rounded-full text-[10px] font-black uppercase w-fit mb-6">
                Digital Hub
            </div>
            <h2 class="text-6xl md:text-8xl font-black italic leading-tight">
                እንኳን ወደ <br>
                <span class="text-amber-500">መታሃራ</span> <br> 
                ዲጂታል ማዕከል <br> 
                በሰላም መጣችሁ
            </h2>
        </div>

    </div>

    <script>
        const images = [
            'https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh_Sami_Dolphin_Hero.jpg',
            'https://images.unsplash.com/photo-1444723121867-7a241cacace9?q=80&w=1600'
        ];
        let i = 0;
        function change() {
            document.getElementById('hero-slider').style.backgroundImage = `linear-gradient(to right, rgba(2,6,23,0.8), transparent), url('${images[i]}')`;
            i = (i + 1) % images.length;
        }
        setInterval(change, 5000);
        change();
    </script>
</body>
</html>
