<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Mataaharaa Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans Ethiopic', sans-serif; 
            background-color: #020617; 
            color: white; 
            margin: 0; 
        }

        /* 1. የላይኛው ክፍል - Header እና Hero Area */
        header {
            background-color: #020617;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .hero-section {
            display: flex;
            height: 60vh;
            overflow: hidden;
        }

        /* ሰማያዊው የጎን ማውጫ - ልክ በምስሉ መሰረት */
        .side-menu {
            background-color: #0c82cf;
            width: 120px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 20px 0;
            flex-shrink: 0;
        }

        .menu-item {
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* ተንቀሳቃሽ የጀርባ ምስል ክፍል */
        .hero-banner {
            flex-grow: 1;
            position: relative;
            background-size: cover;
            background-position: center;
            transition: background-image 1.5s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: rgba(2, 6, 23, 0.5);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .hero-title {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 900;
            font-style: italic;
            line-height: 1.2;
        }

        /* 2. የታችኛው ክፍል - ሙሉ ስፋት (Full Width) */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-label {
            color: #f59e0b;
            font-weight: 800;
            font-style: italic;
            text-transform: uppercase;
            border-left: 4px solid #f59e0b;
            padding-left: 10px;
            margin-bottom: 25px;
            display: inline-block;
        }

        .video-container {
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

                </h2>

    </div>
