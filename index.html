<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Mataaharaa Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; }
        
        /* የላይኛው ክፍል - ባር እና ምስል ብቻ */
        .hero-container { display: flex; min-height: 70vh; background-color: #020617; }

        /* የግራ ሰማያዊ ዝርዝር - እዚህ ብቻ ያበቃል */
        .blue-sidebar {
            background-color: #0c82cf;
            width: 100px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 30px;
            gap: 25px;
            flex-shrink: 0;
        }

        .side-item {
            font-size: 0.7rem;
            color: white;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            padding: 5px;
        }

        /* ተንቀሳቃሽ የጀርባ ምስል */
        .hero-motion {
            flex-grow: 1;
            position: relative;
            background-size: cover;
            background-position: center;
            transition: background-image 1.5s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .hero-overlay { position: absolute; inset: 0; background: rgba(2, 6, 23, 0.6); }

        .hero-title { 
            font-size: clamp(1.4rem, 5vw, 2.5rem); 
            line-height: 1.3; 
            font-weight: 900; 
            z-index: 5; 
            text-align: center;
            text-transform: uppercase;
        }

        /* የታችኛው ክፍል - ሙሉ ስፋት */
        .bottom-content { width: 100%; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        
        .section-title {
            color: #f59e0b;
            font-weight: 900;
            font-style: italic;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 0.9rem;
            border-left: 4px solid #f59e0b;
            padding-left: 10px;
        }
    </style>
</head>
