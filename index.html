<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE | Metehara Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Ethiopic', sans-serif;
            background-color: #020617;
            color: #f1f5f9;
            margin: 0;
        }

        .news-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: #020617;
            overflow-y: auto;
        }

        .modal-active { display: block !important; }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .animate-slideUp {
            animation: slideUp 0.6s cubic-bezier(0.2, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-slate-800 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-amber-500 p-2 rounded-xl shadow-lg shadow-amber-500/20">
                    <span class="text-slate-900 font-black text-xl">S</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">የመተሃራ ከተማ</h1>
                    <p class="text-[9px] text-amber-500 font-bold uppercase tracking-widest">SAMI-TUBE NEWS</p>
                </div>
            </div>
            
            <div class="relative group">
                <button class="bg-slate-800/50 border border-slate-700 px-4 py-2 rounded-full text-xs flex items-center gap-2 hover:bg-slate-700 transition-all">
                    <span>🇪🇹 አማርኛ</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 py-12">
        <div class="flex items-center gap-4 mb-10">
            <div class="h-10 w-2 bg-amber-500 rounded-full shadow-[0_0_15px_rgba(245,158,11,0.5)]"></div>
            <h2 class="text-2xl font-black italic uppercase tracking-tighter">FEATURED NEWS / ዋና ዋና ዜናዎች</h2>
        </div>

        <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <div id="newsModal" class="news-modal">
        <div class="max-w-3xl mx-auto px-6 py-12">
            <div class="flex justify-end mb-8">
                <button onclick="closeNews()" class="bg-red-500/10 text-red-500 border border-red-500/20 px-8 py-3 rounded-full font-bold text-xs uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all">
                    ዝጋ / CLOSE
                </button>
            </div>
            <div id="newsContent" class="animate-slideUp"></div>
        </div>
    </div>

    <script>
        // አራቱም ዜናዎች እዚህ አሉ
        const newsData = [
            {
                title: "የመተሃራ ከተማ የንፁህ መጠጥ ውሃ ፕሮጀክት የ90% መጠናቀቅ ደረጃ ላይ ደረሰ",
                image: "https://via.placeholder.com/800x500/1e293b/fbbf24?text=Water+Project",
                body: "ለከተማው ነዋሪዎች ትልቅ እፎይታ የሚሰጠው የንፁህ መጠጥ ውሃ ፕሮጀክት አሁን ላይ 90 በመቶ ደርሷል።",
                fullBody: "ለከተማው ነዋሪዎች ትልቅ እፎይታ የሚሰጠው የንፁህ መጠጥ ውሃ ፕሮጀክት አሁን ላይ 90 በመቶ ደርሷል። በቀጣይ ጥቂት ወራት ውስጥ ሙሉ በሙሉ ተጠናቆ አገልግሎት መስጠት እንደሚጀምር የአስተዳደሩ መረጃ ያመለክታል። ፕሮጀክቱ በከተማዋ ያለውን የውሃ እጥረት በዘላቂነት ይፈታል።",
                reporter: "ሳሚ ዶልፊን",
                date: "ሚያዝያ 6/2018 ዓ.ም"
            },
            {
                title: "በመተሃራ የትራፊክ ደህንነት ሳምንት ንቅናቄ በደመቀ ሁኔታ ተከበረ",
                image: "https://via.placeholder.com/800x500/1e293b/fbbf24?text=Traffic+Safety",
                body: "በእኔ ስህተት የአንድም ሰው ህይወት በትራፊክ አደጋ መጥፋት የለበትም በሚል መሪ ቃል ንቅናቄው ተካሂዷል።",
                fullBody: "በምስራቅ ሸዋ ዞን በመተሃራ ከተማ አስተዳደር የትራፊክ ደህንነት ሳምንት ንቅናቄ በደመቀ ሁኔታ ተከብሯል። ንቅናቄው 'በእኔ ስህተት የአንድም ሰው ህይወት በትራፊክ አደጋ መጥፋት የለበትም' በሚል መሪ ቃል የተከናወነ ሲሆን፣ የከተማው እና የወረዳው ከፍተኛ አመራሮች ተገኝተዋል።",
                reporter: "ሳሚ ዶልፊን",
                date: "መጋቢት 29/2018 ዓ.ም"
            },
            {
                title: "የባሳቃ ሐይቅ ዳርቻ የልማት ስራዎች ተጠናክረው ቀጥለዋል",
                image: "https://via.placeholder.com/800x500/1e293b/fbbf24?text=Lake+Basaka",
                body: "የባሳቃ ሐይቅን ለቱሪዝም እና ለከተማ ውበት ለማዋል የሚሰሩ የልማት ስራዎች ተስፋ ሰጪ ደረጃ ላይ ናቸው።",
                fullBody: "የባሳቃ ሐይቅን ዳርቻ በማልማት ለከተማዋ ተጨማሪ ውበት እና የቱሪስት መስህብ ለማድረግ የታለሙ ስራዎች በፍጥነት እየተከናወኑ ይገኛሉ። ይህ ፕሮጀክት የከተማዋን ገጽታ ከመቀየር ባለፈ ለወጣቶች የስራ እድል ይፈጥራል ተብሎ ይጠበቃል።",
                reporter: "ሳሚ ዶልፊን",
                date: "ሚያዝያ 7/2018 ዓ.ም"
            },
            {
                title: "የብርቱካን ምርት በከተማዋ ዳርቻ በሚገኙ እርሻዎች እየተሰበሰበ ይገኛል",
                image: "https://via.placeholder.com/800x500/1e293b/fbbf24?text=Orange+Farming",
                body: "በመተሃራ ከተማ ዙሪያ የሚገኙ የብርቱካን እርሻዎች ምርት መስጠት በመጀመራቸው ለገበያ እየቀረበ ነው።",
                fullBody: "የመተሃራ አካባቢ ለብርቱካን እና ለሎሚ ምርት ተስማሚ በመሆኑ፣ አርሶ አደሮች እና የግል እርሻዎች ምርታቸውን ለሀገር ውስጥ ገበያ ማቅረብ ጀምረዋል። ዘንድሮ የተገኘው ምርት ካለፈው ዓመት የተሻለ መሆኑ ተገልጿል።",
                reporter: "ሳሚ ዶልፊን",
                date: "ሚያዝያ 7/2018 ዓ.ም"
            }
        ];

        function displayNews() {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = newsData.map((news, index) => `
                <div class="bg-slate-900/50 rounded-[2rem] border border-slate-800 overflow-hidden group hover:border-amber-500/50 transition-all duration-500 shadow-xl cursor-pointer" onclick="openNews(${index})">
                    <div class="h-56 overflow-hidden">
                        <img src="${news.image}" class="w-full h-full object-cover group-hover:
