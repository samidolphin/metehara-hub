<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | መታሃራ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background: #020617; color: white; margin: 0; overflow-x: hidden; }
        .header-container { display: flex; width: 100%; border-bottom: 2px solid #f59e0b; min-height: 250px; }
        .sidebar { width: 85px; background: #0ea5e9; display: flex; flex-direction: column; flex-shrink: 0; z-index: 20; }
        .nav-link { color: white; text-decoration: none; font-size: 0.6rem; font-weight: 800; padding: 15px 5px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .hero-box { flex-grow: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .slideshow-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .mySlides { display: none; width: 100%; height: 100%; background-size: cover; background-position: center; }
        .fade { animation: fadeAnim 1.5s; }
        @keyframes fadeAnim { from {opacity: .4} to {opacity: 1} }
        .top-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 15px; position: relative; z-index: 10; background: rgba(2,6,23,0.4); }
        .lang-select { background: #1e293b; border: 1px solid rgba(255,255,255,0.2); font-size: 0.7rem; padding: 4px 8px; border-radius: 5px; color: white; }
        .hero-title { font-size: 1.5rem; font-weight: 900; line-height: 1.2; position: relative; z-index: 10; padding: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .hero-title span { color: #f59e0b; }
        .card { background: rgba(30, 41, 59, 0.7); padding: 15px; border-radius: 10px; border: 1px solid #0ea5e9; margin: 10px 20px; }
        .card-image { width: 100%; height: 180px; background-size: cover; background-position: center; border-radius: 8px; margin-bottom: 10px; }
        .read-more { color: #f59e0b; font-size: 0.75rem; font-weight: bold; cursor: pointer; text-decoration: underline; }
        .section-label { color: #f59e0b; font-weight: 900; font-size: 1.1rem; border-left: 4px solid #f59e0b; padding-left: 10px; margin: 20px; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { background: #0f172a; border: 2px solid #f59e0b; padding: 25px; border-radius: 15px; max-width: 600px; width: 90%; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 28px; cursor: pointer; color: #f59e0b; z-index: 10; }
    </style>
</head>
<body>
    <div class="header-container">
        <aside class="sidebar" id="sidebarNav"></aside>
        <section class="hero-box">
            <div class="slideshow-container">
                <div class="mySlides fade" style="background-image: url('1776693475534.jpg');"></div>
                <div class="mySlides fade" style="background-image: url('1776693473066.jpg');"></div>
                <div class="mySlides fade" style="background-image: url('1776693470500.jpg');"></div>
            </div>
            <div class="top-row">
                <div class="flex items-center gap-2">
                    <div class="bg-amber-500 w-8 h-8 rounded flex items-center justify-center text-black font-black">S</div>
                    <h1 class="font-black italic text-[11px] uppercase">SAMI-TUBE MEDIA</h1>
                </div>
                <select id="languageSelector" class="lang-select" onchange="updateLanguage()">
                    <option value="am">🇪🇹 አማርኛ</option>
                    <option value="om">Afaan Oromoo</option>
                    <option value="en">English</option>
                </select>
            </div>
            <h2 class="hero-title" id="welcomeText"></h2>
        </section>
    </div>

    <h3 class="section-label" id="latestNewsLabel">የቅርብ ጊዜ ዜናዎች</h3>
    <div id="news-container"></div>

    <h3 class="section-label" id="videoLabel">የቪዲዮ ዘገባዎች</h3>
    <div style="padding: 0 20px 20px 20px;">
        <div style="position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; border: 1px solid #f59e0b;">
            <iframe id="youtubeFrame" src="https://www.youtube.com/embed/Epe9ROSZ_pc" frameborder="0" allowfullscreen style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></iframe>
        </div>
    </div>

    <footer style="background: #0f172a; padding: 30px 20px; border-top: 2px solid #f59e0b; text-align: center;">
        <h4 style="color: #f59e0b; margin-bottom: 15px;">ያግኙን / Contact</h4>
        <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
            <a href="https://t.me/Ayyotube_bot" target="_blank" class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center border border-amber-500/30">
                <i class="fab fa-telegram text-white"></i>
            </a>
            <a href="https://youtube.com/@samsontesfaye2670?si=5LVZkGgNs9q2McHa" target="_blank" class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center border border-amber-500/30">
                <i class="fab fa-youtube text-white"></i>
            </a>
            <a href="https://www.facebook.com/share/1J14TXrrMv/" target="_blank" class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center border border-amber-500/30">
                <i class="fab fa-facebook text-white"></i>
            </a>
        </div>
        <p style="color: #f59e0b; font-size: 0.7rem; margin-top: 20px;">© 2026 SAMI-TUBE MEDIA</p>
    </footer>

    <div id="newsModal" class="modal" onclick="closeModalOutside(event)">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalImage" style="width: 100%; height: 200px; background-size: cover; background-position: center; border-radius: 8px; margin-bottom: 15px; border: 1px solid #0ea5e9;"></div>
            <h2 id="modalTitle" style="color: #f59e0b; font-weight: 900; margin-bottom: 15px; font-size: 1.2rem;"></h2>
            <div id="modalBody" style="font-size: 0.9rem; color: #cbd5e1; line-height: 1.7; white-space: pre-line;"></div>
        </div>
    </div>

    <script>
        const content = {
            am: {
                welcome: "እንኳን ወደ <span>መታሃራ</span><br>ዲጂታል ማዕከል በሰላም መጣችሁ",
                latest: "የቅርብ ጊዜ ዜናዎች",
                video: "የቪዲዮ ዘገባዎች",
                readMore: "ተጨማሪ ያንብቡ...",
                nav: ["ቅድመ ዜና", "ሪፖርት", "ቱሪዝም", "ባህል", "ስነ ጽሁፍ"],
                news: [
                    { t: "የከንቲባ አዲሱ ዋቆ የልማት ስራዎች", b: "መተሃራ — የመተሃራ ከተማ ከንቲባ አቶ አዲሱ ዋቆ በኃላፊነት ከተሾሙበት ጊዜ ጀምሮ እያከናወኗቸው ያሉ የልማትና የመልካም አስተዳደር ስራዎች የከተማዋን ገጽታ ከመቀየር ባለፈ ለነዋሪዎች ምቾት ትልቅ አስተዋጽኦ እያበረከቱ መሆኑ ተነገረ።", img: "1776693475534.jpg" },
                    { t: "የንፁህ መጠጥ ውሃ ፕሮጀክት 90% ደርሷል", b: "መተሃራ — በመተሃራ ከተማ አስተዳደር ለረጅም ጊዜ ሲጠበቅ የነበረውና የከተማዋን የንፁህ መጠጥ ውሃ ችግር በዘላቂነት ይፈታል ተብሎ የታመነበት ግዙፍ የውሃ ፕሮጀክት ግንባታ ከ90 በመቶ በላይ መጠናቀቁ ተበሰረ።", img: "1776693473066.jpg" },
                    { t: "የብርቱካን እርሻ ሳይንሳዊ ክብካቤ", b: "በመታሃራ ከተማ በበሰቃ ሃይቅ ዳርቻ እየተገነባ ካለው ውብ የመዝናኛ ማዕከል ባሻገር፣ ሌላኛው ተፈጥሯዊ ድምቀት የሆነው የብርቱካን እርሻ በከፍተኛ የባለሙያ ጥበብ እየለማ ይገኛል።", img: "1776693470500.jpg" }
                ]
            },
            om: {
                welcome: "Baga gara jiddu-gala dijitaalaa <span>Mataaharaatti</span> nagaan dhuftan",
                latest: "Oduuwwan dhihoo",
                video: "Gabaasa Viidiyoo",
                readMore: "Dabalata dubbisuuf...",
                nav: ["Oduu Duraa", "Gabaasa", "Turiizimii", "Aadaa", "Og-barruu"],
                news: [
                    { t: "Hojii Misoomaa Obbo Addisuu Waaqoo", b: "Kantiibaan magaalaa Mataaharaa Obbo Addisuu Waaqoo hojiiwwan misoomaa magaalaa sanaaf bifa haaraa kennan galmeessaniiru.", img: "1776693475534.jpg" },
                    { t: "Pirojektiin Bishaan Dhugaatii 90% xumurame", b: "Pirojektiin bishaan dhugaatii qulqulluu magaalaa Mataaharaa harka 90% xumurameera.", img: "1776693473066.jpg" },
                    { t: "Kunnuunsa Saayinsawaa Birtukaanaa", b: "Muka birtukaanaa haroo Basakaa biratti argamu mala saayinsawaan guddisuuf hojjetamaa jira.", img: "1776693470500.jpg" }
                ]
            },
            en: {
                welcome: "Welcome to <span>Metehara</span><br>Digital Hub",
                latest: "Latest News",
                video: "Video Reports",
                readMore: "Read More...",
                nav: ["Pre-News", "Report", "Tourism", "Culture", "Literature"],
                news: [
                    { t: "Mayor Addisu Waako's Projects", b: "Mayor Addisu Waako's initiatives in urban beautification are transforming Metehara into a green city model.", img: "1776693475534.jpg" },
                    { t: "Clean Water Project Nears 90%", b: "The 1.4 billion Birr water project is nearing completion, aiming for 100% coverage.", img: "1776693473066.jpg" },
                    { t: "Scientific Orange Farming", b: "Experts are using scientific techniques to ensure the productivity of orange farms near Lake Basaka.", img: "1776693470500.jpg" }
                ]
            }
        };

        function updateLanguage() {
            const lang = document.getElementById('languageSelector').value;
            const data = content[lang];
            document.getElementById('welcomeText').innerHTML = data.welcome;
            document.getElementById('latestNewsLabel').innerText = data.latest;
            document.getElementById('videoLabel').innerText = data.video;
            
            let navHtml = '';
            data.nav.forEach(n => navHtml += `<a href="#" class="nav-link">${n}</a>`);
            document.getElementById('sidebarNav').innerHTML = navHtml;

            let newsHtml = '';
            data.news.forEach((n, i) => {
                newsHtml += `
                    <div class="card">
                        <div class="card-image" style="background-image: url('${n.img}')"></div>
                        <h5 style="color: #f59e0b; font-weight: 900; font-size: 0.95rem;">${n.t}</h5>
                        <p style="font-size: 0.75rem; color: #cbd5e1; margin: 8px 0;">${n.b.substring(0, 100)}...</p>
                        <span class="read-more" onclick="openModal(${i})">${data.readMore}</span>
                    </div>`;
            });
            document.getElementById('news-container').innerHTML = newsHtml;
        }

        function openModal(index) {
            const lang = document.getElementById('languageSelector').value;
            const item = content[lang].news[index];
            document.getElementById('modalTitle').innerText = item.t;
            document.getElementById('modalBody').innerText = item.b;
            document.getElementById('modalImage').style.backgroundImage = `url('${item.img}')`;
            document.getElementById('newsModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('newsModal').style.display = 'none'; }
        function closeModalOutside(event) { if (event.target.id === 'newsModal') closeModal(); }

        let slideIndex = 0;
        function showSlides() {
            let slides = document.getElementsByClassName("mySlides");
            for (let i = 0; i < slides.length; i++) { slides[i].style.display = "none"; }
            slideIndex++;
            if (slideIndex > slides.length) {slideIndex = 1}    
            slides[slideIndex-1].style.display = "block";  
            setTimeout(showSlides, 3000); 
        }

        updateLanguage();
        showSlides();
    </script>
</body>
</html>
