<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE | Metehara Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: #f1f5f9; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        .hidden-sidebar { transform: translateX(-100%); }
        .news-modal { display: none; position: fixed; inset: 0; z-index: 10000; background: #020617; overflow-y: auto; }
        .modal-active { display: block !important; }
        .animate-slideUp { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="selection:bg-amber-500/30">

    <nav class="sticky top-0 z-50 glass p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="flex items-center bg-slate-900 border border-slate-700 rounded-lg px-2 py-1">
                    <select id="mainLangSwitch" onchange="changeLanguage(this.value)" class="bg-transparent text-[11px] text-white outline-none font-bold cursor-pointer">
                        <option value="am" class="bg-slate-900">🇪🇹 አማርኛ</option>
                        <option value="or" class="bg-slate-900">🇪🇹 Afaan</option>
                        <option value="en" class="bg-slate-900">🇺🇸 EN</option>
                    </select>
                </div>
                <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-800 rounded-xl transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                    </svg>
                </button>
            </div>

            <div class="flex flex-col items-end">
                <h1 id="top-title" class="text-base font-bold italic text-white leading-none">የመተሃራ ከተማ</h1>
                <span class="text-[7px] text-amber-500 font-black tracking-widest uppercase mt-1">SAMI-TUBE MEDIA</span>
            </div>
        </div>
    </nav>

    <div id="sidebar" class="sidebar hidden-sidebar fixed inset-y-0 left-0 w-72 bg-slate-950 shadow-2xl border-r border-slate-800 flex flex-col">
        <div class="p-8 border-b border-slate-800 flex justify-between items-center bg-slate-900/20">
            <div>
                <h2 class="text-xl font-black italic text-amber-500 uppercase tracking-tighter">SAMI DOLPHIN</h2>
                <p class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Media Hub</p>
            </div>
            <button onclick="toggleSidebar()" class="text-slate-500 hover:text-white text-2xl">&times;</button>
        </div>

        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
