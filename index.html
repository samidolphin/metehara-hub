    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; overflow-x: hidden; }
        .hero-section { display: flex; height: 60vh; position: relative; overflow: hidden; }
        .side-menu { background-color: #0c82cf; width: 100px; display: flex; flex-direction: column; justify-content: center; gap: 20px; z-index: 30; }
        .menu-item { color: white; font-size: 0.7rem; font-weight: 800; text-align: center; cursor: pointer; transition: 0.3s; }
        #bg-slider { position: absolute; inset: 0 0 0 100px; z-index: 1; }
        .slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.5s ease-in-out; }
        .slide.active { opacity: 1; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(2,6,23,0.95) 0%, rgba(2,6,23,0.4) 100%); z-index: 5; }
        .hero-content { position: relative; z-index: 10; padding-left: 30px; display: flex; flex-direction: column; justify-content: center; }
        
        /* News Cards */
        .news-card { background: #0f172a; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; }
        .news-card:active { transform: scale(0.98); }
        .news-img { height: 160px; width: 100%; background-size: cover; background-position: center; }

        /* MODAL FIX - Smooth & Easy to close */
        .modal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); padding: 15px; overflow-y: auto; }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; }
        .modal-content { background: #0f172a; border: 1px solid #f59e0b; border-radius: 20px; padding: 25px; max-width: 650px; width: 100%; margin: 20px auto; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .close-btn { position: sticky; top: -10px; float: right; background: #f59e0b; color: black; width: 40px; height: 40px; border-radius: 50%; display: flex; items-center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; z-index: 210; margin-bottom: 10px; }
    </style>
</head>
<body>

    <script>
        const content = {
            am: {
                heroTitle: 'ወደ መተሃራ ዲጂታል መረጃ መረብ በደህና መጡ',
                heroSub: 'ወቅታዊ የከተማዋን መረጃዎች፣ የልማት ስራዎችን እና ውብ ገጽታዎችን በአንድ ቦታ ያግኙ።',
                newsLabel: 'ዋና ዋና ዜናዎች',
                news: [
                    { 
                        t: "አቶ አዲሱ ዋቆ በመተሃራ ከተማ ያስመዘገቧቸው የልማት ስራዎች", 
                        i: "1775744540465.jpg", 
                        d: "የከተማዋ ከንቲባ አቶ አዲሱ ዋቆ እያከናወኗቸው ያሉ የልማት ስራዎች አዲስ ገጽታ እየሰጡ መሆኑ ተገለጸ።", 
                        f: "መተሃራ — የመተሃራ ከተማ ከንቲባ አቶ አዲሱ ዋቆ በኃላፊነት ከተሾሙበት ጊዜ ጀምሮ እያከናወኗቸው ያሉ የልማትና የመልካም አስተዳደር ስራዎች የከተማዋን ገጽታ ከመቀየር ባለፈ ለነዋሪዎች ምቾት ትልቅ አስተዋጽኦ እያበረከቱ መሆኑ ተነገረ።\n\nከንቲባው በከተማዋ በተለይም በአካባቢ ጥበቃ እና በከተማ ውበት ላይ ያተኮሩ የፈጠራ ስራዎችን በመተግበር ላይ ይገኛሉ። ከእነዚህም መካከል ቀደም ሲል የቆሻሻ ክምር የነበረውን የመተሃራ ሃይቅ ዳርቻ ወደ ውብ የመዝናኛ ስፍራነት መቀየራቸው በዋናነት ይጠቀሳል። በአሁኑ ወቅት ስፍራው ለከተማዋ ነዋሪዎችና ለጎብኚዎች ምቹ መዳረሻ መሆን መቻሉ ተመልክቷል።\n\nበሌላ በኩል፣ ከንቲባው በሃይቁ ዳርቻ ላይ የብርቱካን እርሻ ልማትን በማስተዋወቅ አዲስ የከተማ ግብርና ተሞክሮን ወደ ተግባር ቀይረዋል። ይህ የአረንጓዴ ልማት ተነሳሽነት ከተማዋ ያላትን የተፈጥሮ ፀጋ በአግባቡ ጥቅም ላይ ለማዋል ያለመና መተሃራን የአረንጓዴ ልማት ተምሳሌት የሚያደርግ እንደሆነ ተገልጿል።\n\nከንቲባ አቶ አዲሱ ዋቆ ከመደበኛ የስራ ሰዓት ውጭም ጭምር በልማት ስራዎችና በከተማዋ የጸጥታ ጉዳዮች ላይ በቅርበት ክትትል በማድረግ ለሌሎች አመራሮች አርአያ የሚሆን ተግባር እያከናወኑ መሆኑን የዜናው ዘገባ ያመላክታል።\n\nለከተማዋ እድገትና ለነዋሪዎቿ ብልጽግና ሌት ተቀን የሚሰሩት ከንቲባው፣ የጀመሯቸው የልማት ስራዎች ለተተኪው ትውልድ ትልቅ ቅርስ ሆነው እንደሚያልፉ ይጠበቃል።\n\nዘጋቢ፡ ሳምሶን ተስፋዬ" 
                    },
                    { 
                        t: "የመተሃራ ከተማ የንፁህ መጠጥ ውሃ ፕሮጀክት የ90% መጠናቀቅ ደረጃ ላይ ደረሰ", 
                        i: "1775744537702.jpg", 
                        d: "የከተማዋን የውሃ ችግር በዘላቂነት የሚፈታው ግዙፍ ፕሮጀክት ከ1.4 ቢሊዮን ብር በላይ ወጪ እየተከናወነ ይገኛል።", 
                        f: "መተሃራ፣ መጋቢት 6/2018\n\nበመተሃራ ከተማ አስተዳደር ለረጅም ጊዜ ሲጠበቅ የነበረውና የከተማዋን የንፁህ መጠጥ ውሃ ችግር በዘላቂነት ይፈታል ተብሎ የታመነበት ግዙፍ የውሃ ፕሮጀክት ግንባታ ከ90 በመቶ በላይ መጠናቀቁ ተበሰረ።\n\nከ1.4 ቢሊዮን ብር በላይ ወጪ እየተከናወነ የሚገኘው ይህ ፕሮጀክት፣ በአሁኑ ወቅት የማጠቃለያ ምዕራፍ ላይ ይገኛል። የከተማዋ ከንቲባ አቶ አዲሱ ዋቆ እና የውሃና ፍሳሽ አገልግሎት ድርጅት ስራ አስኪያጅ አቶ ሙሉቀን ስንታየሁ በስራው ሂደት ላይ ባደረጉት የመስክ ምልከታ፣ ግንባታው በጥራት እና በተቀመጠለት የጊዜ ገደብ እየተከናወነ መሆኑን አረጋግጠዋል።\n\n🔹 የፕሮጀክቱ ዋና ዋና ነጥቦች፦\n- ዘላቂ መፍትሄ፦ ፕሮጀክቱ ሲጠናቀቅ የከተማዋን የውሃ ሽፋን 100 በመቶ ያደርሳል።\n- የረጅም ጊዜ አገልግሎት፦ ለቀጣዮቹ 50 ዓመታት ያህል አስተማማኝ አገልግሎት ይሰጣል።\n- የግንባታ ደረጃ፦ በአሁኑ ወቅት የፓምፕ ተከላ እና የቧንቧ ዝርጋታ ስራዎች ተጠናቀዋል።\n\nይህ ታላቅ የልማት ስራ የመተሃራን ከተማ የኢንዱስትሪ እና የንግድ እንቅስቃሴ ከማሳለጡ ባለፈ፣ የነዋሪዎችን ማህበራዊ ኑሮ በከፍተኛ ደረጃ ያሻሽላል ተብሎ ይታመናል።\n\n📸 የምስል በሳሚ ዶልፊን" 
                    },
                    { 
                        t: "የስነ-ህይወት ጥበብ በበሰቃ ሃይቅ ዳርቻ፤ የብርቱካን እርሻ ሳይንሳዊ ክብካቤ", 
                        i: "1775744531970.jpg", 
                        d: "በኑራኤራ እርሻ ልማት ባለሙያዎች የሚከናወነው ሳይንሳዊ የመግረዝ ስራ ምርታማነትን እያረጋገጠ ነው።", 
                        f: "በመታሃራ ከተማ በበሰቃ ሃይቅ ዳርቻ እየተገነባ ካለው ውብ የመዝናኛ ማዕከል ባሻገር፣ ሌላኛው ተፈጥሯዊ ድምቀት የሆነው የብርቱካን እርሻ በከፍተኛ የባለሙያ ጥበብ እየለማ ይገኛል።\n\nበኑራኤራ እርሻ ልማት የረጅም ጊዜ ልምድ ባላቸው ባለሙያዎች የሚከናወነው የብርቱካን ዛፎች የመግረዝ (Pruning) ስራ፣ ተራ የቅርንጫፍ ቅነሳ ሳይሆን የዛፉን ጤና እና ምርታማነት የሚያረጋግጥ ሳይንሳዊ ሂደት ነው።\n\nሂደቱ፦ ቅርንጫፎች በሚገረዙበት ወቅት ዛፉ ለአየር ንክኪ እና ለበሽታ አምጪ ተህዋስያን ተጋላጭ እንዳይሆን፣ በተቆረጡት ክፍሎች ላይ ልዩ የኬሚካል ቅባት የመቀባት ስራ ይከናወናል።\n\nጠቀሜታው፦ ይህ ስራ ዛፉ ከንፋስ ግፊት የሚደርስበትን ጉዳት ከመቀነሱም በላይ፣ የተቆረጠው ክፍል በፍጥነት እንዲያገግም እና በፈንገስ እንዳይጠቃ ያደርጋል።\n\nይህንን በሳይንስ የታገዘ የልፋት ውጤት እና የባለሙያዎችን ትጋት የሚያሳይ እንቅስቃሴ በምስል እናቀርባለን።" 
                    }
                ]
            }
        };

        function updateContent() {
            const lang = document.getElementById('langSelect').value;
            const data = content[lang] || content.am;
            document.getElementById('heroTitle').innerText = data.heroTitle;
            document.getElementById('heroSub').innerText = data.heroSub;
            document.getElementById('newsLabel').innerText = data.newsLabel;
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = data.news.map((n, index) => `
                <div class="news-card" onclick="openModal('${lang}', ${index})">
                    <div class="news-img" style="background-image: url('${n.i}')"></div>
                    <div class="p-5">
                        <h4 class="font-black italic text-amber-500 mb-3 text-sm leading-snug">${n.t}</h4>
                        <p class="text-slate-400 text-[11px] leading-relaxed mb-4">${n.d}</p>
                        <span class="text-white text-[10px] font-black uppercase border border-amber-500/30 px-3 py-1.5 rounded-full italic">ሙሉውን አንብብ +</span>
                    </div>
                </div>
            `).join('');
        }

        function openModal(lang, index) {
            const item = (content[lang] || content.am).news[index];
            document.getElementById('modalTitle').innerText = item.t;
            document.getElementById('modalBody').innerText = item.f;
            document.getElementById('newsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('newsModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        let current = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 5000);

        window.onload = updateContent;
    </script>
</body>
</html>
