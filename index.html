<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Official Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; scroll-behavior: smooth; }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(2, 6, 23, 0.98); backdrop-filter: blur(15px); }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .side-menu { background-color: #0c82cf; width: 100px; display: flex; flex-direction: column; justify-content: center; gap: 15px; z-index: 10; }
        .menu-item { color: white; font-size: 0.7rem; font-weight: 700; text-align: center; cursor: pointer; transition: 0.3s; }
        .menu-item:hover { color: #f59e0b; }
        .gallery-container { position: relative; height: 350px; border-radius: 2rem; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1s; background-size: cover; background-position: center; }
        .slide.active { opacity: 1; }
    </style>
</head>
<body>

    <header class="p-4 flex justify-between items-center bg-[#020617] sticky top-0 z-50 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-500 rounded-lg flex items-center justify-center text-slate-950 font-black text-xl shadow-lg">S</div>
            <div>
                <h1 class="text-white font-black italic text-sm uppercase leading-none">SAMI-TUBE MEDIA</h1>
                <p class="text-amber-500 text-[7px] font-bold tracking-widest mt-1 uppercase">Digital Excellence</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <a href="https://t.me/Ayyotube_bot" target="_blank" class="bg-blue-600 hover:bg-blue-500 text-white text-[9px] font-bold px-3 py-2 rounded-full transition-all">BOT 🤖</a>
            <a href="https://www.facebook.com/share/1CgMxSgtLu/" target="_blank" class="bg-blue-800 hover:bg-blue-700 text-white text-[9px] font-bold px-3 py-2 rounded-full transition-all">FB f</a>
        </div>
    </header>

    <div class="flex h-[40vh] relative overflow-hidden border-b border-white/5">
        <nav class="side-menu shadow-2xl">
            <div class="menu-item">ቅድመ ዜና</div>
            <div class="menu-item">ሪፖርት</div>
            <div class="menu-item">ቱሪዝም</div>
            <div class="menu-item">ባህል</div>
        </nav>
        <div class="flex-grow flex flex-col justify-center items-center text-center px-6 bg-slate-950">
            <h2 class="text-3xl md:text-5xl font-black mb-2">SAMI-TUBE <span class="text-amber-500">OFFICIAL</span></h2>
            <p class="text-slate-500 italic text-xs">የመተሃራ ከተማ የመረጃ እና የዲጂታል ሚዲያ ማዕከል</p>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-6 space-y-16">
        
        <section>
            <h3 class="text-amber-500 font-black italic text-lg mb-6 border-l-4 border-amber-500 pl-3">ጋለሪ / GALLERY</h3>
            <div class="gallery-container" id="mainGallery">
                <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1451187530220-a093f13aeeef?w=1200')"></div>
                <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1523805081326-ed9662e05027?w=1200')"></div>
            </div>
        </section>

        <section>
            <h3 class="text-amber-500 font-black italic text-lg mb-6 border-l-4 border-amber-500 pl-3">ዩቱዩብ / YOUTUBE</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center bg-slate-900/30 p-6 rounded-[2rem] border border-white/5">
                <div class="aspect-video rounded-2xl overflow-hidden shadow-2xl">
                    <iframe class="w-full h-full" src="https://www.youtube.com/embed?listType=user_uploads&list=samsontesfaye2670" frameborder="0" allowfullscreen></iframe>
                </div>
                <div class="space-y-4">
                    <h4 class="text-xl font-black italic">ሳምሶን ተስፋዬ (Sami-Tube)</h4>
                    <p class="text-slate-400 text-sm leading-relaxed">በዩቱዩብ ቻናላችን ወቅታዊ መረጃዎችን፣ የቴክኖሎጂ ውጤቶችን እና አስተማሪ ቪዲዮዎችን ያገኛሉ።</p>
                    <a href="https://youtube.com/@samsontesfaye2670?si=5y5CecKimBKwyyM5" target="_blank" class="inline-block bg-red-600 hover:bg-red-500 text-white text-xs font-black px-6 py-3 rounded-full transition-all uppercase tracking-widest">Subscribe Now</a>
                </div>
            </div>
        </section>

        <section>
            <h3 class="text-amber-500 font-black italic text-lg mb-8 border-l-4 border-amber-500 pl-3">ዜና / NEWS</h3>
            <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>

    </main>

    <div id="newsModal" class="modal px-4" onclick="closeModal()">
        <div class="bg-slate-900 w-full max-w-3xl max-h-[85vh] overflow-y-auto rounded-[2rem] p-8 border border-white/10" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="float-right text-slate-400 text-2xl">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const newsData = [
            { id: 1, title: "አቶ አዲሱ ዋቆ የልማት ስራዎች", short: "የመተሃራ ከተማ ከንቲባ አቶ አዲሱ ዋቆ በኃላፊነት ከተሾሙበት ጊዜ ጀምሮ ያከናወኗቸው ስራዎች...", full: `<h2 class="text-2xl font-black text-amber-500 mb-4">የአቶ አዲሱ ዋቆ የልማት ስኬቶች</h2><p class="text-slate-200 leading-relaxed text-lg">በመተሃራ ከተማ የተከናወኑ የአረንጓዴ ልማት እና የመሰረተ ልማት ስራዎች ዝርዝር መረጃ... <br><br> ዘጋቢ፡ ሳምሶን ተስፋዬ</p>` },
            { id: 2, title: "💧 የውሃ ፕሮጀክት (90%)", short: "የመተሃራን የውሃ ችግር በዘላቂነት የሚፈታው ግዙፍ ፕሮጀክት ማጠናቀቂያ ላይ ደርሷል...", full: `<h2 class="text-2xl font-black text-amber-500 mb-4">የውሃ ፕሮጀክት ዝመና</h2><p class="text-slate-200 leading-relaxed text-lg">ግንባታው 90% የደረሰው ይህ ፕሮጀክት ለከተማዋ የ50 ዓመት ዋስትና ይሰጣል ተብሎ ይጠበቃል...</p>` },
            { id: 3, title: "ሳይንሳዊ የብርቱካን እርሻ", short: "በበሰቃ ሃይቅ ዳርቻ የሚገኘው የብርቱካን እርሻ በሳይንሳዊ የመግረዝ ዘዴ እየለማ ይገኛል...", full: `<h2 class="text-2xl font-black text-amber-500 mb-4">ሳይንሳዊ ክብካቤ</h2><p class="text-slate-200 leading-relaxed text-lg">የPruning ስራ እና የኬሚካል ቅባት አጠቃቀም በባለሙያዎች ሲተገበር የሚያሳይ መረጃ...</p>` }
        ];

        function renderNews() {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = newsData.map(n => `
                <div class="bg-slate-900/50 rounded-[2rem] border border-white/5 p-6 shadow-xl">
                    <h4 class="font-black italic text-lg mb-3">${n.title}</h4>
                    <p class="text-slate-400 text-xs mb-6">${n.short}</p>
                    <button onclick="openModal(${n.id})" class="text-amber-500 text-[9px] font-black uppercase border border-amber-500/20 px-4 py-2 rounded-full hover:bg-amber-500 hover:text-slate-950 transition-all">More +</button>
                </div>
            `).join('');
        }

        function openModal(id) {
            const news = newsData.find(n => n.id === id);
            document.getElementById('modalContent').innerHTML = news.full;
            document.getElementById('newsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('newsModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 5000);

        window.onload = renderNews;
    </script>
</body>
</html>
