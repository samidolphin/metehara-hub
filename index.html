<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Metehara Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; scroll-behavior: smooth; }
        .hero-section { display: flex; height: 65vh; overflow: hidden; position: relative; }
        .side-menu { background-color: #0c82cf; width: 120px; display: flex; flex-direction: column; justify-content: center; gap: 20px; z-index: 20; }
        .menu-item { color: white; font-size: 0.8rem; font-weight: 700; text-align: center; cursor: pointer; transition: 0.3s; }
        .menu-item:hover { color: #f59e0b; }
        
        #bg-slider { position: absolute; inset: 0 0 0 120px; z-index: 1; }
        .slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 2s ease-in-out; }
        .slide.active { opacity: 1; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(2,6,23,0.95) 0%, rgba(2,6,23,0.4) 100%); z-index: 5; }
        
        .hero-content { position: relative; z-index: 10; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; padding-left: 40px; }
        .gallery-card { position: relative; height: 400px; border-radius: 2rem; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body>

    <header class="p-4 flex justify-between items-center bg-[#020617] sticky top-0 z-50 border-b border-white/5 shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-500 rounded-lg flex items-center justify-center text-slate-950 font-black text-xl shadow-lg">S</div>
            <div>
                <h1 class="text-white font-black italic text-md uppercase leading-none">SAMI-TUBE MEDIA</h1>
                <p class="text-amber-500 text-[8px] font-bold tracking-widest mt-1 uppercase">Digital Excellence</p>
            </div>
        </div>
        <select id="langSelect" onchange="updateContent()" class="bg-slate-800 text-white text-xs px-3 py-2 rounded-lg border border-white/10 outline-none cursor-pointer">
            <option value="am">🇪🇹 አማርኛ</option>
            <option value="om">Afan Oromo</option>
            <option value="en">English</option>
        </select>
    </header>

    <div class="hero-section">
        <nav class="side-menu shadow-2xl">
            <div class="menu-item">ቅድመ ዜና</div>
            <div class="menu-item">ሪፖርት</div>
            <div class="menu-item">ቱሪዝም</div>
            <div class="menu-item">ባህል</div>
            <div class="menu-item">ቴክ</div>
        </nav>
        
        <div id="bg-slider">
            <div class="slide active" style="background-image: url('1775754142286.jpg')"></div>
            <div class="slide" style="background-image: url('1775754148066.jpg')"></div>
            <div class="slide" style="background-image: url('1775754153480.jpg')"></div>
            <div class="slide" style="background-image: url('1775754133822.jpg')"></div>
            <div class="slide" style="background-image: url('images (58).jpeg')"></div>
            <div class="slide" style="background-image: url('1775754193100.jpg')"></div>
            <div class="slide" style="background-image: url('1775754209071.jpg')"></div>
        </div>
        
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h2 id="heroTitle" class="text-3xl md:text-5xl font-black leading-tight text-white drop-shadow-2xl"></h2>
            <p id="heroSub" class="mt-4 text-slate-300 italic text-sm max-w-md"></p>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-6 space-y-20 mt-10">
        <section>
            <h3 id="newsLabel" class="text-amber-500 font-black italic text-xl mb-10 border-l-4 border-amber-500 pl-4 uppercase"></h3>
            <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </section>

        <section>
            <h3 id="galleryLabel" class="text-amber-500 font-black italic text-xl mb-6 border-l-4 border-amber-500 pl-4 uppercase"></h3>
            <div class="gallery-card">
                <div class="h-full w-full" style="background-image: url('1775744540465.jpg'); background-size: cover; background-position: center;"></div>
            </div>
        </section>
    </main>

    <footer class="mt-20 bg-slate-900/80 border-t border-white/5 p-10">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="text-center md:text-left">
                <h4 class="text-amber-500 font-black italic text-xl">SAMI-TUBE MEDIA</h4>
                <p class="text-slate-400 text-xs mt-2">Connecting Metehara to the Digital World</p>
            </div>
            <div class="flex gap-4">
                <a href="https://youtube.com/@samsontesfaye2670" target="_blank" class="bg-red-600/20 text-red-500 px-6 py-2 rounded-full border border-red-600/20 text-xs font-bold uppercase transition-all hover:bg-red-600 hover:text-white">YouTube</a>
                <a href="https://t.me/Ayyotube_bot" target="_blank" class="bg-blue-500/20 text-blue-400 px-6 py-2 rounded-full border border-blue-500/20 text-xs font-bold uppercase transition-all hover:bg-blue-500 hover:text-white">Telegram Bot</a>
            </div>
        </div>
        <div class="text-center mt-10 text-slate-600 text-[10px] tracking-widest uppercase">
            &copy; 2026 SAMI-TUBE MEDIA | Metehara, Ethiopia
        </div>
    </footer>

    <script>
        const content = {
            am: {
                heroTitle: 'ወደ መተሃራ ዲጂታል <br> <span class="text-amber-500 italic">የመረጃ መረብ</span> በደህና መጡ',
                heroSub: 'ወቅታዊ የከተማዋን መረጃዎች፣ የልማት ስራዎችን እና ባህላዊ እሴቶችን በአንድ ቦታ ያግኙ።',
                newsLabel: 'ዋና ዋና ዜናዎች',
                galleryLabel: 'የከተማዋ ገጽታ',
                news: [
                    { title: "የከተማዋ የልማት ስራዎች", desc: "በአቶ አዲሱ ዋቆ የሚመራው የከተማ አስተዳደር እያከናወናቸው ያሉ የልማት እንቅስቃሴዎች ለውጥ እያመጡ ነው።" },
                    { title: "የውሃ ፕሮጀክት ዝመና", desc: "የመተሃራን የውሃ ችግር በዘላቂነት ለመፍታት የተጀመረው ግዙፍ ፕሮጀክት ማጠናቀቂያ ላይ ደርሷል።" },
                    { title: "የቱሪዝም መስህቦች", desc: "የበሰቃ ሃይቅ እና ሌሎች የመተሃራ ተፈጥሯዊ ውበቶች ለጎብኝዎች ክፍት ሆነዋል።" }
                ]
            },
            om: {
                heroTitle: 'Giddu-gala Odeeffannoo <br> <span class="text-amber-500 italic">Diijitaalaa Mataaharaatti</span> Baga Nagaan Dhuftan',
                heroSub: 'Odeeffannoo magaalaa yeroo, hojiiwwan misoomaa fi qabeenya aadaa bakka tokkotti argattu.',
                newsLabel: 'ODUUWWAN IJOO',
                galleryLabel: 'DAAWWANNNAA MAGAALAA',
                news: [
                    { title: "Hojii Misooma Magaalaa", desc: "Bulchiinsi magaalaa Obbo Addisuu Waaqootiin dursamu jijjiirama fidaa jira." },
                    { title: "Pirojektii Bishaanii", desc: "Pirojektiin bishaan dhugaatii magaalaa Mataaharaa xumuraarra gahee jira." },
                    { title: "Hawwata Turiizimii", desc: "Haroon Basakaa fi kutaaleen biroo daawwattootaaf qophii dha." }
                ]
            },
            en: {
                heroTitle: 'Welcome to Metehara <br> <span class="text-amber-500 italic">Digital News Hub</span>',
                heroSub: 'Get the latest city updates, development works, and cultural values in one place.',
                newsLabel: 'TOP STORIES',
                galleryLabel: 'CITY GALLERY',
                news: [
                    { title: "City Development", desc: "The city administration led by Mr. Addisu Wako is bringing significant changes." },
                    { title: "Water Project Update", desc: "The mega project to solve Metehara's water problem is nearing completion." },
                    { title: "Tourism Attractions", desc: "Lake Beseka and other natural beauties of Metehara are ready for visitors." }
                ]
            }
        };

        function updateContent() {
            const lang = document.getElementById('langSelect').value;
            const data = content[lang] || content.am;
            document.getElementById('heroTitle').innerHTML = data.heroTitle;
            document.getElementById('heroSub').innerText = data.heroSub;
            document.getElementById('newsLabel').innerText = data.newsLabel;
            document.getElementById('galleryLabel').innerText = data.galleryLabel;

            const grid = document.getElementById('newsGrid');
            grid.innerHTML = data.news.map(n => `
                <div class="bg-slate-900/50 rounded-[2rem] border border-white/5 p-8 hover:border-amber-500/30 transition-all shadow-2xl">
                    <h4 class="font-black italic text-lg mb-4 text-amber-500">${n.title}</h4>
                    <p class="text-slate-400 text-sm leading-relaxed">${n.desc}</p>
                    <button class="mt-6 text-white text-[10px] font-black uppercase tracking-widest border border-white/10 px-4 py-2 rounded-full">Read More +</button>
                </div>
            `).join('');
        }

        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 5000);

        window.onload = updateContent;
    </script>
</body>
</html>
