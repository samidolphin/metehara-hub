<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Metehara Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; overflow-x: hidden; }
        
        /* Hero Section with Motion */
        .hero-section { display: flex; height: 65vh; position: relative; overflow: hidden; }
        .side-menu { background-color: #0c82cf; width: 100px; display: flex; flex-direction: column; justify-content: center; gap: 20px; z-index: 30; }
        .menu-item { color: white; font-size: 0.7rem; font-weight: 800; text-align: center; cursor: pointer; transition: 0.3s; }
        .menu-item:hover { color: #f59e0b; transform: scale(1.1); }

        #bg-slider { position: absolute; inset: 0 0 0 100px; z-index: 1; }
        .slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 2s ease-in-out, transform 6s linear; }
        .slide.active { opacity: 1; transform: scale(1.1); }

        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(90deg, rgba(2,6,23,0.95) 0%, rgba(2,6,23,0.4) 100%); z-index: 5; }
        .hero-content { position: relative; z-index: 10; padding-left: 40px; display: flex; flex-direction: column; justify-content: center; animation: fadeInUp 1.5s ease-out; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* News Cards */
        .news-card { background: #0f172a; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.4s; position: relative; }
        .news-card:hover { transform: translateY(-10px); border-color: #f59e0b; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .news-img { height: 200px; background-size: cover; background-position: center; transition: 0.5s; }
        .news-card:hover .news-img { transform: scale(1.1); }

        /* Professional Modal */
        .modal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(12px); padding: 20px; overflow-y: auto; }
        .modal.active { display: flex; align-items: flex-start; justify-content: center; }
        .modal-content { 
            background: #0f172a; border: 1px solid rgba(245,158,11,0.3); border-radius: 30px; 
            padding: 40px; max-width: 800px; width: 100%; margin: 40px auto; position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .close-btn { 
            background: #f59e0b; color: black; width: 45px; height: 45px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 24px; 
            font-weight: bold; cursor: pointer; position: absolute; top: -15px; right: -15px;
            box-shadow: 0 4px 15px rgba(245,158,11,0.4);
        }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <header class="p-5 flex justify-between items-center bg-[#020617] border-b border-white/5 sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-amber-500 rounded-2xl flex items-center justify-center text-black font-black text-2xl">S</div>
            <div>
                <h1 class="text-white font-black italic text-lg leading-none uppercase tracking-tighter">SAMI-TUBE MEDIA</h1>
                <p class="text-amber-500 text-[10px] font-bold tracking-[0.2em] mt-1 uppercase">Metehara's Digital Voice</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <select id="langSelect" onchange="updateContent()" class="bg-slate-800 text-white text-xs px-4 py-2 rounded-xl outline-none font-bold border border-white/10">
                <option value="am">🇪🇹 አማርኛ</option>
                <option value="om">🇪🇹 Oromoo</option>
                <option value="en">🇺🇸 English</option>
            </select>
        </div>
    </header>

    <div class="hero-section">
        <nav class="side-menu shadow-2xl">
            <div class="menu-item">ዜና</div>
            <div class="menu-item">ሪፖርት</div>
            <div class="menu-item">ቱሪዝም</div>
            <div class="menu-item">ባህል</div>
        </nav>
        <div id="bg-slider">
            <div class="slide active" style="background-image: url('IMG_20260314_112746_839~4.jpg')"></div>
            <div class="slide" style="background-image: url('unnamed (55)~2.jpg')"></div>
            <div class="slide" style="background-image: url('mayor-addisu-wako~2.jpg')"></div>
        </div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h2 id="heroTitle" class="text-4xl md:text-6xl font-black text-white leading-tight drop-shadow-2xl"></h2>
            <p id="heroSub" class="text-amber-500 text-lg mt-6 max-w-lg italic font-bold"></p>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-6 space-y-16">
        
        <section>
            <div class="flex items-center gap-4 mb-10">
                <div class="h-10 w-2 bg-amber-500 rounded-full"></div>
                <h3 id="newsLabel" class="text-white font-black italic text-2xl uppercase tracking-widest"></h3>
            </div>
            <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-10"></div>
        </section>

        <section class="py-16 border-t border-white/5">
            <h3 class="text-amber-500 font-black italic text-xl mb-10 uppercase text-center tracking-[0.3em]">SAMI-TUBE | OFFICIAL VIDEO</h3>
            <div class="video-container shadow-[0_20px_60px_rgba(0,0,0,0.6)]">
                <iframe src="https://www.youtube.com/embed/Epe9ROSZ_pc" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>
    </main>

    <footer class="bg-slate-950 p-16 text-center border-t border-white/10">
        <h4 class="text-white font-black italic text-3xl mb-6 uppercase tracking-tighter">SAMI-TUBE MEDIA</h4>
        <div class="flex flex-col md:flex-row justify-center items-center gap-8 mb-12">
            <div class="bg-white/5 px-8 py-4 rounded-2xl border border-white/5">
                <p class="text-amber-500 text-[10px] font-black uppercase mb-1">Call Us</p>
                <p class="text-white font-bold text-sm">+251 91 192 6976</p>
            </div>
            <div class="bg-white/5 px-8 py-4 rounded-2xl border border-white/5">
                <p class="text-amber-500 text-[10px] font-black uppercase mb-1">Email Us</p>
                <p class="text-white font-bold text-sm">sami2all@gmail.com</p>
            </div>
        </div>
        <p class="text-slate-600 text-[10px] tracking-[0.5em] font-bold uppercase">&copy; 2026 Digital Content Creation | SAMSON TESFAYE</p>
    </footer>

    <div id="newsModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="closeModal()">&times;</div>
            <div id="modalImg" class="w-full h-64 bg-cover bg-center rounded-2xl mb-8 border border-white/10"></div>
            <h2 id="modalTitle" class="text-3xl font-black text-amber-500 mb-6 italic leading-tight"></h2>
            <div class="flex items-center gap-3 mb-8 text-slate-400 text-[10px] font-bold uppercase tracking-widest">
                <span class="bg-amber-500 text-black px-3 py-1 rounded-full">SAMI-TUBE EXCLUSIVE</span>
                <span>Metehara, Ethiopia</span>
            </div>
            <div id="modalBody" class="text-slate-200 leading-relaxed text-base whitespace-pre-wrap text-justify font-medium"></div>
        </div>
    </div>

    <script>
        const content = {
            am: {
                heroTitle: 'የመተሃራ ከተማ ዲጂታል ድምፅ',
                heroSub: 'እውነተኛ መረጃዎችን፣ ወቅታዊ ዜናዎችንና የከተማዋን ውበት ለዓለም እናስተዋውቃለን።',
                newsLabel: 'የቅርብ ጊዜ ዘገባዎች',
                news: [
                    { 
                        t: "አቶ አዲሱ ዋቆ በመተሃራ ከተማ ያስመዘገቧቸው የልማት ስራዎች ለከተማዋ አዲስ ገጽታ እየሰጡ ነው", 
                        i: "mayor-addisu-wako~2.jpg", 
                        d: "የመተሃራ ከተማ ከንቲባ አቶ አዲሱ ዋቆ እያከናወኗቸው ያሉ የልማት ስራዎች የከተማዋን ገጽታ ከመቀየር ባለፈ ለነዋሪዎች ምቾት ትልቅ አስተዋጽኦ እያበረከቱ ነው።", 
                        f: "መተሃራ — የመተሃራ ከተማ ከንቲባ አቶ አዲሱ ዋቆ በኃላፊነት ከተሾሙበት ጊዜ ጀምሮ እያከናወኗቸው ያሉ የልማትና የመልካም አስተዳደር ስራዎች የከተማዋን ገጽታ ከመቀየር ባለፈ ለነዋሪዎች ምቾት ትልቅ አስተዋጽኦ እያበረከቱ መሆኑ ተነገረ።\n\nከንቲባው በከተማዋ በተለይም በአካባቢ ጥበቃ እና በከተማ ውበት ላይ ያተኮሩ የፈጠራ ስራዎችን በመተግበር ላይ ይገኛሉ። ከእነዚህም መካከል ቀደም ሲል የቆሻሻ ክምር የነበረውን የመተሃራ ሃይቅ ዳርቻ ወደ ውብ የመዝናኛ ስፍራነት መቀየራቸው በዋናነት ይጠቀሳል። በአሁኑ ወቅት ስፍራው ለከተማዋ ነዋሪዎችና ለጎብኚዎች ምቹ መዳረሻ መሆን መቻሉ ተመልክቷል።\n\nበሌላ በኩል፣ ከንቲባው በሃይቁ ዳርቻ ላይ የብርቱካን እርሻ ልማትን በማስተዋወቅ አዲስ የከተማ ግብርና ተሞክሮን ወደ ተግባር ቀይረዋል። ይህ የአረንጓዴ ልማት ተነሳሽነት ከተማዋ ያላትን የተፈጥሮ ፀጋ በአግባቡ ጥቅም ላይ ለማዋል ያለመና መተሃራን የአረንጓዴ ልማት ተምሳሌት የሚያደርግ እንደሆነ ተገልጿል።\n\nዘጋቢ፡ ሳምሶን ተስፋዬ (Sami Dolphin)" 
                    },
                    { 
                        t: "የመተሃራ ከተማ የንፁህ መጠጥ ውሃ ፕሮጀክት የ90% መጠናቀቅ ደረጃ ላይ ደረሰ", 
                        i: "unnamed (55)~2.jpg", 
                        d: "የከተማዋን የውሃ ችግር በዘላቂነት የሚፈታው ግዙፍ ፕሮጀክት ከ1.4 ቢሊዮን ብር በላይ ወጪ እየተከናወነ ይገኛል።", 
                        f: "መተሃራ — በመተሃራ ከተማ አስተዳደር ለረጅም ጊዜ ሲጠበቅ የነበረውና የከተማዋን የንፁህ መጠጥ ውሃ ችግር በዘላቂነት ይፈታል ተብሎ የታመነበት ግዙፍ የውሃ ፕሮጀክት ግንባታ ከ90 በመቶ በላይ መጠናቀቁ ተበሰረ።\n\nከ1.4 ቢሊዮን ብር በላይ ወጪ እየተከናወነ የሚገኘው ይህ ፕሮጀክት፣ በአሁኑ ወቅት የማጠቃለያ ምዕራፍ ላይ ይገኛል። ይህ ፕሮጀክት ሲጠናቀቅ ለቀጣዮቹ 50 ዓመታት ያህል ለከተማዋ ነዋሪዎች አስተማማኝ የንጹህ ውሃ አገልግሎት መስጠት የሚያስችል አቅም አለው።\n\nየከተማዋ አመራሮች ግንባታው በተቀመጠለት ጥራት እና ጊዜ እንዲጠናቀቅ የቅርብ ክትትል እያደረጉ መሆኑም ታውቋል።" 
                    },
                    { 
                        t: "የስነ-ህይወት ጥበብ በበሰቃ ሃይቅ ዳርቻ፤ የብርቱካን እርሻ ሳይንሳዊ ክብካቤ", 
                        i: "IMG_20260314_112746_839~4.jpg", 
                        d: "በኑራኤራ እርሻ ልማት ባለሙያዎች የሚከናወነው ሳይንሳዊ የመግረዝ ስራ ምርታማነትን እያረጋገጠ ነው።", 
                        f: "መተሃራ — በመታሃራ ከተማ በበሰቃ ሃይቅ ዳርቻ እየተገነባ ካለው ውብ የመዝናኛ ማዕከል ባሻገር፣ ሌላኛው ተፈጥሯዊ ድምቀት የሆነው የብርቱካን እርሻ በከፍተኛ የባለሙያ ጥበብ እየለማ ይገኛል።\n\nበኑራኤራ እርሻ ልማት የረጅም ጊዜ ልምድ ባላቸው ባለሙያዎች የሚከናወነው የብርቱካን ዛፎች የመግረዝ (Pruning) ስራ፣ ተራ የቅርንጫፍ ቅነሳ ሳይሆን የዛፉን ጤና እና ምርታማነት የሚያረጋግጥ ሳይንሳዊ ሂደት ነው። ይህ ተግባር ዛፎቹ የተሻለ ምርት እንዲሰጡና ለበሽታ እንዳይጋለጡ ያደርጋቸዋል።" 
                    }
                ]
            }
        };

        function updateContent() {
            const lang = document.getElementById('langSelect').value;
            const data = content[lang] || content.am;
            document.getElementById('heroTitle').innerText = data.heroTitle;
            document.getElementById('heroSub').innerText = data.heroSub;
            document.getElementById('newsLabel').innerText = data.newsLabel;

            const grid = document.getElementById('newsGrid');
            grid.innerHTML = data.news.map((n, index) => `
                <div class="news-card group" onclick="openModal('${lang}', ${index})">
                    <div class="news-img" style="background-image: url('${n.i}')"></div>
                    <div class="p-8">
                        <h4 class="font-black italic text-amber-500 mb-4 text-lg leading-tight group-hover:text-white transition-colors">${n.t}</h4>
                        <p class="text-slate-400 text-xs leading-relaxed mb-6 line-clamp-3">${n.d}</p>
                        <div class="flex items-center gap-3 text-white text-[10px] font-black uppercase tracking-widest border-t border-white/5 pt-4">
                            <span class="w-10 h-[2px] bg-amber-500"></span> ሙሉውን አንብብ
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(lang, index) {
            const item = content[lang].news[index];
            document.getElementById('modalImg').style.backgroundImage = `url('${item.i}')`;
            document.getElementById('modalTitle').innerText = item.t;
            document.getElementById('modalBody').innerText = item.f;
            document.getElementById('newsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('newsModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Hero Animation logic
        let current = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 5000);

        window.onload = updateContent;
    </script>
</body>
</html>
