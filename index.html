<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; display: flex; flex-direction: column; }
        
        /* ዋናው ኮንቴይነር */
        .page-wrapper { display: flex; position: relative; }

        /* ሰማያዊው ሜኑ ፍልስፍና ላይ ያበቃል */
        .sidebar { 
            width: 80px; 
            background: #0ea5e9; 
            display: flex; 
            flex-direction: column; 
            height: fit-content; /* ይዘቱ ባለበት ብቻ ያበቃል */
            position: absolute;
            left: 0;
            top: 0;
            z-index: 1000;
        }
        .nav-link { color: white; text-decoration: none; font-size: 0.7rem; font-weight: 800; padding: 18px 5px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }

        /* በቀኝ በኩል ያለው ይዘት */
        .main-content { width: 100%; margin-left: 0; }

        /* ርዕሱ ከሜኑው እንዲርቅ */
        header { padding: 15px 15px 15px 95px; background: #0f172a; display: flex; justify-content: space-between; align-items: center; }
        .hero-text { padding: 30px 15px 30px 95px; }
        .hero-text h2 { font-size: 1.8rem; font-weight: 900; line-height: 1.2; }
        .hero-text h2 span { color: #f59e0b; }

        /* ከሜኑው በታች ያለው ይዘት ሙሉ ስክሪን እንዲሆን */
        .full-width-section { width: 100%; padding: 0; margin-top: 10px; }
        .video-box { width: 100%; border-y: 4px solid #f59e0b; position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .news-card { background: #1e293b; padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); width: 100%; }
        
        footer { padding: 40px 20px; text-align: center; background: #0f172a; width: 100%; }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <aside class="sidebar">
            <a href="#" class="nav-link">ቅድመ ዜና</a>
            <a href="#" class="nav-link">ሪፖርት</a>
            <a href="#" class="nav-link">ቱሪዝም</a>
            <a href="#" class="nav-link">ባህል</a>
            <a href="#" class="nav-link">ስነ ጽሁፍ</a>
            <a href="#" class="nav-link">ቴክ</a>
            <a href="#" class="nav-link">ፍልስፍና</a>
        </aside>

        <div class="main-content">
            <header>
                <div class="flex items-center gap-2">
                    <div class="bg-amber-500 w-8 h-8 rounded flex items-center justify-center text-black font-black">S</div>
                    <h1 class="font-black italic text-[10px] uppercase">SAMI-TUBE MEDIA</h1>
                </div>
            </header>

            <section class="hero-text">
                <h2>እንኳን ወደ <span>ማታሃራ</span> ዲጂታል ማዕከል በሰላም መጣችሁ</h2>
                <p class="text-slate-400 text-sm mt-2">ወቅታዊ መረጃዎች፣ የቴክኖሎጂ ውጤቶች እና የሥነ-ጽሁፍ ማዕከል</p>
            </section>

            <div class="full-width-section">
                <h3 class="font-black italic pl-4 mb-4">የቅርብ ጊዜ የቪዲዮ ሪፖርቶች</h3>
                <div class="video-box">
                    <iframe src="https://www.youtube.com/embed/Yp9H-H6e_k8" frameborder="0" allowfullscreen></iframe>
                </div>

                <div class="news-card">
                    <h4 class="text-amber-500 font-black mb-2">የልማት ስራዎች</h4>
                    <p class="text-sm text-slate-300">የከተማው የልማት ስራዎች በተሳካ ሁኔታ እየተከናወኑ ይገኛሉ።</p>
                </div>
            </div>

            <footer>
                <p class="text-[10px] text-slate-400 font-bold mb-2">ስልክ፦ +251 922 243 013 | ኢሜይል፦ sami2all@gmail.com</p>
                <p class="text-[8px] text-slate-600 font-bold uppercase tracking-widest">© 2026 ሳምሶን ተስፋዬ</p>
            </footer>
        </div>
    </div>

</body>
</html>
