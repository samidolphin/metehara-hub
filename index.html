<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | መታሃራ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background: #020617; color: white; margin: 0; overflow-x: hidden; }
        .header-container { display: flex; width: 100%; border-bottom: 2px solid #f59e0b; min-height: 250px; }
        .sidebar { width: 85px; background: #0ea5e9; display: flex; flex-direction: column; flex-shrink: 0; z-index: 20; }
        .nav-link { color: white; text-decoration: none; font-size: 0.6rem; font-weight: 800; padding: 15px 5px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .hero-box { flex-grow: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .slideshow-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .mySlides { display: none; width: 100%; height: 100%; background-size: cover; background-position: center; }
        .fade { animation: fadeAnim 1.5s; }
        @keyframes fadeAnim { from {opacity: .4} to {opacity: 1} }
        .top-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 15px; position: relative; z-index: 10; background: rgba(2,6,23,0.4); }
        .lang-select { background: #1e293b; border: 1px solid rgba(255,255,255,0.2); font-size: 0.7rem; padding: 4px 8px; border-radius: 5px; color: white; }
        .hero-title { font-size: 1.5rem; font-weight: 900; line-height: 1.2; position: relative; z-index: 10; padding: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .hero-title span { color: #f59e0b; }
        .card { background: rgba(30, 41, 59, 0.7); padding: 15px; border-radius: 10px; border: 1px solid #0ea5e9; margin: 10px 20px; }
        .card-image { width: 100%; height: 180px; background-size: cover; background-position: center; border-radius: 8px; margin-bottom: 10px; }
        .read-more { color: #f59e0b; font-size: 0.75rem; font-weight: bold; cursor: pointer; text-decoration: underline; }
        .section-label { color: #f59e0b; font-weight: 900; font-size: 1.1rem; border-left: 4px solid #f59e0b; padding-left: 10px; margin: 20px; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { background: #0f172a; border: 2px solid #f59e0b; padding: 25px; border-radius: 15px; max-width: 600px; width: 90%; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 28px; cursor: pointer; color: #f59e0b; z-index: 10; }
    </style>
</head>
<body>
    <div class="header-container">

            <div class="top-row">

                    <h1 class="font-black italic text-[11px] uppercase">SAMI-TUBE MEDIA</h1>
                </div>
                <select id="languageSelector" class="lang-select" onchange="updateLanguage()">
                    <option value="am">🇪🇹 አማርኛ</option>
                    <option value="om">Afaan Oromoo</option>
                    <option value="en">English</option>
                </select>
            </div>
            <h2 class="hero-title" id="welcomeText"></h2>
