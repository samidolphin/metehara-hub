<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Mataaharaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; overflow-x: hidden; }
        
        /* Welcome Motion Animation */
        .hero-title { opacity: 0; transform: translateY(30px); animation: fadeInUp 1.5s ease-out forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .hero-section { height: 75vh; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; background: url('mayor-addisu-wako~2.jpg') center/cover; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(2,6,23,0.4), #020617); }

        .news-card { background: #0f172a; border-radius: 28px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s ease; cursor: pointer; }
        .news-card:hover { border-color: #f59e0b; transform: translateY(-12px); box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        .news-img { height: 240px; background-size: cover; background-position: center; }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 35px; overflow: hidden; border: 3px solid rgba(245,158,11,0.3); box-shadow: 0 0 30px rgba(245,158,11,0.1); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .social-btn { transition: 0.3s ease; }
        .social-btn:hover { transform: translateY(-5px) scale(1.1); filter: brightness(1.2); }

        .modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); padding: 20px; overflow-y: auto; }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #0f172a; border-radius: 40px; padding: 45px; max-width: 850px; width: 100%; border: 1px solid #f59e0b; position: relative; box-shadow: 0 0 50px rgba(0,0,0,1); }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full z-50 p-6 flex justify-between items-center bg-black/40 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="w-14 h-14 bg-amber-500 rounded-2xl flex items-center justify-center text-black font-black text-3xl shadow-[0_0_25px_rgba(245,158,11,0.4)]">S</div>
            <div>
                <h1 class="text-white font-black italic text-xl tracking-tighter leading-none">SAMI-TUBE MEDIA</h1>
                <p class="text-amber-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-1">Mataaharaa Digital Hub</p>
            </div>
        </div>
        <select id="langSelect" onchange="updateContent()" class="bg-slate-800 text-white text-xs font-bold px-5 py-3 rounded-2xl border border-white/10 outline-none cursor-pointer hover:bg-slate-700 transition">
            <option value="am">ኢትዮጵያ | አማርኛ</option>
            <option value="om">ኢትዮጵያ | Afaan Oromoo</option>
            <option value="en">Global | English</option>
        </select>
    </header>

    <section class="hero-section">
        <div class="hero-overlay"></div>
        <div class="relative z-10 text-center px-6">
            <h2 id="heroTitle" class="hero-title text-5xl md:text-8xl font-black italic mb-6 text-white drop-shadow-2xl">የማታሃራ ዲጂታል መረጃ መረብ</h2>
            <p id="heroSub" class="text-amber-500 text-xl md:text-2xl font-black italic tracking-wide">ወቅታዊ የከተማዋን መረጃዎች እና የልማት ስራዎችን በአንድ ቦታ!</p>
        </div>
    </section>

    <main class="max-w-7xl mx-auto p-6 -mt-20 relative z-20 space-y-24">
        
        <section class="space-y-10">
            <h3 id="videoLabel" class="text-white font-black italic text-2xl border-l-[10px] border-amber-500 pl-6 uppercase tracking-widest shadow-sm">የቅርብ ጊዜ የቪዲዮ ሪፖርቶች</h3>
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/Yp9H-H6e_k8" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </section>

        <section class="space-y-12">
            <h3 id="newsLabel" class="text-white font-black italic text-2xl border-l-[10px] border-amber-500 pl-6 uppercase tracking-widest">ታዋቂ ዜናዎች</h3>
            <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-3 gap-12"></div>
        </section>

        <footer class="bg-slate-900/90 rounded-[60px] p-16 text-center border border-white/5 space-y-12 shadow-2xl">
            <div class="space-y-4">
                <h4 class="text-4xl font-black italic text-white tracking-tighter uppercase">SAMI-TUBE MEDIA</h4>
                <p id="addressLabel" class="text-slate-400 text-lg font-bold">Mataaharaa, Oromia, Ethiopia | +251 922 243 013</p>
            </div>

            <div class="flex justify-center gap-10 flex-wrap">
                <a href="https://www.facebook.com/share/1CgMxSgtLu/" target="_blank" class="social-btn bg-blue-700 p-5 rounded-[25px] shadow-2xl">
                    <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" width="35">
                </a>
                <a href="https://t.me/Meteharainfobot" target="_blank" class="social-btn bg-sky-500 p-5 rounded-[25px] shadow-2xl">
                    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" width="35">
                </a>
                <a href="https://youtube.com/@samsontesfaye2670" target="_blank" class="social-btn bg-red-600 p-5 rounded-[25px] shadow-2xl">
                    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" width="35">
                </a>
            </div>

            <div class="pt-12 border-t border-white/10">
                <p class="text-[11px] text-slate-500 tracking-[0.5em] font-black uppercase italic">
                    &copy; 2026 SAMSON TESFAYE | Produced by Sami Dolphin
                </p>
            </div>
        </footer>
    </main>

    <div id="newsModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-8 right-10 text-slate-400 hover:text-white text-4xl font-black transition">&times;</button>
            <div id="modalImg" class="w-full h-80 bg-cover bg-center rounded-[30px] mb-10 border border-white/10 shadow-inner"></div>
            <h2 id="modalTitle" class="text-4xl font-black text-amber-500 mb-8 italic leading-tight"></h2>
            <div id="modalBody" class="text-slate-200 leading-relaxed text-xl whitespace-pre-wrap text-justify font-medium"></div>
        </div>
    </div>

    <script>
        const content = {
            am: {
                news: [
                    { 
                        t: "አቶ አዲሱ ዋቆ በማታሃራ ከተማ ያስመዘገቧቸው የልማት ስራዎች", 
                        i: "mayor-addisu-wako~2.jpg", 
                        d: "የከንቲባው የልማትና የመልካም አስተዳደር ስራዎች የከተማዋን ገጽታ ከመቀየር ባለፈ ለነዋሪዎች ምቾት ትልቅ አስተዋጽኦ እያበረከቱ ነው።", 
                        f: "የማታሃራ ከተማ ከንቲባ አቶ አዲሱ ዋቆ ወደ ስልጣን ከመጡ ጊዜ ጀምሮ በከተማዋ በርካታ የልማት ስራዎች እየተከናወኑ ይገኛሉ። በተለይም የመሰረተ ልማት ዝርጋታ፣ የከተማ ውበት እና የመልካም አስተዳደር ስራዎች ላይ ትኩረት ተሰጥቷል።" 
                    },
                    { 
                        t: "የንፁህ መጠጥ ውሃ ፕሮጀክት የ90% መጠናቀቅ", 
                        i: "Lumii_20260412_180356344~2.jpg", 
                        d: "የከተማዋን የውሃ ችግር በዘላቂነት የሚፈታው ግዙፍ ፕሮጀክት ከ1.4 ቢሊዮን ብር በላይ ወጪ እየተከናወነ ይገኛል።", 
                        f: "ለበርካታ አመታት የማታሃራ ከተማ ነዋሪዎች ዋነኛ ጥያቄ የነበረው የንፁህ መጠጥ ውሃ እጥረት በዘላቂነት ለመፍታት ታስቦ የተጀመረው ግዙፍ የውሃ ፕሮጀክት አሁን ላይ 90 በመቶ መጠናቀቁ ተበሰረ።" 
                    },
                    { 
                        t: "የስነ-ህይወት ጥበብ በበሰቃ ሃይቅ ዳርቻ፤ የብርቱካን እርሻ", 
                        i: "Lumii_20260412_180443961~2.jpg", 
                        d: "በኑራኤራ እርሻ ልማት ባለሙያዎች የሚከናወነው ሳይንሳዊ የመግረዝ ስራ ምርታማነትን እያረጋገጠ ነው።", 
                        f: "በማታሃራ ከተማ በበሰቃ ሃይቅ ዳርቻ የብርቱካን እርሻ በከፍተኛ የባለሙያ ጥበብ እየለማ ይገኛል። የኑራኤራ እርሻ ልማት ባለሙያዎች ሳይንሳዊ ዘዴዎችን በመጠቀም ምርታማነትን ለማሳደግ እየሰሩ ነው።" 
                    }
                ]
            }
        };

        function updateContent() {
            const data = content.am;
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = data.news.map((n, index) => `
                <div class="news-card group" onclick="openModal('am', ${index})">
                    <div class="news-img" style="background-image: url('${n.i}')"></div>
                    <div class="p-10">
                        <h4 class="font-black italic text-amber-500 mb-5 leading-tight text-xl group-hover:text-white transition">${n.t}</h4>
                        <p class="text-slate-400 text-sm leading-relaxed line-clamp-2">${n.d}</p>
                        <div class="mt-10 pt-8 border-t border-white/5 flex justify-between items-center text-xs font-black text-white uppercase tracking-widest">
                            <span>Read Full Story</span>
                            <span class="text-amber-500 text-2xl">→</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(lang, index) {
            const item = content[lang].news[index];
            document.getElementById('modalImg').style.backgroundImage = `url('${item.i}')`;
            document.getElementById('modalTitle').innerText = item.t;
            document.getElementById('modalBody').innerText = item.f;
            document.getElementById('newsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('newsModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        window.onload = updateContent;
    </script>
</body>
</html>
