<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMI-TUBE MEDIA | Mataaharaa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Ethiopic', sans-serif; background-color: #020617; color: white; margin: 0; }
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 260px; background: #0f172a; border-right: 1px solid rgba(255,255,255,0.05); z-index: 100; transition: 0.3s; padding-top: 100px; }
        .nav-link { display: flex; align-items: center; padding: 15px 25px; color: #94a3b8; font-weight: bold; transition: 0.3s; cursor: pointer; border-left: 4px solid transparent; }
        .nav-link:hover, .nav-link.active { background: rgba(245,158,11,0.1); color: #f59e0b; border-left: 4px solid #f59e0b; }
        .main-content { margin-left: 260px; padding-top: 80px; }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } }
        .hero-section { height: 40vh; position: relative; display: flex; align-items: center; justify-content: center; background: url('mayor-addisu-wako~2.jpg') center/cover; margin-bottom: 2rem; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, #020617); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 20px; overflow: hidden; border: 2px solid #f59e0b; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .news-card { background: #0f172a; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; padding: 20px; }
        .news-card:hover { border-color: #f59e0b; transform: translateY(-5px); }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full z-[110] p-4 flex justify-between items-center bg-black/50 backdrop-blur-md">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-amber-500 rounded-lg flex items-center justify-center text-black font-black text-xl">S</div>
            <h1 class="text-white font-black italic text-sm">SAMI-TUBE MEDIA</h1>
        </div>
        <select id="langSelect" onchange="updateContent()" class="bg-slate-800 text-white text-xs px-3 py-2 rounded-lg outline-none">
            <option value="am">አማርኛ</option>
            <option value="om">Afaan Oromoo</option>
            <option value="en">English</option>
        </select>
    </header>

    <aside class="sidebar">
        <nav>
            <div id="navNews" class="nav-link active" onclick="scrollToSec('newsGrid')">ቅድመ ዜና</div>
            <div id="navVideo" class="nav-link" onclick="scrollToSec('videoLabel')">ቪዲዮዎች</div>
            <div id="navContact" class="nav-link" onclick="scrollToSec('footer')">ያግኙን</div>
            <div id="navAbout" class="nav-link" onclick="scrollToSec('address')">ስለ እኛ</div>
        </nav>
    </aside>

    <div class="main-content">
        <section class="hero-section">
            <div class="hero-overlay"></div>
            <div class="relative z-10 text-center px-4">
                <h2 id="heroTitle" class="text-3xl md:text-5xl font-black italic text-white"></h2>
            </div>
        </section>

        <main class="max-w-6xl mx-auto p-6 space-y-20">
            <section class="space-y-6">
                <h3 id="videoLabel" class="text-white font-black italic border-l-4 border-amber-500 pl-3"></h3>
                <div class="video-container shadow-2xl">
                    <iframe src="https://www.youtube.com/embed/Yp9H-H6e_k8" frameborder="0" allowfullscreen></iframe>
                </div>
            </section>

            <section class="space-y-6">
                <h3 id="newsLabel" class="text-white font-black italic border-l-4 border-amber-500 pl-3"></h3>
                <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
            </section>

            <footer id="footer" class="bg-slate-900 p-12 rounded-[40px] text-center space-y-8">
                <p id="address" class="text-slate-400 text-sm font-bold"></p>
                <div class="flex justify-center gap-6">
                    <a href="https://t.me/Meteharainfobot" target="_blank" class="bg-sky-500 p-4 rounded-xl shadow-lg"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" width="28"></a>
                    <a href="https://youtube.com/@samsontesfaye2670" target="_blank" class="bg-red-600 p-4 rounded-xl shadow-lg"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" width="28"></a>
                </div>
                <p id="copy" class="text-[10px] text-slate-500 uppercase font-black italic border-t border-white/5 pt-8"></p>
            </footer>
        </main>
    </div>

    <script>
        const translations = {
            am: {
                hT: "የማታሃራ ዲጂታል መረጃ መረብ",
                vL: "የቅርብ ጊዜ የቪዲዮ ሪፖርቶች",
                nL: "ታዋቂ ዜናዎች",
                ad: "ማታሃራ፣ ኢትዮጵያ | +251 922 243 013",
                cp: "© 2026 ሳምሶን ተስፋዬ | በሳሚ ዶልፊን የቀረበ",
                n1: "ቅድመ ዜና", n2: "ቪዲዮዎች", n3: "ያግኙን", n4: "ስለ እኛ",
                news: [
                    { t: "የልማት ስራዎች", d: "የከንቲባ አቶ አዲሱ ዋቆ የልማት ስራዎች ከተማዋን እየቀየሩ ነው።" },
                    { t: "የውሃ ፕሮጀክት", d: "የንፁህ መጠጥ ውሃ ፕሮጀክት 90% ተጠናቋል።" }
                ]
            },
            om: {
                hT: "Marsariitii Odeeffannoo Mataaharaa",
                vL: "Gabaasa Viidiyoo dhihoo",
                nL: "Oduuwwan Beekamoo",
                ad: "Mataaharaa, Itoophiyaa | +251 922 243 013",
                cp: "© 2026 Samson Tesfaye | Sami Dolphin dhaan qophaaye",
                n1: "Oduu duraa", n2: "Viidiyoowwan", n3: "Nu quunnamaa", n4: "Waa'ee keenya",
                news: [
                    { t: "Hojiiwwan Misoomaa", d: "Hojiiwwan misoomaa kantiibaa keenyaa magaalaa keenya jijjiiraa jiru." },
                    { t: "Pirojektii Bishaania", d: "Pirojektiin bishaan dhugaatii 90% xumurameera." }
                ]
            }
        };

        function scrollToSec(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }

        function updateContent() {
            const lang = document.getElementById('langSelect').value;
            const l = translations[lang] || translations.am;
            document.getElementById('heroTitle').innerText = l.hT;
            document.getElementById('videoLabel').innerText = l.vL;
            document.getElementById('newsLabel').innerText = l.nL;
            document.getElementById('address').innerText = l.ad;
            document.getElementById('copy').innerText = l.cp;
            
            // Sidebar update
            document.getElementById('navNews').innerText = l.n1;
            document.getElementById('navVideo').innerText = l.n2;
            document.getElementById('navContact').innerText = l.n3;
            document.getElementById('navAbout').innerText = l.n4;

            document.getElementById('newsGrid').innerHTML = l.news.map(n => `
                <div class="news-card">
                    <h4 class="font-black italic text-amber-500 mb-4 text-xl">${n.t}</h4>
                    <p class="text-slate-400 text-sm leading-relaxed">${n.d}</p>
                </div>
            `).join('');
        }

        window.onload = updateContent;
    </script>
</body>
</html>
